<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T09VHK1QDP');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NRL Match Predictions</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .prob-bar-home,
      .prob-bar-away {
        transition: width 0.4s ease, height 0.4s ease;
        align-self: center;
      }
      .prob-bar-home {
        border-radius: 4px 0 0 4px;
      }
      .prob-bar-away {
        border-radius: 0 4px 4px 0;
      }
      .match-card {
        position: relative;
        background-color: #1f2937;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        transition: border-color 0.15s ease;
      }
      .match-card:hover {
        border-color: #4b5563;
      }
      .team-tip-area {
        border-radius: 0.75rem;
        transition: background-color 0.15s ease;
        cursor: pointer;
        user-select: none;
      }
      .team-tip-area:hover {
        background-color: rgba(255, 255, 255, 0.04);
      }
      .team-tip-area.tip-area-selected {
        outline: 2px solid rgba(251, 191, 36, 0.75);
        outline-offset: 1px;
        background-color: rgba(245, 158, 11, 0.08);
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white">
    <div id="site-header"></div>

    <main class="max-w-5xl mx-auto px-4 py-8 pb-12">
      <h1 class="text-4xl font-bold mb-2">Round Predictions</h1>
      <p class="text-gray-400 mb-6 text-sm">Win probabilities and expected scores from the BS Machine model.</p>

      <div id="round-nav" class="flex items-center mb-6"></div>

      <div class="grid grid-cols-1 md:grid-cols-[1fr_18rem] gap-6 items-start">

        <!-- Blend slider: row 1 on mobile, col 2 row 1 on desktop -->
        <div class="md:col-start-2 md:row-start-1 bg-gray-800 border border-gray-700 rounded-xl p-4 flex flex-col gap-2">
          <div class="flex items-center justify-between">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Crowd Blend</span>
          </div>
          <div class="flex items-center justify-between text-xs font-semibold">
            <span class="text-amber-400">Machine</span>
            <span class="text-blue-400">Crowd</span>
          </div>
          <div class="flex items-center gap-2">
            <button id="matchup-blend-dec" type="button"
                    class="w-7 h-7 rounded border border-gray-600 text-gray-400 font-bold text-sm flex items-center justify-center shrink-0 hover:border-blue-400 hover:text-blue-300 transition-colors"
                    style="touch-action:manipulation">−</button>
            <input id="matchup-blend-slider" type="range" min="0" max="100" value="0" step="5"
                   class="flex-1 min-w-0 cursor-pointer" style="accent-color:#60a5fa;">
            <button id="matchup-blend-inc" type="button"
                    class="w-7 h-7 rounded border border-gray-600 text-gray-400 font-bold text-sm flex items-center justify-center shrink-0 hover:border-blue-400 hover:text-blue-300 transition-colors"
                    style="touch-action:manipulation">+</button>
          </div>
          <div id="matchup-blend-label" class="text-center text-xs text-gray-500">100% Machine Model</div>
        </div>

        <!-- Match tiles: row 2 on mobile, col 1 spanning both rows on desktop -->
        <div id="predictions-container" class="flex flex-col gap-4 md:col-start-1 md:row-start-1 md:row-span-2">
          <!-- Cards injected by JS -->
        </div>

        <!-- Trackers: row 3 on mobile, col 2 row 2 on desktop -->
        <div class="flex flex-col gap-4 md:col-start-2 md:row-start-2">
          <div id="prediction-tracker"></div>
          <div id="totals-tracker"></div>
          <div id="least-likely"></div>
        </div>

      </div>
      </div>
    </main>

    <script type="module" src="../js/predictions.js"></script>
    <script type="module">
      import { updateAuthNav } from '../js/supabase-client.js'
      updateAuthNav()
    </script>
    <script>
      fetch('../components/header.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById("site-header").innerHTML = html;

          document.getElementById("bmc-button").innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png"
                   alt="Buy Me a Coffee"
                   style="height: 40px; width: 145px;">
            </a>
          `;

          const menuToggle = document.getElementById("menu-toggle");
          const mobileMenu = document.getElementById("mobile-menu");
          if (menuToggle && mobileMenu) {
            menuToggle.addEventListener("click", () => {
              mobileMenu.classList.toggle("hidden");
            });
          }
        });
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
