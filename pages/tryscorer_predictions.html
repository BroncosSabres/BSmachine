<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T09VHK1QDP');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tryscorer Predictions | The BS Machine</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white min-h-screen">
    <div id="site-header"></div>

    <main class="w-full max-w-6xl mx-auto px-4 py-8">
      <h1 class="text-3xl md:text-4xl font-bold mb-3 text-center">Tryscorer Predictions</h1>
      <p class="mb-8 text-gray-400 text-center">
        Select a match, pick your tryscorer combo, and see the model's predicted odds!
      </p>

      <!-- MATCH SELECTOR -->
      <div class="card">
        <div class="flex flex-col md:flex-row items-center gap-4 justify-center flex-wrap">
          <div class="flex items-center gap-2">
            <label class="font-semibold text-sm text-gray-300">Competition:</label>
            <div id="competition-toggle" class="flex items-center gap-2">
              <button id="btn-nrl" type="button"
                      class="competition-btn px-4 py-2 rounded-lg bg-amber-400 text-gray-900 font-bold ring-2 ring-amber-400 text-sm">NRL</button>
              <button id="btn-nrlw" type="button"
                      class="competition-btn px-4 py-2 rounded-lg bg-gray-700 text-gray-300 font-bold ring-2 ring-gray-600 text-sm">NRLW</button>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-wrap justify-center">
            <label for="match-select" class="font-semibold text-sm text-gray-300">Select Match:</label>
            <select id="match-select"
                    class="bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 text-sm w-72 max-w-full focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
            <button id="download-tryscorer-csv" type="button"
                    class="px-4 py-2 rounded-lg bg-amber-400 text-gray-900 font-bold disabled:opacity-40 disabled:cursor-not-allowed text-sm"
                    disabled>
              Download CSV
            </button>
          </div>
        </div>
      </div>

      <!-- FLEX ROW: Team lists left, betslip right -->
      <div id="teams-flexrow" class="w-full flex flex-col md:flex-row gap-8 justify-center items-start">
        <div id="teams-container" class="flex flex-col md:flex-row gap-8 flex-1"></div>
        <div class="shrink-0">
          <!-- Margin/Total Selectors -->
          <div id="sgm-extra-selectors" class="mb-4 flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <label for="margin-select" class="text-sm font-semibold text-gray-300 w-24">Margin:</label>
              <select id="margin-select"
                      class="bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">(Any margin)</option>
              </select>
            </div>
            <div class="flex items-center gap-2">
              <label for="total-select" class="text-sm font-semibold text-gray-300 w-24">Total Points:</label>
              <select id="total-select"
                      class="bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">(Any total)</option>
              </select>
            </div>
          </div>
          <!-- The result box -->
          <div id="result" class="sgm-result min-h-[2em] md:w-80 w-full mt-6 md:mt-0 md:sticky md:top-20"></div>
        </div>
      </div>
    </main>

    <script src="../js/tryscorer_predictions.js"></script>
  </body>
</html>
