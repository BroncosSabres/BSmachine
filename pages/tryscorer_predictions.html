<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T09VHK1QDP');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Tryscorer Predictions | The BS Machine</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white min-h-screen">
    <div id="site-header"></div>

    <main class="w-full max-w-6xl mx-auto px-4 py-4 md:py-8 pb-28 md:pb-8">
      <h1 class="text-2xl md:text-4xl font-bold mb-2 md:mb-3 text-center">Tryscorer Predictions</h1>
      <p class="hidden md:block mb-8 text-gray-400 text-center">
        Select a match, pick your tryscorer combo, and see the model's predicted odds!
      </p>

      <!-- MATCH SELECTOR -->
      <div class="card">
        <div class="flex flex-col gap-4">
          <!-- Row 1: competition toggle -->
          <div class="flex items-center gap-3">
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest shrink-0">Competition</span>
            <div id="competition-toggle"
                 class="flex items-center bg-gray-900 border border-gray-700 rounded-lg p-0.5 gap-0.5">
              <button id="btn-nrl" type="button"
                      class="competition-btn px-5 py-1.5 rounded-md bg-amber-400 text-gray-900 font-bold text-sm transition-all">NRL</button>
              <button id="btn-nrlw" type="button"
                      class="competition-btn px-5 py-1.5 rounded-md text-gray-400 font-semibold text-sm transition-all">NRLW</button>
            </div>
          </div>
          <!-- Row 2: match selector + download -->
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <div class="flex-1 flex flex-col gap-1">
              <label for="match-select" class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Select Match</label>
              <select id="match-select"
                      class="bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"></select>
            </div>
            <button id="download-tryscorer-csv" type="button"
                    class="sm:self-end px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-gray-300 font-semibold text-sm disabled:opacity-40 disabled:cursor-not-allowed hover:border-gray-500 hover:text-white transition-colors shrink-0"
                    disabled>
              ↓ Download CSV
            </button>
          </div>
        </div>
      </div>

      <!-- FLEX ROW: Team lists left, betslip right -->
      <!-- pb-24 on mobile ensures the reset buttons aren't obscured by the fixed bottom betslip -->
      <div id="teams-flexrow" class="w-full flex flex-col md:flex-row gap-6 md:gap-8 justify-center items-start pb-24 md:pb-0">
        <div id="teams-container" class="flex flex-col md:flex-row gap-6 md:gap-8 flex-1 order-2 md:order-1"></div>
        <div class="w-full md:w-auto shrink-0 order-1 md:order-2">
          <!-- Margin/Total Selectors -->
          <div id="sgm-extra-selectors" class="mb-4 flex flex-col gap-3">
            <!-- Match Outcome -->
            <div class="flex flex-col gap-2">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Match Outcome</span>
              <!-- Line 1 -->
              <div id="line1-row" class="flex items-center gap-2">
                <span class="text-xs font-semibold text-gray-600 shrink-0">Line</span>
                <div class="flex gap-1 shrink-0">
                  <button id="line1-dir-home" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors truncate max-w-[4.5rem]">
                    H
                  </button>
                  <button id="line1-dir-away" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors truncate max-w-[4.5rem]">
                    A
                  </button>
                </div>
                <select id="line1-val" disabled
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed"></select>
                <button id="line1-clear" type="button"
                        class="text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
              <!-- Add second line button (shown when line1 active, no line2 set) -->
              <button id="add-line2-btn" type="button"
                      class="hidden w-full px-2.5 py-1.5 rounded-lg border border-dashed border-gray-600 text-gray-500 text-xs font-semibold hover:border-blue-400 hover:text-gray-300 transition-colors text-left">
                + Add second line
              </button>
              <!-- Line 2 (shown after clicking "Add second line") -->
              <div id="line2-row" class="hidden flex items-center gap-2">
                <span class="text-xs font-semibold text-gray-600 shrink-0">+ Line</span>
                <span id="line2-team-label" class="text-xs font-semibold text-gray-500 shrink-0 hidden"></span>
                <select id="line2-val"
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                <button id="line2-clear" type="button"
                        class="hidden text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
            </div>
            <!-- Total Points -->
            <div class="flex flex-col gap-1">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Total Pts</span>
              <div class="flex items-center gap-2">
                <div class="flex gap-1 shrink-0">
                  <button id="total-dir-over" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Over
                  </button>
                  <button id="total-dir-under" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Under
                  </button>
                </div>
                <select id="total-val" disabled
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed"></select>
                <button id="total-clear" type="button"
                        class="hidden text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
              <button id="add-total-cap-btn" type="button"
                      class="hidden w-full px-2.5 py-1.5 rounded-lg border border-dashed border-gray-600 text-gray-500 text-xs font-semibold hover:border-blue-400 hover:text-gray-300 transition-colors text-left">
                + Add second line
              </button>
              <div id="total-cap-row" class="hidden flex items-center gap-2">
                <span id="total-cap-dir-label" class="text-xs font-semibold text-gray-600 shrink-0">Under</span>
                <select id="total-cap-val"
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                <button id="total-cap-clear" type="button"
                        class="text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
            </div>
            <!-- Home Team Pts -->
            <div class="flex flex-col gap-1">
              <span id="home-pts-label" class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Home Pts</span>
              <div class="flex items-center gap-2">
                <div class="flex gap-1 shrink-0">
                  <button id="home-total-dir-over" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Over
                  </button>
                  <button id="home-total-dir-under" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Under
                  </button>
                </div>
                <select id="home-total-val" disabled
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed"></select>
                <button id="home-total-clear" type="button"
                        class="hidden text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
            </div>
            <!-- Away Team Pts -->
            <div class="flex flex-col gap-1">
              <span id="away-pts-label" class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Away Pts</span>
              <div class="flex items-center gap-2">
                <div class="flex gap-1 shrink-0">
                  <button id="away-total-dir-over" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Over
                  </button>
                  <button id="away-total-dir-under" type="button"
                          class="line-dir-btn px-2.5 py-1.5 rounded-lg border border-gray-600 text-gray-400 text-xs font-semibold hover:border-blue-400 hover:text-white transition-colors">
                    Under
                  </button>
                </div>
                <select id="away-total-val" disabled
                        class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-40 disabled:cursor-not-allowed"></select>
                <button id="away-total-clear" type="button"
                        class="hidden text-gray-500 hover:text-red-400 text-sm font-bold shrink-0 px-1 transition-colors">✕</button>
              </div>
            </div>
            <!-- Crowd blend slider -->
            <div id="model-blend-row" class="flex flex-col gap-1.5 pt-1 border-t border-gray-700/50">
              <div class="flex items-center justify-between">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Crowd Blend</span>
                <span id="blend-info" class="text-xs text-gray-600"></span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-amber-400 shrink-0 w-16">Machine</span>
                <button id="blend-dec" type="button"
                        class="slider-step-btn w-7 h-7 rounded border border-gray-600 text-gray-400 font-bold text-sm flex items-center justify-center shrink-0 hover:border-blue-400 hover:text-blue-300 transition-colors"
                        style="touch-action:manipulation">−</button>
                <input id="model-blend-slider" type="range" min="0" max="100" value="0" step="5"
                       class="flex-1 cursor-pointer" style="accent-color:#60a5fa;">
                <button id="blend-inc" type="button"
                        class="slider-step-btn w-7 h-7 rounded border border-gray-600 text-gray-400 font-bold text-sm flex items-center justify-center shrink-0 hover:border-blue-400 hover:text-blue-300 transition-colors"
                        style="touch-action:manipulation">+</button>
                <span class="text-xs font-semibold text-blue-400 shrink-0 w-12 text-right">Crowd</span>
              </div>
              <div id="blend-pct-label" class="text-center text-xs text-gray-500">100% Machine Model</div>
            </div>

            <div class="flex gap-2">
              <button id="reset-match-btn" type="button" disabled
                      class="flex-1 px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-gray-300 font-semibold text-sm
                             disabled:opacity-40 disabled:cursor-not-allowed hover:border-gray-500 hover:text-white transition-colors">
                ↺ This Match
              </button>
              <button id="reset-all-btn" type="button" disabled
                      class="flex-1 px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-gray-300 font-semibold text-sm
                             disabled:opacity-40 disabled:cursor-not-allowed hover:border-red-500 hover:text-red-400 transition-colors">
                ↺ All
              </button>
            </div>
          </div>
          <!-- The result box (desktop only — mobile version is fixed bottom via CSS) -->
          <div id="result" class="sgm-result md:w-80 md:sticky md:top-20"></div>
        </div>
      </div>
    </main>

    <script src="../js/tryscorer_predictions.js"></script>
    <script type="module">
      import { updateAuthNav } from '../js/supabase-client.js'
      updateAuthNav()
    </script>
    <script>
      fetch('../components/header.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          document.getElementById('bmc-button').innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height:40px;width:145px;">
            </a>`
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
