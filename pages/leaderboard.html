                <button class="dist-toggle" data-game-id="${game.game_id}"
                  style="background:none;border:none;color:#4a5568;font-size:0.75rem;font-family:'Barlow',system-ui,sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.4rem;padding:0;letter-spacing:0.04em;text-transform:uppercase;">
                  <span class="dist-toggle-label">Show Distributions</span>
                  <span class="dist-toggle-arrow" style="font-size:0.6rem;">▼</span>
                </button>
              </div>
              <div id="dist-container-${game.game_id}" style="display:none;padding:1rem 1rem 0.5rem;border-top:1px solid #1e2a3a;background:#0f1117;">
                <div id="dist-selector-${game.game_id}" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.75rem;"></div>
                <div id="dist-legend-${game.game_id}" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;font-size:0.7rem;color:#4a5568;margin-bottom:0.75rem;"></div>
                <div style="margin-bottom:1.25rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Margin (home – away)</div>
                  <canvas id="dist-m-${game.game_id}" height="140"></canvas>
                </div>
                <div style="margin-bottom:0.5rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Total Points</div>
                  <canvas id="dist-t-${game.game_id}" height="140"></canvas>
                </div>
              </div>
            </div>`
        }).filter(Boolean)

        matchesEl.innerHTML = tilesHtml.length
          ? `<div>${tilesHtml.join('')}</div>`
          : emptyState('No game data for this round.')

        // --- Team tips modal ---
        function openTeamTipsModal(teamKey, teamLabel) {
          const modal  = document.getElementById('user-tips-modal')
          const header = document.getElementById('user-tips-header')
          const body   = document.getElementById('user-tips-body')

          const isMachine = teamKey === '__machine__'
          const teamName  = isMachine ? null : (teamKey === '__all__' || teamKey === '__no_team__' ? null : teamKey)
          const logoHtml  = teamName
            ? `<img src="../logos/${teamSlug(teamName)}.svg" style="width:2rem;height:2rem;object-fit:contain;flex-shrink:0;opacity:0.85;" onerror="this.style.display='none'">`
            : ''

          header.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem;flex:1;min-width:0;">
              ${logoHtml}
              <div style="min-width:0;">
                <div style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.125rem;font-weight:700;${isMachine ? 'color:#f59e0b;' : 'color:#e2e8f0;'}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(teamLabel)}</div>
                <div style="font-size:0.7rem;color:#4a5568;margin-top:1px;">Round ${activeRound || roundGames[0]?.round_number} scores</div>
              </div>
            </div>
            <button id="user-tips-close" aria-label="Close"
              style="background:none;border:1px solid #2e3a4e;border-radius:6px;color:#4a5568;font-size:0.875rem;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color 0.1s,color 0.1s;"
              onmouseover="this.style.borderColor='#4a5568';this.style.color='#e2e8f0';"
              onmouseout="this.style.borderColor='#2e3a4e';this.style.color='#4a5568';">✕</button>`
          modal.classList.add('open')
          document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))

          let totalMargin = 0, totalTotal = 0, gamesScored = 0

          const rows = roundGames.map(game => {
            const gameData = perGameData[game.game_id]?.[teamKey]
            const lg       = liveRoundNumber === (activeRound || roundGames[0]?.round_number) ? liveGameMap[game.game_id] : null
            const homeScore = lg?.home_score ?? game.home_score
            const awayScore = lg?.away_score ?? game.away_score
            const hasScore  = homeScore != null && awayScore != null
            const isLive    = lg?.is_live === true

            // Count users from this team who picked this game
            const gamePicks_ = picksByGame[game.game_id] || []
            const teamPickCount = teamKey === '__machine__' ? null
              : teamKey === '__all__'
                ? gamePicks_.length
                : gamePicks_.filter(p =>
                    teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
                  ).length

            if (gameData) {
              totalMargin += gameData.marginScore
              totalTotal  += gameData.totalScore
              gamesScored++
            }

            const actualDisplay = hasScore
              ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.25rem;font-weight:700;color:#e2e8f0;letter-spacing:0.03em;">${homeScore}–${awayScore}</span>${isLive ? '<br><span style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}`
              : `<span style="font-size:0.7rem;font-weight:600;color:#2e3a4e;text-transform:uppercase;letter-spacing:0.05em;">Upcoming</span>`

            const userCountHtml = teamPickCount != null
              ? `<span style="font-size:0.65rem;color:#4a5568;">${teamPickCount} picker${teamPickCount !== 1 ? 's' : ''}</span>`
              : ''

            const scoresHtml = gameData
              ? `<div style="display:flex;align-items:center;gap:0.6rem;font-size:0.7rem;flex-wrap:wrap;">
                  <span style="color:#4a5568;font-family:monospace;font-size:0.65rem;">${gameData.marginLabel}</span>
                  <span style="color:#4a5568;">M: <span style="color:#8892a4;">${gameData.marginScore.toFixed(3)}</span></span>
                  <span style="color:#4a5568;font-family:monospace;font-size:0.65rem;">${gameData.totalLabel}</span>
                  <span style="color:#4a5568;">T: <span style="color:#8892a4;">${gameData.totalScore.toFixed(3)}</span></span>
                  <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${(gameData.marginScore + gameData.totalScore).toFixed(3)}</span>
                </div>`
              : `<span style="font-size:0.75rem;color:#2e3a4e;">No data</span>`

            return `
              <div style="border-bottom:1px solid #1e2a3a;padding:0.625rem 1.25rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.3rem;">
                  <div style="display:flex;align-items:center;gap:0.375rem;flex:1;justify-content:flex-end;min-width:0;">
                    <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                    <img src="../logos/${teamSlug(game.home_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                  </div>
                  <div style="text-align:center;flex-shrink:0;min-width:4.5rem;line-height:1.3;">${actualDisplay}</div>
                  <div style="display:flex;align-items:center;gap:0.375rem;flex:1;min-width:0;">
                    <img src="../logos/${teamSlug(game.away_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                    <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                  ${userCountHtml}
                  ${scoresHtml}
                </div>
              </div>`
          })

          body.innerHTML = rows.join('') + `
            <div style="padding:0.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;background:#0f1117;flex-shrink:0;">
              <span style="font-size:0.75rem;color:#4a5568;">${gamesScored} game${gamesScored !== 1 ? 's' : ''} scored</span>
              <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:#e2e8f0;">${(totalMargin + totalTotal).toFixed(3)}</span>
            </div>`
        }

        // Delegated click handler for team name links in sidebar panels + match tiles
        ;[seasonPanel, weekPanel, matchesEl].forEach(panel => {
          panel.addEventListener('click', e => {
            const link = e.target.closest('.team-tip-link')
            if (!link) return
            e.stopPropagation()
            openTeamTipsModal(link.dataset.teamkey, link.dataset.teamlabel)
          })
        })

        // --- Distribution chart state & helpers ---
        const distCharts     = {}
        const gameSubsetState = {}  // { [gameId]: { available, selected, game, machineDist, actualMargin, actualTotal } }

        // Distinct colours for user subsets (red reserved for result line)
        const SUBSET_PALETTE = ['#3b82f6','#22c55e','#f472b6','#06b6d4','#8b5cf6','#fb923c','#14b8a6','#6366f1','#d946ef','#84cc16']

        function hexToRgb(hex) {
          const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
          return `${r},${g},${b}`
        }

        // Render both charts for a game given an array of { label, color, values } subsets
        function renderDistChart(canvasId, machineBins, subsets, actualVal, xTitle, gameId, type, allValues = []) {
          const ctx = document.getElementById(canvasId)?.getContext('2d')
          if (!ctx) return null

          const isMargin     = type === 'margin'
          const [xMin, xMax] = isMargin ? [-100, 100] : [0, 100]
          const machineData  = machineBins ? lbNormaliseMachineBins(machineBins, 1, xMin, xMax) : []

          const rn        = roundGames.find(g => String(g.game_id) === String(gameId))?.round_number
          const rScale    = rn ? (roundSigmaScaleByRound[rn] ?? { margin: null, total: null }) : { margin: null, total: null }
          const mBins     = machineDistByGame[gameId]?.margins ? lbNormaliseMachineBins(machineDistByGame[gameId].margins, 1, -100, 100) : []
          const tBins     = machineDistByGame[gameId]?.totals  ? lbNormaliseMachineBins(machineDistByGame[gameId].totals,  1,    0, 100) : []
          const σFallback = isMargin ? lbMachineSigma(mBins) : lbMachineSigma(tBins)
          const sigmaScale = isMargin ? rScale.margin : rScale.total

          // Compute shared bandwidth from All Users distribution so that
          // weighted-sum of team KDEs exactly reconstructs the All Users KDE.
          const bwValues = allValues.length >= 2 ? allValues : (subsets[0]?.values ?? [])
          const sharedSigmaTarget = (bwValues.length >= 2 && sigmaScale) ? lbStddev(bwValues) * sigmaScale : σFallback
          const sharedH = lbCalibratedBandwidth(bwValues, sharedSigmaTarget)

          const subsetDatasets = subsets.map(({ values, color, label }) => {
            const kdeBins = lbCollapseToNRLValid(lbKdePoints(values, xMin, xMax, null, sharedH), isMargin ? 'margin' : 'total')
            return { kdeBins, color, label: label ?? '' }
          })

          const allY = [...machineData.map(d => d.y), ...subsetDatasets.flatMap(s => s.kdeBins.map(b => b.y))]
          const maxY = allY.length ? Math.max(...allY) * 1.15 : 0.3

          const datasets = [
            ...(machineData.length ? [{
              type: 'line', data: machineData.map(d => ({ x: d.x, y: d.y })),
              borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.07)',
              borderWidth: 2, pointRadius: 0, fill: true, tension: 0.35, order: 10,
            }] : []),
            ...subsetDatasets.map(({ kdeBins, color }, i) => ({
              type: 'line', data: kdeBins.map(d => ({ x: d.x, y: d.y })),
              borderColor: color, backgroundColor: `rgba(${hexToRgb(color)},0.12)`,
              borderWidth: 2.5, pointRadius: 0, fill: true, tension: 0.35, order: 9 - i,
            })),
            {
              type: 'line', data: [{ x: actualVal, y: 0 }, { x: actualVal, y: maxY }],
              borderColor: '#f87171', borderWidth: 2, borderDash: [5, 3],
              pointRadius: 0, fill: false, tension: 0, order: 1,
            },
          ]

          // --- Tooltip & crosshair helpers ---
          function ensureLbTooltipEl() {
            let el = document.getElementById('lb-dist-tooltip')
            if (!el) {
              el = document.createElement('div')
              el.id = 'lb-dist-tooltip'
              el.style.cssText = 'position:fixed;pointer-events:none;display:none;background:#0f1117;border:1px solid #2e3a4e;border-radius:8px;padding:0.5rem 0.75rem;font-size:0.72rem;color:#e2e8f0;line-height:1.6;white-space:nowrap;z-index:99999;font-family:\'Barlow\',system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.5);'
              document.body.appendChild(el)
            }
            return el
          }

          function cdfBins(bins, x) {
            let gte = 0, lte = 0
            for (const b of (bins || [])) {
              if (b.x >= x) gte += b.y
              if (b.x <= x) lte += b.y
            }
            return { gte: Math.min(gte, 1), lte: Math.min(lte, 1) }
          }

          const crosshairPlugin = {
            id: 'lbCrosshair',
            afterDraw(chart) {
              if (chart._crosshairX == null) return
              const { ctx, chartArea: { top, bottom } } = chart
              ctx.save()
              ctx.beginPath()
              ctx.moveTo(chart._crosshairX, top)
              ctx.lineTo(chart._crosshairX, bottom)
              ctx.strokeStyle = 'rgba(255,255,255,0.15)'
              ctx.lineWidth = 1
              ctx.setLineDash([4, 3])
              ctx.stroke()
              ctx.restore()
            },
          }

          const chart = new Chart(ctx, {
            data: { datasets },
            plugins: [crosshairPlugin],
            options: {
              responsive: true, animation: false,
              plugins: { legend: { display: false }, tooltip: { enabled: false } },
              onHover: (event, _elements, chart) => {
                const tooltipEl = ensureLbTooltipEl()
                if (!event.native) {
                  chart._crosshairX = null; chart.draw(); tooltipEl.style.display = 'none'; return
                }
                chart._crosshairX = event.x
                chart.draw()

                const xScale = chart.scales.x
                if (!xScale) { tooltipEl.style.display = 'none'; return }
                const xVal = xScale.getValueForPixel(event.x)
                if (xVal == null) { tooltipEl.style.display = 'none'; return }

                // Snap to nearest integer bin present in either dataset
                const allXs = [...machineData.map(b => b.x), ...subsetDatasets.flatMap(s => s.kdeBins.map(b => b.x))]
                if (!allXs.length) { tooltipEl.style.display = 'none'; return }
                const nearest = Math.round(Math.max(xMin, Math.min(xMax, xVal)))

                const pct  = v => `${(v * 100).toFixed(1)}%`
                const odds = p => p >= 0.00005 ? `$${(1 / p).toFixed(2)}` : '—'
                const sign = x => x > 0 ? `+${x}` : `${x}`
                const xLabel = isMargin ? sign(nearest) : `${nearest}`
                const row = (lbl, p) => `<div style="display:flex;justify-content:space-between;gap:1.5rem;"><span style="color:#8892a4;">${lbl}</span><span style="font-variant-numeric:tabular-nums;">${pct(p)} <span style="color:#4a5568;">${odds(p)}</span></span></div>`

                let html = `<div style="font-weight:700;font-size:0.75rem;margin-bottom:0.35rem;color:#94a3b8;">${isMargin ? 'Margin' : 'Total'} ${xLabel}</div>`

                if (machineData.length) {
                  const mc = cdfBins(machineData, nearest)
                  html += `<div style="color:#f59e0b;font-weight:600;margin-bottom:0.1rem;">BS Machine</div>`
                  html += row(`P(≥${xLabel})`, mc.gte)
                  html += row(`P(≤${xLabel})`, mc.lte)
                }

                subsetDatasets.forEach(({ kdeBins, color, label }) => {
                  const uc = cdfBins(kdeBins, nearest)
                  html += `<div style="color:${color};font-weight:600;margin-top:0.4rem;margin-bottom:0.1rem;">${escapeHtml(label)}</div>`
                  html += row(`P(≥${xLabel})`, uc.gte)
                  html += row(`P(≤${xLabel})`, uc.lte)
                })

                tooltipEl.innerHTML = html
                tooltipEl.style.display = 'block'

                const cr = event.native.target.getBoundingClientRect()
                let left = cr.left + event.x + 12
                let top  = cr.top  + event.y - 10
                tooltipEl.style.left = `${left}px`
                tooltipEl.style.top  = `${top}px`
                const tr = tooltipEl.getBoundingClientRect()
                if (tr.right  > window.innerWidth  - 8) left = cr.left + event.x - tr.width  - 12
                if (tr.bottom > window.innerHeight - 8)  top  = cr.top  + event.y - tr.height - 10
                tooltipEl.style.left = `${left}px`
                tooltipEl.style.top  = `${top}px`
              },
              scales: {
                x: {
                  type: 'linear', offset: false,
                  title: { display: true, text: xTitle, color: '#4a5568', font: { size: 10, weight: '600' }, padding: { top: 4 } },
                  ticks: { maxTicksLimit: 12, color: '#4a5568', font: { size: 10 } },
                  grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' },
                },
                y: {
                  min: 0, max: maxY,
                  title: { display: true, text: 'Relative frequency', color: '#4a5568', font: { size: 10, weight: '600' }, padding: { bottom: 4 } },
                  ticks: { color: '#4a5568', font: { size: 9 }, callback: v => `${Math.round(v * 100)}%` },
                  grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' },
                },
              },
            },
          })

          function hideLbTooltip() {
            const el = document.getElementById('lb-dist-tooltip')
            if (el) el.style.display = 'none'
            chart._crosshairX = null
            chart.draw()
          }

          ctx.canvas.addEventListener('mouseleave', hideLbTooltip)
          ctx.canvas.addEventListener('pointerleave', hideLbTooltip)
          ctx.canvas.style.touchAction = 'pan-y'
          ctx.canvas.style.userSelect = 'none'

          return chart
        }

        function buildSubsetSelector(gameId) {
          const el = document.getElementById(`dist-selector-${gameId}`)
          if (!el) return
          const { available, selected } = gameSubsetState[gameId]
          el.innerHTML = available.map(s => {
            const active = selected.has(s.key)
            const rgb    = hexToRgb(s.color)
            const logo   = (s.key !== '__all__' && s.key !== '__no_team__')
              ? `<img src="../logos/${teamSlug(s.key)}.svg" style="width:11px;height:11px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">`
              : ''
            return `<button class="dist-subset-pill" data-game-id="${gameId}" data-key="${escapeHtml(s.key)}"
              style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
                     border:1px solid ${active ? s.color : 'rgba(255,255,255,0.1)'};
                     background:${active ? `rgba(${rgb},0.15)` : 'transparent'};
                     color:${active ? s.color : '#4a5568'};cursor:pointer;
                     font-size:0.65rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
                     font-family:'Barlow',system-ui,sans-serif;white-space:nowrap;transition:all 0.15s;">
              ${logo}${escapeHtml(s.label)}<span style="opacity:0.5;font-weight:400;margin-left:2px;">${s.margins.length}</span>
            </button>`
          }).join('')
        }

        function buildLegend(gameId) {
          const el = document.getElementById(`dist-legend-${gameId}`)
          if (!el) return
          const { available, selected } = gameSubsetState[gameId]
          const sel = available.filter(s => selected.has(s.key))
          el.innerHTML = [
            `<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;background:#f59e0b;display:inline-block;border-radius:1px;"></span>BS Machine</span>`,
            ...sel.map(s => `<span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;background:rgba(${hexToRgb(s.color)},0.35);display:inline-block;border-radius:2px;border:1px solid ${s.color};"></span>${escapeHtml(s.label)}</span>`),
            `<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;background:#f87171;display:inline-block;border-radius:1px;border-top:2px dashed #f87171;"></span>Result</span>`,
          ].join('')
        }

        function redrawDistCharts(gameId) {
          const state = gameSubsetState[gameId]
          if (!state) return
          distCharts[`m-${gameId}`]?.destroy(); delete distCharts[`m-${gameId}`]
          distCharts[`t-${gameId}`]?.destroy(); delete distCharts[`t-${gameId}`]
          const sel     = state.available.filter(s => state.selected.has(s.key))
          const allSub  = state.available.find(s => s.key === '__all__')
          const allMargins = allSub?.margins ?? []
          const allTotals  = allSub?.totals  ?? []
          distCharts[`m-${gameId}`] = renderDistChart(`dist-m-${gameId}`, state.machineDist?.margins, sel.map(s => ({ color: s.color, values: s.margins, label: s.label })), state.actualMargin, 'Margin (home – away, pts)', gameId, 'margin', allMargins)
          distCharts[`t-${gameId}`] = renderDistChart(`dist-t-${gameId}`, state.machineDist?.totals,  sel.map(s => ({ color: s.color, values: s.totals,  label: s.label })), state.actualTotal,  'Total points',             gameId, 'total',  allTotals)
          buildLegend(gameId)
        }

        // Pill toggle — event-delegated so it works after innerHTML replacements
        matchesEl.addEventListener('click', e => {
          const pill = e.target.closest('.dist-subset-pill')
          if (!pill) return
          const gameId = pill.dataset.gameId
          const key    = pill.dataset.key
          const state  = gameSubsetState[gameId]
          if (!state) return
          if (state.selected.has(key)) {
            if (state.selected.size === 1) return  // keep at least one selected
            state.selected.delete(key)
          } else {
            state.selected.add(key)
          }
          buildSubsetSelector(gameId)
          redrawDistCharts(gameId)
        })

        matchesEl.querySelectorAll('.dist-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const gameId    = btn.dataset.gameId
            const container = document.getElementById(`dist-container-${gameId}`)
            if (!container) return
            const isOpen = container.style.display !== 'none'

            if (isOpen) {
              container.style.display = 'none'
              btn.querySelector('.dist-toggle-label').textContent = 'Show Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▼'
              distCharts[`m-${gameId}`]?.destroy(); delete distCharts[`m-${gameId}`]
              distCharts[`t-${gameId}`]?.destroy(); delete distCharts[`t-${gameId}`]
              delete gameSubsetState[gameId]
            } else {
              container.style.display = 'block'
              btn.querySelector('.dist-toggle-label').textContent = 'Hide Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▲'

              const game        = roundGames.find(g => String(g.game_id) === String(gameId))
              const machineDist = machineDistByGame[gameId]
              const gamePicks   = picksByGame[gameId] || []
              const actualMargin = game.home_score - game.away_score
              const actualTotal  = game.home_score + game.away_score

              // Build available subsets (All Users + per-team subsets with picks in this game)
              const available = []
              const allMargins = gamePicks.map(p => p.home_score_pick - p.away_score_pick)
              const allTotals  = gamePicks.map(p => p.home_score_pick + p.away_score_pick)
              available.push({ key: '__all__', label: 'All Users', margins: allMargins, totals: allTotals })

              ;[...fanTeams].sort().forEach(teamKey => {
                const sub = gamePicks.filter(p =>
                  teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
                )
                if (!sub.length) return
                available.push({
                  key:     teamKey,
                  label:   teamKey === '__no_team__' ? 'No Team' : teamKey,
                  margins: sub.map(p => p.home_score_pick - p.away_score_pick),
                  totals:  sub.map(p => p.home_score_pick + p.away_score_pick),
                })
              })

              available.forEach((s, i) => { s.color = SUBSET_PALETTE[i % SUBSET_PALETTE.length] })

              gameSubsetState[gameId] = { available, selected: new Set(['__all__']), game, machineDist, actualMargin, actualTotal }
              buildSubsetSelector(gameId)
              redrawDistCharts(gameId)
            }
          })
        })
      }

      // --- User tips modal ---
      async function openUserTipsModal(userId, username, roundNumber) {
        const modal  = document.getElementById('user-tips-modal')
        const header = document.getElementById('user-tips-header')
        const body   = document.getElementById('user-tips-body')

        // Tab bar shared between both tabs
        const tabBar = `
          <div id="utips-tabs" style="display:flex;gap:0.375rem;margin-top:0.625rem;">
            <button id="utips-tab-tips"
              style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:0.3rem 0.75rem;border-radius:6px;border:1px solid #2e3a4e;background:#1e2a3a;color:#e2e8f0;cursor:pointer;transition:all 0.1s;">
              Round ${roundNumber}
            </button>
            <button id="utips-tab-stats"
              style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:0.3rem 0.75rem;border-radius:6px;border:1px solid #2e3a4e;background:none;color:#4a5568;cursor:pointer;transition:all 0.1s;">
              ${escapeHtml(username)}'s Stats
            </button>
          </div>`

        const headerBase = (logoHtml) => `
          <div style="display:flex;align-items:flex-start;gap:0.75rem;flex:1;min-width:0;flex-direction:column;">
            <div style="display:flex;align-items:center;gap:0.75rem;width:100%;">
              ${logoHtml}
              <div style="min-width:0;flex:1;">
                <div style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.125rem;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(username)}</div>
                <div style="font-size:0.7rem;color:#4a5568;margin-top:1px;">Round ${roundNumber} locked tips</div>
              </div>
            </div>
            ${tabBar}
          </div>
          <button id="user-tips-close" aria-label="Close"
            style="background:none;border:1px solid #2e3a4e;border-radius:6px;color:#4a5568;font-size:0.875rem;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color 0.1s,color 0.1s;align-self:flex-start;"
            onmouseover="this.style.borderColor='#4a5568';this.style.color='#e2e8f0';"
            onmouseout="this.style.borderColor='#2e3a4e';this.style.color='#4a5568';">✕</button>`

        header.innerHTML = headerBase('')
        body.innerHTML   = `<div style="padding:2.5rem;text-align:center;color:#4a5568;" class="animate-pulse">Loading tips…</div>`
        modal.classList.add('open')
        document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))

        // Track active tab and cached stats
        let activeTab = 'tips'
        let cachedTipsHtml = null
        let cachedStats = null

        function setActiveTab(tab) {
          activeTab = tab
          const tipsBtn  = document.getElementById('utips-tab-tips')
          const statsBtn = document.getElementById('utips-tab-stats')
          if (!tipsBtn || !statsBtn) return
          if (tab === 'tips') {
            tipsBtn.style.background  = '#1e2a3a'; tipsBtn.style.color  = '#e2e8f0'; tipsBtn.style.borderColor = '#2e3a4e'
            statsBtn.style.background = 'none';     statsBtn.style.color = '#4a5568'; statsBtn.style.borderColor = '#2e3a4e'
            if (cachedTipsHtml !== null) body.innerHTML = cachedTipsHtml
          } else {
            statsBtn.style.background = '#1e2a3a'; statsBtn.style.color  = '#e2e8f0'; statsBtn.style.borderColor = '#2e3a4e'
            tipsBtn.style.background  = 'none';    tipsBtn.style.color  = '#4a5568'; tipsBtn.style.borderColor = '#2e3a4e'
            if (cachedStats) {
              renderStats(cachedStats, { bodyEl: body })
            } else {
              body.innerHTML = `<div style="padding:2.5rem;text-align:center;color:#4a5568;" class="animate-pulse">Loading stats…</div>`
              fetchAllData(userId).then(stats => {
                cachedStats = stats
                if (activeTab === 'stats') renderStats(stats, { bodyEl: body })
              }).catch(() => {
                if (activeTab === 'stats') body.innerHTML = `<div style="padding:2rem;text-align:center;font-size:0.875rem;color:#f87171;">Failed to load stats.</div>`
              })
            }
          }
        }

        // Wire up tab buttons (re-wires after each header redraw)
        function wireTabs() {
          document.getElementById('utips-tab-tips')?.addEventListener('click', () => setActiveTab('tips'))
          document.getElementById('utips-tab-stats')?.addEventListener('click', () => setActiveTab('stats'))
        }
        wireTabs()

        // Fetch games, picks, scores, profile in parallel
        const { data: games } = await supabase
          .from('games')
          .select('game_id, home_team, away_team, home_score, away_score, is_complete')
          .eq('round_number', roundNumber)
          .order('game_id', { ascending: true })

        if (!games?.length) {
          body.innerHTML = `<div style="padding:2rem;text-align:center;color:#4a5568;">No games found for Round ${roundNumber}.</div>`
          return
        }

        const gameIds = games.map(g => g.game_id)

        const [{ data: userPicks }, { data: userScores }, { data: profile }] = await Promise.all([
          supabase.from('picks').select('game_id, home_score_pick, away_score_pick').eq('user_id', userId).in('game_id', gameIds),
          supabase.from('scores').select('game_id, points, margin_score, total_score').eq('user_id', userId).eq('round_number', roundNumber),
          supabase.from('profiles').select('favourite_team').eq('id', userId).single(),
        ])

        // Update header with team logo once profile loaded
        const favTeam  = profile?.favourite_team || null
        const logoHtml = favTeam
          ? `<img src="../logos/${teamSlug(favTeam)}.svg" style="width:2rem;height:2rem;object-fit:contain;flex-shrink:0;opacity:0.85;" onerror="this.style.display='none'">`
          : ''
        header.innerHTML = headerBase(logoHtml)
        document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))
        wireTabs()

        const pickMap  = {}
        userPicks?.forEach(p => { pickMap[p.game_id] = p })
        const scoreMap = {}
        userScores?.forEach(s => { scoreMap[s.game_id] = s })

        // Compute live bell-curve scores for unscored live games
        if (liveRoundNumber === roundNumber) {
          for (const [gid, lg] of Object.entries(liveGameMap)) {
            const gameId = Number(gid)
            if (scoreMap[gameId] || lg.home_score == null) continue
            const p = pickMap[gameId]
            if (!p) continue
            const ms = bellScore((lg.home_score - lg.away_score) - (p.home_score_pick - p.away_score_pick))
            const ts = bellScore((lg.home_score + lg.away_score) - (p.home_score_pick + p.away_score_pick))
            scoreMap[gameId] = { game_id: gameId, margin_score: ms, total_score: ts, points: ms + ts }
          }
        }

        let totalPts   = 0
        let pickedCount = 0

        const rows = games.map(game => {
          const lg       = liveRoundNumber === roundNumber ? liveGameMap[game.game_id] : null
          const homeScore = lg?.home_score ?? game.home_score
          const awayScore = lg?.away_score ?? game.away_score
          const hasScore  = homeScore != null && awayScore != null
          const isLive    = lg?.is_live === true

          const pick  = pickMap[game.game_id]
          const score = scoreMap[game.game_id]
          if (pick)  pickedCount++
          if (score) totalPts += score.points

          const actualDisplay = hasScore
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.25rem;font-weight:700;color:#e2e8f0;letter-spacing:0.03em;">${homeScore}–${awayScore}</span>${isLive ? '<br><span style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}`
            : `<span style="font-size:0.7rem;font-weight:600;color:#2e3a4e;text-transform:uppercase;letter-spacing:0.05em;">Upcoming</span>`

          const pickDisplay = pick
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.9rem;font-weight:600;color:#cbd5e1;">${pick.home_score_pick}–${pick.away_score_pick}</span>`
            : `<span style="font-size:0.75rem;color:#2e3a4e;font-style:italic;">No pick</span>`

          const mScore  = score?.margin_score != null ? score.margin_score.toFixed(1) : null
          const tScore  = score?.total_score  != null ? score.total_score.toFixed(1)  : null
          const ptsStr  = score ? score.points.toFixed(1) : null

          const scoreFragment = ptsStr
            ? `<div style="display:flex;align-items:center;gap:0.5rem;">
                <span style="font-size:0.7rem;color:#4a5568;">M:<span style="color:#8892a4;margin-left:2px;">${mScore}</span></span>
                <span style="font-size:0.7rem;color:#4a5568;">T:<span style="color:#8892a4;margin-left:2px;">${tScore}</span></span>
                <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${ptsStr}</span>
              </div>`
            : `<span style="font-size:0.75rem;color:#2e3a4e;">—</span>`

          return `
            <div style="border-bottom:1px solid #1e2a3a;padding:0.625rem 1.25rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.3rem;">
                <div style="display:flex;align-items:center;gap:0.375rem;flex:1;justify-content:flex-end;min-width:0;">
                  <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:4.5rem;line-height:1.3;">${actualDisplay}</div>
                <div style="display:flex;align-items:center;gap:0.375rem;flex:1;min-width:0;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                  <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                <div style="font-size:0.7rem;color:#4a5568;">Pick: ${pickDisplay}</div>
                ${scoreFragment}
              </div>
            </div>`
        })

        cachedTipsHtml = rows.join('') + `
          <div style="padding:0.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;background:#0f1117;flex-shrink:0;">
            <span style="font-size:0.75rem;color:#4a5568;">${pickedCount} of ${games.length} games picked</span>
            <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:#e2e8f0;">${totalPts.toFixed(1)} pts</span>
          </div>`
        body.innerHTML = cachedTipsHtml
      }

      // --- Hall of Fame ---
      // A "perfect pick" is a score of >= 9.99 pts (both margin & total errors = 0 → exact scoreline)
      async function loadHallOfFame() {
        hofPanel.innerHTML = `<div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>`

        const { data: perfectScores } = await supabase
          .from('scores')
          .select('user_id, game_id, points, round_number')
          .gte('points', 9.99)

        if (!perfectScores?.length) {
          hofPanel.innerHTML = `<div class="p-8 text-center" style="color:#4a5568;font-size:0.8125rem;">No perfect picks yet this season.</div>`
          return
        }

        // Filter out virtual users
        const realScores = perfectScores.filter(s => s.user_id !== 'bs_machine' && s.user_id !== 'the_crowd')
        if (!realScores.length) {
          hofPanel.innerHTML = `<div class="p-8 text-center" style="color:#4a5568;font-size:0.8125rem;">No perfect picks yet this season.</div>`
          return
        }

        const gameIds = [...new Set(realScores.map(s => s.game_id))]
        const userIds = [...new Set(realScores.map(s => s.user_id))]

        const [{ data: games }, { data: picks }, { data: profiles }, { data: allUserPicks }] = await Promise.all([
          supabase.from('games')
            .select('game_id, home_team, away_team, home_score, away_score, round_number')
            .in('game_id', gameIds),
          supabase.from('picks')
            .select('user_id, game_id, home_score_pick, away_score_pick')
            .in('user_id', userIds)
            .in('game_id', gameIds),
          supabase.from('profiles')
            .select('id, username, favourite_team')
            .in('id', userIds),
          // All picks for these users (to compute percentage)
          supabase.from('picks')
            .select('user_id, game_id')
            .in('user_id', userIds),
        ])

        const gameMap = {}
        games?.forEach(g => { gameMap[g.game_id] = g })

        const pickMap = {}
        picks?.forEach(p => { pickMap[`${p.user_id}|${p.game_id}`] = p })

        const profileMap = {}
        profiles?.forEach(p => { profileMap[p.id] = p })

        const totalPicksMap = {}
        allUserPicks?.forEach(p => {
          totalPicksMap[p.user_id] = (totalPicksMap[p.user_id] || 0) + 1
        })

        // Group perfect scores by user
        const byUser = {}
        realScores.forEach(s => {
          if (!byUser[s.user_id]) byUser[s.user_id] = []
          byUser[s.user_id].push(s)
        })

        const entries = Object.entries(byUser).map(([uid, scores]) => {
          const totalPicks = totalPicksMap[uid] || scores.length
          return {
            uid,
            username:     profileMap[uid]?.username || 'Unknown',
            team:         profileMap[uid]?.favourite_team || null,
            perfectCount: scores.length,
            totalPicks,
            pct: ((scores.length / totalPicks) * 100).toFixed(1),
            games: scores
              .map(s => ({ ...s, game: gameMap[s.game_id], pick: pickMap[`${uid}|${s.game_id}`] }))
              .filter(s => s.game)
              .sort((a, b) => b.round_number - a.round_number),
          }
        }).sort((a, b) => b.perfectCount - a.perfectCount || parseFloat(b.pct) - parseFloat(a.pct))

        const rows = entries.map((entry, i) => {
          const isMe      = entry.uid === myUserId
          const rank      = i + 1
          const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
          const logoEl    = entry.team
            ? `<img src="../logos/${teamSlug(entry.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">`
            : ''

          const gamesHtml = entry.games.map(({ game, pick }) => {
            const pickStr = pick ? `${pick.home_score_pick}–${pick.away_score_pick}` : '—'
            return `
              <div class="hof-game-row">
                <div style="min-width:0;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
                  <img src="../logos/${teamSlug(game.home_team)}.svg" style="width:10px;height:10px;object-fit:contain;flex-shrink:0;opacity:0.6;" onerror="this.style.display='none'">
                  <span style="color:#64748b;">${escapeHtml(game.home_team)} v ${escapeHtml(game.away_team)}</span>
                  <span style="color:#374151;">R${game.round_number}</span>
                </div>
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                  <span style="color:#4a5568;font-family:'Barlow Condensed',system-ui,sans-serif;">${game.home_score}–${game.away_score}</span>
                  <span style="color:#22c55e;font-family:'Barlow Condensed',system-ui,sans-serif;font-weight:700;">${pickStr}</span>
                </div>
              </div>`
          }).join('')

          return `
            <div>
              <div class="lb-row hof-entry-row" data-hof-uid="${entry.uid}"
                style="grid-template-columns:2rem 1fr auto auto auto;gap:0.5rem;${isMe ? 'background:rgba(245,158,11,0.05);' : ''}">
                <div class="rank-badge ${rankClass}">${rank}</div>
                <div class="flex items-center gap-1.5 min-w-0">
                  ${logoEl}
                  <span class="user-tip-link username text-sm font-semibold truncate ${isMe ? 'text-amber-400' : ''}"
                    data-uid="${entry.uid}" data-username="${escapeHtml(entry.username)}">${escapeHtml(entry.username)}${isMe ? ' (you)' : ''}</span>
                </div>
                <div style="font-size:0.68rem;color:#4a5568;white-space:nowrap;">${entry.pct}%</div>
                <div style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#22c55e;">${entry.perfectCount}</div>
                <div class="hof-toggle-arrow" style="font-size:0.55rem;color:#4a5568;padding-left:2px;">&#9660;</div>
              </div>
              <div id="hof-games-${entry.uid}" style="display:none;">${gamesHtml}</div>
            </div>`
        }).join('')

        const legend = `
          <div style="padding:0.5rem 0.875rem;border-bottom:1px solid #1e2a3a;display:flex;align-items:center;justify-content:space-between;font-size:0.65rem;color:#4a5568;">
            <span>Tipster</span>
            <div style="display:flex;gap:1rem;">
              <span>% of picks</span>
              <span style="color:#22c55e;">Perfect</span>
            </div>
          </div>`

        hofPanel.innerHTML = legend + rows
      }

      // HOF expand/collapse toggle (delegated once)
      document.addEventListener('click', e => {
        const row = e.target.closest('.hof-entry-row')
        if (!row || e.target.closest('.user-tip-link')) return
        const uid      = row.dataset.hofUid
        const gamesEl  = document.getElementById(`hof-games-${uid}`)
        const arrow    = row.querySelector('.hof-toggle-arrow')
        if (!gamesEl) return
        const open = gamesEl.style.display !== 'none'
        gamesEl.style.display = open ? 'none' : 'block'
        if (arrow) arrow.innerHTML = open ? '&#9660;' : '&#9650;'
      })

      function emptyState(msg) {
        return `<div class="p-10 text-center text-sm" style="color:#4a5568;">${msg}</div>`
      }

      function escapeHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function teamSlug(name) {
        const n = (name || '').toLowerCase()
        if (n.includes('broncos'))    return 'broncos'
        if (n.includes('bulldogs'))   return 'bulldogs'
        if (n.includes('cowboys'))    return 'cowboys'
        if (n.includes('dolphins'))   return 'dolphins'
        if (n.includes('dragons'))    return 'dragons'
        if (n.includes('eels'))       return 'eels'
        if (n.includes('knights'))    return 'knights'
        if (n.includes('sea eagles') || n.includes('manly')) return 'manly'
        if (n.includes('panthers'))   return 'panthers'
        if (n.includes('rabbitohs'))  return 'rabbitohs'
        if (n.includes('raiders'))    return 'raiders'
        if (n.includes('roosters'))   return 'roosters'
        if (n.includes('sharks'))     return 'sharks'
        if (n.includes('storm'))      return 'storm'
        if (n.includes('tigers'))     return 'tigers'
        if (n.includes('titans'))     return 'titans'
        if (n.includes('warriors'))   return 'warriors'
        return name?.toLowerCase().replace(/\s+/g, '_') || ''
      }

      // Load header
      fetch('../components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          updateAuthNav()
          document.getElementById('bmc-button').innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height:40px;width:145px;">
            </a>`
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })

      // Show-more toggle for individual match cards (delegated, registered once)
      matchesEl.addEventListener('click', e => {
        const btn = e.target.closest('.lb-ind-show-more-btn')
        if (!btn) return
        const gameId   = btn.dataset.gameId
        const moreRows = document.getElementById(`lb-more-rows-${gameId}`)
        const meRow    = document.getElementById(`lb-me-row-${gameId}`)
        if (!moreRows) return
        const expanded = moreRows.style.display !== 'none'
        moreRows.style.display = expanded ? 'none' : 'block'
        if (meRow) meRow.style.display = expanded ? '' : 'none'
        btn.textContent = expanded
          ? `Show all ${btn.dataset.total} players \u25bc`
          : `Show fewer \u25b2`
      })

      // Username click → user tips modal (delegated on sidebar panels + match tiles)
      ;[seasonPanel, weekPanel, hofPanel, matchesEl].forEach(panel => {
        panel.addEventListener('click', e => {
          const link = e.target.closest('.user-tip-link')
          if (!link) return
          const uid      = link.dataset.uid
          const username = link.dataset.username
          const round    = currentDisplayRound
          if (!uid || !round) return
          e.stopPropagation()
          openUserTipsModal(uid, username, round)
        })
      })

      // Close modal on backdrop click
      document.getElementById('user-tips-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) e.currentTarget.classList.remove('open')
      })

      // Close modal on Escape
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('user-tips-modal').classList.remove('open')
      })

      loadLeaderboard()
      loadHallOfFame()

      // ─── BS Tipping Cup ────────────────────────────────────────────────────

      let cupViewRound = null   // which cup_round the H2H card is displaying

      async function loadCup() {
        const season = new Date().getFullYear()
        let cups = []
        try {
          const r = await fetch(`${BACKEND_ROOT}/api/cups?season=${season}`)
          if (r.ok) cups = await r.json()
        } catch (e) {
          console.warn('[cup] fetch cups failed:', e)
        }

        if (!cups.length) {
          matchesEl.innerHTML = `
            <div style="padding:3rem;text-align:center;color:#4a5568;">
              <div style="font-size:1.5rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin-bottom:0.5rem;">No BS Cup this season yet.</div>
              <div style="font-size:0.875rem;">Check back once the cup is announced.</div>
            </div>`
          return
        }

        // Default: most recent active cup, else most recent overall
        const activeCup = cups.find(c => c.status === 'active') || cups[0]
        let selectedCupId = activeCup.id

        const selectorHtml = cups.length > 1
          ? `<select id="cup-selector" class="round-filter" style="margin-bottom:1rem;">
              ${cups.map(c => `<option value="${c.id}" ${c.id === activeCup.id ? 'selected' : ''}>${escapeHtml(c.name)} (${c.status})</option>`).join('')}
             </select>`
          : ''

        matchesEl.innerHTML = `${selectorHtml}<div id="cup-content"></div>`

        if (cups.length > 1) {
          document.getElementById('cup-selector').addEventListener('change', async function () {
            selectedCupId = parseInt(this.value)
            cupViewRound  = null
            await renderCup(selectedCupId)
          })
        }

        await renderCup(selectedCupId)
      }

      async function renderCup(cupId) {
        const contentEl = document.getElementById('cup-content')
        if (!contentEl) return
        contentEl.innerHTML = `<div class="p-8 animate-pulse" style="color:#4a5568;">Loading bracket…</div>`

        let data = null
        try {
          const r = await fetch(`${BACKEND_ROOT}/api/cups/${cupId}`)
          if (r.ok) data = await r.json()
        } catch (e) {
          console.warn('[cup] fetch cup failed:', e)
        }
        if (!data) {
          contentEl.innerHTML = `<div style="color:#f87171;padding:1rem;">Failed to load cup data.</div>`
          return
        }

        const { cup, participants, matchups } = data

        // Build lookup maps
        const userMap = {}
        participants.forEach(p => { userMap[p.user_id] = p })

        // Group matchups by cup_round
        const byRound = {}
        matchups.forEach(m => {
          if (!byRound[m.cup_round]) byRound[m.cup_round] = []
          byRound[m.cup_round].push(m)
        })
        const roundNums   = Object.keys(byRound).map(Number).sort((a,b) => a-b)
        const totalRounds = roundNums.length  // total elimination rounds in the bracket

        // Round labels (distance from final)
        function roundLabel(cupRound) {
          const fromEnd = totalRounds - cupRound
          if (fromEnd === 0) return 'Grand Final'
          if (fromEnd === 1) return 'Semi Finals'
          if (fromEnd === 2) return 'Quarter Finals'
          const r1Players = (byRound[cupRound] || []).length * 2
          return `Round of ${r1Players}`
        }

        // Status badge
        const statusColors = {
          seeding:  'background:rgba(59,130,246,0.15);color:#60a5fa;border-color:rgba(59,130,246,0.3)',
          active:   'background:rgba(34,197,94,0.15);color:#4ade80;border-color:rgba(34,197,94,0.3)',
          complete: 'background:rgba(245,158,11,0.15);color:#fbbf24;border-color:rgba(245,158,11,0.3)',
        }
        const statusStyle = statusColors[cup.status] || ''
        const statusBadge = `<span style="${statusStyle};border:1px solid;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;padding:2px 7px;text-transform:uppercase;vertical-align:middle;">${cup.status}</span>`

        // My H2H card (if logged in and participant)
        const myH2H = myUserId && userMap[myUserId]
          ? buildMyH2H(cup, byRound, roundNums, userMap, matchups)
          : ''

        // Bracket columns
        const bracketCols = roundNums.map(r => {
          const rMatchups = byRound[r]
          const cards = rMatchups.map(m => matchupCard(m, userMap, cup.current_cup_round)).join('')
          return `
            <div class="cup-round-col">
              <div style="text-align:center;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#4a5568;margin-bottom:0.4rem;">${roundLabel(r)}</div>
              ${cards}
            </div>`
        }).join('')

        // Champion banner
        const champBanner = cup.status === 'complete' && cup.winner_id
          ? (() => {
              const champ = userMap[cup.winner_id] || {}
              return `<div style="background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.35);border-radius:10px;padding:0.875rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;">
                <span style="font-size:1.4rem;">🏆</span>
                <div>
                  <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#f59e0b;margin-bottom:0.1rem;">BS Tipping Cup Champion</div>
                  <div style="font-size:1.1rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;">${escapeHtml(champ.username || 'Unknown')}</div>
                </div>
              </div>`
            })()
          : ''

        contentEl.innerHTML = `
          <div style="margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
            <h2 style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.5rem;font-weight:700;">${escapeHtml(cup.name)}</h2>
            ${statusBadge}
            <span style="font-size:0.75rem;color:#4a5568;margin-left:auto;">Seeding Rd ${cup.seeding_round} · ${participants.length} players · ${cup.bracket_size}-bracket</span>
          </div>
          ${champBanner}
          ${myH2H}
          <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#4a5568;margin-bottom:0.75rem;">Full Bracket</div>
          <div class="cup-bracket">${bracketCols}</div>`
      }

      function matchupCard(m, userMap, currentCupRound) {
        function playerRow(uid, score, isWinner, otherUid) {
          if (!uid) return `<div class="cup-player-row cup-bye">— BYE —</div>`
          const p        = userMap[uid] || {}
          const isMe     = uid === myUserId
          const isLoser  = m.winner_id && m.winner_id !== uid
          const classes  = ['cup-player-row', isWinner ? 'cup-winner' : '', isLoser ? 'cup-eliminated' : '', isMe ? 'cup-me' : ''].filter(Boolean).join(' ')
          const logo     = p.favourite_team
            ? `<img src="../logos/${teamSlug(p.favourite_team)}.svg" style="width:1rem;height:1rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">`
            : ''
          const seedBadge = p.seed ? `<span style="font-size:0.62rem;color:#4a5568;flex-shrink:0;">#${p.seed}</span>` : ''
          const name     = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(p.username || 'Unknown')}</span>`
          const pts      = score != null
            ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:700;margin-left:auto;flex-shrink:0;">${parseFloat(score).toFixed(1)}</span>`
            : ''
          return `<div class="${classes}">${logo}${seedBadge}${name}${pts}</div>`
        }

        const isPending = !m.is_bye && !m.winner_id && m.cup_round === currentCupRound
        const cardClass = isPending ? 'cup-matchup-card cup-active' : 'cup-matchup-card'

        return `
          <div class="${cardClass}">
            ${playerRow(m.player_a_id, m.score_a, m.winner_id === m.player_a_id)}
            ${m.is_bye ? '' : playerRow(m.player_b_id, m.score_b, m.winner_id === m.player_b_id)}
            ${isPending ? `<div style="padding:2px 6px;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;color:#f59e0b;text-transform:uppercase;text-align:center;background:rgba(245,158,11,0.06);">NRL Rd ${m.nrl_round} — Pending</div>` : ''}
          </div>`
      }

      function buildMyH2H(cup, byRound, roundNums, userMap, matchups) {
        // Find all matchups involving me
        const myMatchups = matchups.filter(m =>
          m.player_a_id === myUserId || m.player_b_id === myUserId)
        if (!myMatchups.length) return ''

        // Determine which cup_round to show (default: current or most recent)
        const currentCupRound = cup.current_cup_round || 1
        if (cupViewRound === null) cupViewRound = currentCupRound

        // Clamp to available rounds with my matchups
        const myRounds = [...new Set(myMatchups.map(m => m.cup_round))].sort((a,b)=>a-b)
        if (!myRounds.includes(cupViewRound)) cupViewRound = myRounds[myRounds.length - 1]

        const myMatchup = myMatchups.find(m => m.cup_round === cupViewRound)
        if (!myMatchup) return ''

        const oppId   = myMatchup.player_a_id === myUserId ? myMatchup.player_b_id : myMatchup.player_a_id
        const myScore = myMatchup.player_a_id === myUserId ? myMatchup.score_a : myMatchup.score_b
        const oppScore= myMatchup.player_a_id === myUserId ? myMatchup.score_b : myMatchup.score_a

        const me  = userMap[myUserId] || {}
        const opp = oppId ? (userMap[oppId] || {}) : null

        const iWon  = myMatchup.winner_id === myUserId
        const oppWon= myMatchup.winner_id === oppId
        const isBye = myMatchup.is_bye

        // Round navigation
        const totalMyRounds = myRounds.length
        const myRoundIdx    = myRounds.indexOf(cupViewRound)
        const prevRound     = myRoundIdx > 0 ? myRounds[myRoundIdx - 1] : null
        const nextRound     = myRoundIdx < totalMyRounds - 1 ? myRounds[myRoundIdx + 1] : null

        function navBtn(roundNum, label) {
          if (!roundNum) return `<span style="visibility:hidden;">${label}</span>`
          return `<button onclick="cupViewRound=${roundNum};document.getElementById('cup-h2h-section').outerHTML=buildMyH2H(window._cupRenderCache?.cup,window._cupRenderCache?.byRound,window._cupRenderCache?.roundNums,window._cupRenderCache?.userMap,window._cupRenderCache?.matchups)" style="background:rgba(255,255,255,0.05);border:1px solid #2e3a4e;border-radius:6px;padding:0.3rem 0.75rem;font-size:0.75rem;cursor:pointer;color:#94a3b8;">${label}</button>`
        }

        const roundLabels2 = { }
        const totalRounds = roundNums.length
        roundNums.forEach(r => {
          const fromEnd = totalRounds - r
          roundLabels2[r] = fromEnd === 0 ? 'Grand Final' : fromEnd === 1 ? 'Semi Final' : fromEnd === 2 ? 'Quarter Final' : `Cup Round ${r}`
        })

        const resultLabel = isBye
          ? `<span style="color:#4ade80;font-weight:700;">BYE — Advanced automatically</span>`
          : myMatchup.winner_id
            ? (iWon
                ? `<span style="color:#4ade80;font-weight:700;">You won! ✓</span>`
                : `<span style="color:#f87171;font-weight:700;">Eliminated</span>`)
            : `<span style="color:#f59e0b;font-weight:700;">In progress — NRL Rd ${myMatchup.nrl_round}</span>`

        // Opponent info
        const oppBlock = isBye || !opp
          ? `<div style="flex:1;text-align:center;color:#4a5568;font-style:italic;">— BYE —</div>`
          : (() => {
              const oppLogo = opp.favourite_team
                ? `<img src="../logos/${teamSlug(opp.favourite_team)}.svg" style="width:1.5rem;height:1.5rem;object-fit:contain;" onerror="this.style.display='none'">`
                : ''
              const oppPts = oppScore != null
                ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;${oppWon?'color:#fbbf24':''};">${parseFloat(oppScore).toFixed(1)}</span>`
                : `<span style="color:#4a5568;font-size:0.875rem;">TBD</span>`
              return `<div style="flex:1;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem;">
                <div style="display:flex;align-items:center;gap:0.4rem;">${oppLogo}<span style="font-weight:600;${oppWon?'color:#fbbf24':''}">${escapeHtml(opp.username||'Opponent')}</span><span style="font-size:0.7rem;color:#4a5568;">#${opp.seed||'?'}</span></div>
                ${oppPts}
              </div>`
            })()

        const myPts = myScore != null
          ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;${iWon?'color:#fbbf24':''};">${parseFloat(myScore).toFixed(1)}</span>`
          : `<span style="color:#4a5568;font-size:0.875rem;">TBD</span>`

        const myLogo = me.favourite_team
          ? `<img src="../logos/${teamSlug(me.favourite_team)}.svg" style="width:1.5rem;height:1.5rem;object-fit:contain;" onerror="this.style.display='none'">`
          : ''

        return `
          <div id="cup-h2h-section" style="margin-bottom:1.5rem;">
            <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#4a5568;margin-bottom:0.6rem;">My Match-Up — ${roundLabels2[cupViewRound] || ''}</div>
            <div class="cup-h2h-card">
              <!-- Header: me vs opp -->
              <div style="display:flex;align-items:center;gap:0.5rem;padding:0.875rem 1rem;border-bottom:1px solid #1e2a3a;">
                <div style="flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:0.25rem;">
                  <div style="display:flex;align-items:center;gap:0.4rem;">${myLogo}<span style="font-weight:600;${iWon?'color:#fbbf24':''}">${escapeHtml(me.username||'You')}</span><span style="font-size:0.7rem;color:#4a5568;">#${me.seed||'?'}</span></div>
                  ${myPts}
                </div>
                <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:#4a5568;padding:0 0.5rem;">vs</div>
                ${oppBlock}
              </div>
              <!-- Result -->
              <div style="padding:0.45rem 1rem;border-bottom:1px solid #1e2a3a;font-size:0.8rem;">${resultLabel}</div>
              <!-- Nav -->
              <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0.75rem;">
                <button data-cup-nav="${prevRound || ''}" style="background:rgba(255,255,255,0.05);border:1px solid #2e3a4e;border-radius:6px;padding:0.3rem 0.75rem;font-size:0.75rem;cursor:pointer;color:#94a3b8;${!prevRound?'opacity:0.3;pointer-events:none':''}">&larr; Prev</button>
                <span style="font-size:0.75rem;color:#4a5568;">${roundLabels2[cupViewRound] || `Round ${cupViewRound}`}</span>
                <button data-cup-nav="${nextRound || ''}" style="background:rgba(255,255,255,0.05);border:1px solid #2e3a4e;border-radius:6px;padding:0.3rem 0.75rem;font-size:0.75rem;cursor:pointer;color:#94a3b8;${!nextRound?'opacity:0.3;pointer-events:none':''}">Next &rarr;</button>
              </div>
            </div>
          </div>`
      }

      // H2H round navigation (event delegation)
      matchesEl.addEventListener('click', async e => {
        const btn = e.target.closest('[data-cup-nav]')
        if (!btn || activeTab !== 'cup') return
        const navRound = parseInt(btn.dataset.cupNav)
        if (!navRound) return
        cupViewRound = navRound
        // Re-render just the H2H section by re-running renderCup for current cup
        const sel = document.getElementById('cup-selector')
        const cupId = sel ? parseInt(sel.value) : null
        if (cupId) await renderCup(cupId)
        else {
          // Only one cup — re-fetch cups to get the id
          const r = await fetch(`${BACKEND_ROOT}/api/cups?season=${new Date().getFullYear()}`)
          if (r.ok) {
            const cups = await r.json()
            if (cups.length) await renderCup(cups[0].id)
          }
        }
      })

      // ───────────────────────────────────────────────────────────────────────
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
