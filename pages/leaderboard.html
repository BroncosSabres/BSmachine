              ? `<img src="../logos/${teamSlug(s.key)}.svg" style="width:11px;height:11px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">`
              : ''
            return `<button class="dist-subset-pill" data-game-id="${gameId}" data-key="${escapeHtml(s.key)}"
              style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
                     border:1px solid ${active ? s.color : 'rgba(255,255,255,0.1)'};
                     background:${active ? `rgba(${rgb},0.15)` : 'transparent'};
                     color:${active ? s.color : '#4a5568'};cursor:pointer;
                     font-size:0.65rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
                     font-family:'Barlow',system-ui,sans-serif;white-space:nowrap;transition:all 0.15s;">
              ${logo}${escapeHtml(s.label)}<span style="opacity:0.5;font-weight:400;margin-left:2px;">${s.margins.length}</span>
            </button>`
          }).join('')
        }

        function buildLegend(gameId) {
          const el = document.getElementById(`dist-legend-${gameId}`)
          if (!el) return
          const { available, selected } = gameSubsetState[gameId]
          const sel = available.filter(s => selected.has(s.key))
          el.innerHTML = [
            `<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;background:#f59e0b;display:inline-block;border-radius:1px;"></span>BS Machine</span>`,
            ...sel.map(s => `<span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;background:rgba(${hexToRgb(s.color)},0.35);display:inline-block;border-radius:2px;border:1px solid ${s.color};"></span>${escapeHtml(s.label)}</span>`),
            `<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;background:#f87171;display:inline-block;border-radius:1px;border-top:2px dashed #f87171;"></span>Result</span>`,
          ].join('')
        }

        function redrawDistCharts(gameId) {
          const state = gameSubsetState[gameId]
          if (!state) return
          distCharts[`m-${gameId}`]?.destroy(); delete distCharts[`m-${gameId}`]
          distCharts[`t-${gameId}`]?.destroy(); delete distCharts[`t-${gameId}`]
          const sel     = state.available.filter(s => state.selected.has(s.key))
          const allSub  = state.available.find(s => s.key === '__all__')
          const allMargins = allSub?.margins ?? []
          const allTotals  = allSub?.totals  ?? []
          distCharts[`m-${gameId}`] = renderDistChart(`dist-m-${gameId}`, state.machineDist?.margins, sel.map(s => ({ color: s.color, values: s.margins, label: s.label })), state.actualMargin, 'Margin (home – away, pts)', gameId, 'margin', allMargins)
          distCharts[`t-${gameId}`] = renderDistChart(`dist-t-${gameId}`, state.machineDist?.totals,  sel.map(s => ({ color: s.color, values: s.totals,  label: s.label })), state.actualTotal,  'Total points',             gameId, 'total',  allTotals)
          buildLegend(gameId)
        }

        // Pill toggle — event-delegated so it works after innerHTML replacements
        matchesEl.addEventListener('click', e => {
          const pill = e.target.closest('.dist-subset-pill')
          if (!pill) return
          const gameId = pill.dataset.gameId
          const key    = pill.dataset.key
          const state  = gameSubsetState[gameId]
          if (!state) return
          if (state.selected.has(key)) {
            if (state.selected.size === 1) return  // keep at least one selected
            state.selected.delete(key)
          } else {
            state.selected.add(key)
          }
          buildSubsetSelector(gameId)
          redrawDistCharts(gameId)
        })

        matchesEl.querySelectorAll('.dist-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const gameId    = btn.dataset.gameId
            const container = document.getElementById(`dist-container-${gameId}`)
            if (!container) return
            const isOpen = container.style.display !== 'none'

            if (isOpen) {
              container.style.display = 'none'
              btn.querySelector('.dist-toggle-label').textContent = 'Show Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▼'
              distCharts[`m-${gameId}`]?.destroy(); delete distCharts[`m-${gameId}`]
              distCharts[`t-${gameId}`]?.destroy(); delete distCharts[`t-${gameId}`]
              delete gameSubsetState[gameId]
            } else {
              container.style.display = 'block'
              btn.querySelector('.dist-toggle-label').textContent = 'Hide Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▲'

              const game        = roundGames.find(g => String(g.game_id) === String(gameId))
              const machineDist = machineDistByGame[gameId]
              const gamePicks   = picksByGame[gameId] || []
              const actualMargin = game.home_score - game.away_score
              const actualTotal  = game.home_score + game.away_score

              // Build available subsets (All Users + per-team subsets with picks in this game)
              const available = []
              const allMargins = gamePicks.map(p => p.home_score_pick - p.away_score_pick)
              const allTotals  = gamePicks.map(p => p.home_score_pick + p.away_score_pick)
              available.push({ key: '__all__', label: 'All Users', margins: allMargins, totals: allTotals })

              ;[...fanTeams].sort().forEach(teamKey => {
                const sub = gamePicks.filter(p =>
                  teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
                )
                if (!sub.length) return
                available.push({
                  key:     teamKey,
                  label:   teamKey === '__no_team__' ? 'No Team' : teamKey,
                  margins: sub.map(p => p.home_score_pick - p.away_score_pick),
                  totals:  sub.map(p => p.home_score_pick + p.away_score_pick),
                })
              })

              available.forEach((s, i) => { s.color = SUBSET_PALETTE[i % SUBSET_PALETTE.length] })

              gameSubsetState[gameId] = { available, selected: new Set(['__all__']), game, machineDist, actualMargin, actualTotal }
              buildSubsetSelector(gameId)
              redrawDistCharts(gameId)
            }
          })
        })
      }

      // --- User tips modal ---
      async function openUserTipsModal(userId, username, roundNumber) {
        const modal  = document.getElementById('user-tips-modal')
        const header = document.getElementById('user-tips-header')
        const body   = document.getElementById('user-tips-body')

        const headerBase = (logoHtml) => `
          <div style="display:flex;align-items:center;gap:0.75rem;flex:1;min-width:0;">
            ${logoHtml}
            <div style="min-width:0;">
              <div style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.125rem;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(username)}</div>
              <div style="font-size:0.7rem;color:#4a5568;margin-top:1px;">Round ${roundNumber} locked tips</div>
            </div>
          </div>
          <button id="user-tips-close" aria-label="Close"
            style="background:none;border:1px solid #2e3a4e;border-radius:6px;color:#4a5568;font-size:0.875rem;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color 0.1s,color 0.1s;"
            onmouseover="this.style.borderColor='#4a5568';this.style.color='#e2e8f0';"
            onmouseout="this.style.borderColor='#2e3a4e';this.style.color='#4a5568';">✕</button>`

        header.innerHTML = headerBase('')
        body.innerHTML   = `<div style="padding:2.5rem;text-align:center;color:#4a5568;" class="animate-pulse">Loading tips…</div>`
        modal.classList.add('open')
        document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))

        // Fetch games, picks, scores, profile in parallel
        const { data: games } = await supabase
          .from('games')
          .select('game_id, home_team, away_team, home_score, away_score, is_complete')
          .eq('round_number', roundNumber)
          .order('game_id', { ascending: true })

        if (!games?.length) {
          body.innerHTML = `<div style="padding:2rem;text-align:center;color:#4a5568;">No games found for Round ${roundNumber}.</div>`
          return
        }

        const gameIds = games.map(g => g.game_id)

        const [{ data: userPicks }, { data: userScores }, { data: profile }] = await Promise.all([
          supabase.from('picks').select('game_id, home_score_pick, away_score_pick').eq('user_id', userId).in('game_id', gameIds),
          supabase.from('scores').select('game_id, points, margin_score, total_score').eq('user_id', userId).eq('round_number', roundNumber),
          supabase.from('profiles').select('favourite_team').eq('id', userId).single(),
        ])

        // Update header with team logo once profile loaded
        const favTeam  = profile?.favourite_team || null
        const logoHtml = favTeam
          ? `<img src="../logos/${teamSlug(favTeam)}.svg" style="width:2rem;height:2rem;object-fit:contain;flex-shrink:0;opacity:0.85;" onerror="this.style.display='none'">`
          : ''
        header.innerHTML = headerBase(logoHtml)
        document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))

        const pickMap  = {}
        userPicks?.forEach(p => { pickMap[p.game_id] = p })
        const scoreMap = {}
        userScores?.forEach(s => { scoreMap[s.game_id] = s })

        // Compute live bell-curve scores for unscored live games
        if (liveRoundNumber === roundNumber) {
          for (const [gid, lg] of Object.entries(liveGameMap)) {
            const gameId = Number(gid)
            if (scoreMap[gameId] || lg.home_score == null) continue
            const p = pickMap[gameId]
            if (!p) continue
            const ms = bellScore((lg.home_score - lg.away_score) - (p.home_score_pick - p.away_score_pick))
            const ts = bellScore((lg.home_score + lg.away_score) - (p.home_score_pick + p.away_score_pick))
            scoreMap[gameId] = { game_id: gameId, margin_score: ms, total_score: ts, points: ms + ts }
          }
        }

        let totalPts   = 0
        let pickedCount = 0

        const rows = games.map(game => {
          const lg       = liveRoundNumber === roundNumber ? liveGameMap[game.game_id] : null
          const homeScore = lg?.home_score ?? game.home_score
          const awayScore = lg?.away_score ?? game.away_score
          const hasScore  = homeScore != null && awayScore != null
          const isLive    = lg?.is_live === true

          const pick  = pickMap[game.game_id]
          const score = scoreMap[game.game_id]
          if (pick)  pickedCount++
          if (score) totalPts += score.points

          const actualDisplay = hasScore
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.25rem;font-weight:700;color:#e2e8f0;letter-spacing:0.03em;">${homeScore}–${awayScore}</span>${isLive ? '<br><span style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}`
            : `<span style="font-size:0.7rem;font-weight:600;color:#2e3a4e;text-transform:uppercase;letter-spacing:0.05em;">Upcoming</span>`

          const pickDisplay = pick
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.9rem;font-weight:600;color:#cbd5e1;">${pick.home_score_pick}–${pick.away_score_pick}</span>`
            : `<span style="font-size:0.75rem;color:#2e3a4e;font-style:italic;">No pick</span>`

          const mScore  = score?.margin_score != null ? score.margin_score.toFixed(1) : null
          const tScore  = score?.total_score  != null ? score.total_score.toFixed(1)  : null
          const ptsStr  = score ? score.points.toFixed(1) : null

          const scoreFragment = ptsStr
            ? `<div style="display:flex;align-items:center;gap:0.5rem;">
                <span style="font-size:0.7rem;color:#4a5568;">M:<span style="color:#8892a4;margin-left:2px;">${mScore}</span></span>
                <span style="font-size:0.7rem;color:#4a5568;">T:<span style="color:#8892a4;margin-left:2px;">${tScore}</span></span>
                <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${ptsStr}</span>
              </div>`
            : `<span style="font-size:0.75rem;color:#2e3a4e;">—</span>`

          return `
            <div style="border-bottom:1px solid #1e2a3a;padding:0.625rem 1.25rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.3rem;">
                <div style="display:flex;align-items:center;gap:0.375rem;flex:1;justify-content:flex-end;min-width:0;">
                  <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:4.5rem;line-height:1.3;">${actualDisplay}</div>
                <div style="display:flex;align-items:center;gap:0.375rem;flex:1;min-width:0;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                  <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                <div style="font-size:0.7rem;color:#4a5568;">Pick: ${pickDisplay}</div>
                ${scoreFragment}
              </div>
            </div>`
        })

        body.innerHTML = rows.join('') + `
          <div style="padding:0.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;background:#0f1117;flex-shrink:0;">
            <span style="font-size:0.75rem;color:#4a5568;">${pickedCount} of ${games.length} games picked</span>
            <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:#e2e8f0;">${totalPts.toFixed(1)} pts</span>
          </div>`
      }

      function emptyState(msg) {
        return `<div class="p-10 text-center text-sm" style="color:#4a5568;">${msg}</div>`
      }

      function escapeHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function teamSlug(name) {
        const n = (name || '').toLowerCase()
        if (n.includes('broncos'))    return 'broncos'
        if (n.includes('bulldogs'))   return 'bulldogs'
        if (n.includes('cowboys'))    return 'cowboys'
        if (n.includes('dolphins'))   return 'dolphins'
        if (n.includes('dragons'))    return 'dragons'
        if (n.includes('eels'))       return 'eels'
        if (n.includes('knights'))    return 'knights'
        if (n.includes('sea eagles') || n.includes('manly')) return 'manly'
        if (n.includes('panthers'))   return 'panthers'
        if (n.includes('rabbitohs'))  return 'rabbitohs'
        if (n.includes('raiders'))    return 'raiders'
        if (n.includes('roosters'))   return 'roosters'
        if (n.includes('sharks'))     return 'sharks'
        if (n.includes('storm'))      return 'storm'
        if (n.includes('tigers'))     return 'tigers'
        if (n.includes('titans'))     return 'titans'
        if (n.includes('warriors'))   return 'warriors'
        return name?.toLowerCase().replace(/\s+/g, '_') || ''
      }

      // Load header
      fetch('../components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          updateAuthNav()
          document.getElementById('bmc-button').innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height:40px;width:145px;">
            </a>`
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })

      // Show-more toggle for individual match cards (delegated, registered once)
      matchesEl.addEventListener('click', e => {
        const btn = e.target.closest('.lb-ind-show-more-btn')
        if (!btn) return
        const gameId   = btn.dataset.gameId
        const moreRows = document.getElementById(`lb-more-rows-${gameId}`)
        const meRow    = document.getElementById(`lb-me-row-${gameId}`)
        if (!moreRows) return
        const expanded = moreRows.style.display !== 'none'
        moreRows.style.display = expanded ? 'none' : 'block'
        if (meRow) meRow.style.display = expanded ? '' : 'none'
        btn.textContent = expanded
          ? `Show all ${btn.dataset.total} players \u25bc`
          : `Show fewer \u25b2`
      })

      // Username click → user tips modal (delegated on sidebar panels + match tiles)
      ;[seasonPanel, weekPanel, matchesEl].forEach(panel => {
        panel.addEventListener('click', e => {
          const link = e.target.closest('.user-tip-link')
          if (!link) return
          const uid      = link.dataset.uid
          const username = link.dataset.username
          const round    = currentDisplayRound
          if (!uid || !round) return
          e.stopPropagation()
          openUserTipsModal(uid, username, round)
        })
      })

      // Close modal on backdrop click
      document.getElementById('user-tips-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) e.currentTarget.classList.remove('open')
      })

      // Close modal on Escape
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('user-tips-modal').classList.remove('open')
      })

      loadLeaderboard()
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
