<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard — The BS Machine</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
      .lb-tab {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-family: 'Barlow', system-ui, sans-serif;
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s ease;
        color: #8892a4;
        background: transparent;
      }
      .lb-tab.active {
        background: rgba(245,158,11,0.12);
        border-color: rgba(245,158,11,0.3);
        color: #fbbf24;
      }
      .lb-tab:not(.active):hover {
        background: rgba(255,255,255,0.04);
        color: #e2e8f0;
      }
      .lb-row {
        display: grid;
        align-items: center;
        padding: 0.625rem 0.875rem;
        border-bottom: 1px solid #1e2a3a;
        transition: background 0.1s ease;
      }
      .lb-row:last-child { border-bottom: none; }
      .lb-row:hover { background: rgba(245,158,11,0.03); }
      .rank-badge {
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 700;
        width: 2rem;
        text-align: center;
        color: #4a5568;
      }
      .rank-badge.top1 { color: #fbbf24; }
      .rank-badge.top2 { color: #94a3b8; }
      .rank-badge.top3 { color: #c2906a; }
      .pts-display {
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: #e2e8f0;
      }
      .round-filter {
        background: #0f1117;
        border: 1px solid #2e3a4e;
        border-radius: 8px;
        padding: 0.4rem 0.75rem;
        color: #e2e8f0;
        font-size: 0.8125rem;
        font-family: 'Barlow', system-ui, sans-serif;
        outline: none;
        cursor: pointer;
      }
      .me-row { background: rgba(245,158,11,0.05) !important; }
      .me-row .rank-badge, .me-row .username { color: #fbbf24 !important; }
      .lb-sidebar-panel {
        background: #161b24;
        border: 1px solid #2e3a4e;
        border-radius: 12px;
        overflow: hidden;
        max-height: 420px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body style="background-color:#0f1117; color:#e2e8f0; min-height:100vh;">
    <div id="site-header"></div>

    <main class="max-w-screen-xl mx-auto px-4 py-8">
      <div class="flex items-baseline gap-4 mb-2">
        <h1 style="font-family:'Barlow Condensed',system-ui,sans-serif; font-size:2.25rem; font-weight:700;">Leaderboard</h1>
      </div>
      <p class="mb-6 text-sm" style="color:#8892a4;">Who's outpicking the model?</p>

      <!-- Controls -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-1 p-1 rounded-xl" style="background:#161b24; border:1px solid #2e3a4e;">
          <button class="lb-tab active" data-tab="team">Team</button>
          <button class="lb-tab" data-tab="individual">Individual</button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs uppercase tracking-wider" style="color:#4a5568;">Round</span>
          <select id="round-filter" class="round-filter">
            <option value="season">Full Season</option>
          </select>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="flex flex-col lg:flex-row gap-6 items-start">

        <!-- Match tiles — main area (left on desktop, below leaderboards on mobile) -->
        <div class="flex-1 min-w-0 w-full">
          <div id="lb-matches">
            <div class="p-8 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
          </div>
          <div class="mt-4 flex flex-wrap items-center gap-4 text-xs" style="color:#4a5568;">
            <span id="lb-legend-text">Pts = margin score + total score (max 10/game)</span>
            <span>·</span>
            <span>Bell curve σ=6 (one converted try)</span>
          </div>
        </div>

        <!-- Leaderboard sidebar — top on mobile (order-first), right on desktop -->
        <div class="w-full lg:w-72 xl:w-80 shrink-0 flex flex-col gap-5 order-first lg:order-last">

          <!-- Season leaderboard -->
          <div>
            <div class="text-xs font-semibold uppercase tracking-widest mb-2 px-1" style="color:#4a5568;">Season</div>
            <div id="lb-season-panel" class="lb-sidebar-panel">
              <div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
            </div>
          </div>

          <!-- Weekly leaderboard -->
          <div>
            <div class="text-xs font-semibold uppercase tracking-widest mb-2 px-1" id="lb-week-label" style="color:#4a5568;">This Round</div>
            <div id="lb-week-panel" class="lb-sidebar-panel">
              <div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
            </div>
          </div>

        </div>
      </div>
    </main>

    <script type="module">
      import { supabase, getSession, getProfile, updateAuthNav } from '../js/supabase-client.js'

      const BACKEND = 'https://bsmachine-backend.onrender.com/api'

      let activeTab   = 'team'
      let roundFilter = 'season'
      let myUserId    = null
      let rounds      = []

      const seasonPanel = document.getElementById('lb-season-panel')
      const weekPanel   = document.getElementById('lb-week-panel')
      const matchesEl   = document.getElementById('lb-matches')
      const weekLabel   = document.getElementById('lb-week-label')

      // --- Init ---
      const session = await getSession()
      if (session) myUserId = session.user.id

      const { data: completedRoundRows } = await supabase
        .from('games')
        .select('round_number')
        .eq('is_complete', true)
        .order('round_number', { ascending: false })

      if (completedRoundRows?.length) {
        const seen = new Set()
        rounds = completedRoundRows.filter(r => {
          if (seen.has(r.round_number)) return false
          seen.add(r.round_number)
          return true
        })
        const sel = document.getElementById('round-filter')
        rounds.forEach(r => {
          const opt = document.createElement('option')
          opt.value = r.round_number
          opt.textContent = `Round ${r.round_number}`
          sel.appendChild(opt)
        })
        roundFilter = String(rounds[0].round_number)
        sel.value = roundFilter
      }

      document.getElementById('round-filter').addEventListener('change', function () {
        roundFilter = this.value
        loadLeaderboard()
      })

      document.querySelectorAll('.lb-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'))
          btn.classList.add('active')
          activeTab = btn.dataset.tab
          loadLeaderboard()
        })
      })

      async function loadLeaderboard() {
        const loading = `<div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>`
        seasonPanel.innerHTML = loading
        weekPanel.innerHTML   = loading
        matchesEl.innerHTML   = loading
        if (activeTab === 'individual') await loadIndividual()
        else await loadTeam()
      }

      async function getScores() {
        let query = supabase
          .from('scores')
          .select('user_id, game_id, points, margin_score, total_score, round_number')
        if (roundFilter !== 'season') {
          query = query.eq('round_number', Number(roundFilter))
        }
        const { data, error } = await query
        if (error) return []
        return data
      }

      // --- Individual leaderboard ---
      async function loadIndividual() {
        const [{ data: allSeasonScores }, { data: profiles }] = await Promise.all([
          supabase.from('scores').select('user_id, game_id, points, margin_score, total_score, round_number'),
          supabase.from('profiles').select('id, username, favourite_team'),
        ])

        // Season sidebar panel — full season aggregate
        seasonPanel.innerHTML = buildIndividualCompact(allSeasonScores || [], profiles || [])

        // Determine active round for week panel + match cards
        const activeRound = roundFilter !== 'season' ? Number(roundFilter) : (rounds[0]?.round_number ?? null)

        if (activeRound) {
          weekLabel.textContent = `Round ${activeRound}`
          const roundScores = (allSeasonScores || []).filter(s => s.round_number === activeRound)
          weekPanel.innerHTML = buildIndividualCompact(roundScores, profiles || [])
          matchesEl.innerHTML = await buildMatchCardsHtml(activeRound, profiles || [])
        } else {
          weekPanel.innerHTML = emptyState('No rounds completed yet.')
          matchesEl.innerHTML = emptyState('No matches to display.')
        }
      }

      // Compact individual leaderboard for sidebar panels
      function buildIndividualCompact(scores, profiles) {
        const userMap = {}
        scores.forEach(s => {
          if (!userMap[s.user_id]) userMap[s.user_id] = { pts: 0, games: 0 }
          userMap[s.user_id].pts   += s.points
          userMap[s.user_id].games += 1
        })

        const profileMap = {}
        profiles.forEach(p => { profileMap[p.id] = p })

        const rows = Object.entries(userMap)
          .map(([uid, stats]) => ({
            uid,
            username: profileMap[uid]?.username || 'Unknown',
            team:     profileMap[uid]?.favourite_team || null,
            pts:      stats.pts,
            avg:      stats.games > 0 ? (stats.pts / stats.games).toFixed(2) : '0.00',
          }))
          .sort((a, b) => b.pts - a.pts || b.avg - a.avg)

        if (!rows.length) return emptyState('No scores yet.')

        const ranks = []
        rows.forEach((r, i) => {
          if (i === 0) { ranks.push(1); return }
          ranks.push(rows[i - 1].pts === r.pts && rows[i - 1].avg === r.avg ? ranks[i - 1] : i + 1)
        })
        const rankCounts = {}
        ranks.forEach(rk => { rankCounts[rk] = (rankCounts[rk] || 0) + 1 })

        return rows.map((r, i) => {
          const rank      = ranks[i]
          const isTied    = rankCounts[rank] > 1
          const rankLabel = isTied ? `=${rank}` : `${rank}`
          const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
          const isMe      = r.uid === myUserId
          return `
            <div class="lb-row ${isMe ? 'me-row' : ''}" style="grid-template-columns:2rem 1fr auto auto; gap:0.5rem;">
              <div class="rank-badge ${rankClass}">${rankLabel}</div>
              <div class="flex items-center gap-1.5 min-w-0">
                ${r.team ? `<img src="../logos/${teamSlug(r.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                <span class="username text-sm font-semibold truncate ${isMe ? 'text-amber-400' : ''}">${escapeHtml(r.username)}${isMe ? ' (you)' : ''}</span>
              </div>
              <div class="text-right text-xs" style="color:#4a5568; white-space:nowrap;">${r.avg}</div>
              <div class="pts-display text-right">${r.pts.toFixed(1)}</div>
            </div>`
        }).join('')
      }

      // --- Match cards (per-game breakdown for a specific round) ---
      async function buildMatchCardsHtml(roundNumber, profiles) {
        const [{ data: games }, { data: allScores }] = await Promise.all([
          supabase.from('games')
            .select('game_id, home_team, away_team, home_score, away_score, is_complete')
            .eq('round_number', roundNumber)
            .order('game_id', { ascending: true }),
          supabase.from('scores')
            .select('user_id, game_id, points, margin_score, total_score')
            .eq('round_number', roundNumber),
        ])

        const gameIds = games?.map(g => g.game_id) || []
        const { data: allPicks } = gameIds.length
          ? await supabase.from('picks')
              .select('user_id, game_id, home_score_pick, away_score_pick')
              .in('game_id', gameIds)
          : { data: [] }

        const pickMap = {}
        allPicks?.forEach(p => { pickMap[`${p.user_id}|${p.game_id}`] = p })

        if (!games?.length) return emptyState('No games found for this round.')

        const profileMap = {}
        profiles?.forEach(p => { profileMap[p.id] = p })

        const scoresByGame = {}
        allScores?.forEach(s => {
          if (!scoresByGame[s.game_id]) scoresByGame[s.game_id] = []
          scoresByGame[s.game_id].push(s)
        })

        const cards = games.map(game => {
          const gameScores = (scoresByGame[game.game_id] || [])
            .sort((a, b) => b.points - a.points)

          const totalPts  = gameScores.reduce((sum, s) => sum + s.points, 0)
          const pickers   = gameScores.length
          const top5      = gameScores.slice(0, 5)

          const myEntry   = myUserId ? gameScores.find(s => s.user_id === myUserId) : null
          const myRank    = myEntry  ? gameScores.indexOf(myEntry) + 1 : null
          const myInTop5  = myRank !== null && myRank <= 5

          const isComplete = game.is_complete

          const scoreDisplay = isComplete
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.5rem;font-weight:700;color:#e2e8f0;letter-spacing:0.04em;">${game.home_score} – ${game.away_score}</span>`
            : `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.875rem;font-weight:600;color:#4a5568;letter-spacing:0.06em;text-transform:uppercase;">Upcoming</span>`

          const renderRow = (s, rank, isMe) => {
            const p    = profileMap[s.user_id]
            const name = escapeHtml(p?.username || 'Unknown')
            const team = p?.favourite_team || null
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            const pick = pickMap[`${s.user_id}|${s.game_id}`]
            const pickMargin = pick ? pick.home_score_pick - pick.away_score_pick : null
            const pickTotal  = pick ? pick.home_score_pick + pick.away_score_pick : null
            const predictedScore = pick
              ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.875rem;font-weight:600;color:#8892a4;white-space:nowrap;">${pick.home_score_pick}–${pick.away_score_pick}</span>`
              : `<span style="color:#4a5568;">—</span>`
            const marginPick = pickMargin !== null
              ? `<span style="color:#4a5568;font-size:0.65rem;">(${pickMargin > 0 ? '+' : ''}${pickMargin})</span>`
              : ''
            const totalPick  = pickTotal !== null
              ? `<span style="color:#4a5568;font-size:0.65rem;">(${pickTotal})</span>`
              : ''
            return `
              <div style="display:grid;grid-template-columns:2rem 1fr 4rem 4.5rem 4.5rem 3.5rem;gap:0.5rem;align-items:center;padding:0.5rem 1rem;
                          ${isMe ? 'background:rgba(245,158,11,0.06);border-top:1px solid rgba(245,158,11,0.15);' : 'border-top:1px solid #1e2a3a;'}">
                <div class="rank-badge ${rankClass}" style="${isMe ? 'color:#fbbf24;' : ''}">${rank}</div>
                <div class="flex items-center gap-2 min-w-0">
                  ${team ? `<img src="../logos/${teamSlug(team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-60" onerror="this.style.display='none'">` : ''}
                  <span style="font-size:0.8125rem;font-weight:600;${isMe ? 'color:#fbbf24;' : 'color:#e2e8f0;'}">${name}${isMe ? ' (you)' : ''}</span>
                </div>
                <div style="text-align:right;">${predictedScore}</div>
                <div style="text-align:right;font-size:0.75rem;color:#8892a4;">${s.margin_score?.toFixed(1) ?? '—'} ${marginPick}</div>
                <div style="text-align:right;font-size:0.75rem;color:#8892a4;">${s.total_score?.toFixed(1)  ?? '—'} ${totalPick}</div>
                <div style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${s.points?.toFixed(1) ?? '—'}</div>
              </div>`
          }

          const top5Html = top5.length
            ? top5.map((s, i) => renderRow(s, i + 1, s.user_id === myUserId)).join('')
            : `<div style="padding:0.75rem 1rem;font-size:0.8125rem;color:#4a5568;border-top:1px solid #1e2a3a;">No picks scored yet.</div>`

          const meHtml = (!myInTop5 && myEntry)
            ? renderRow(myEntry, myRank, true)
            : ''

          const noPicks = !isComplete
            ? ''
            : (!myInTop5 && !myEntry && myUserId)
              ? `<div style="padding:0.5rem 1rem;font-size:0.75rem;color:#4a5568;border-top:1px solid rgba(245,158,11,0.15);background:rgba(245,158,11,0.03);">You didn't submit a pick for this game.</div>`
              : ''

          return `
            <div style="background:#161b24;border:1px solid #2e3a4e;border-radius:12px;overflow:hidden;margin-bottom:1rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1rem;background:#0f1117;gap:0.5rem;">
                <div class="flex items-center gap-2 min-w-0" style="flex:1;justify-content:flex-end;">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;text-align:right;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:6rem;">
                  ${scoreDisplay}
                </div>
                <div class="flex items-center gap-2 min-w-0" style="flex:1;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              ${isComplete && pickers > 0 ? `
              <div style="padding:0.375rem 1rem;font-size:0.7rem;color:#4a5568;background:#0f1117;border-top:1px solid #1a2233;border-bottom:1px solid #1e2a3a;">
                ${pickers} picker${pickers !== 1 ? 's' : ''} · ${totalPts.toFixed(1)} pts distributed
              </div>
              <div style="display:grid;grid-template-columns:2rem 1fr 4rem 4.5rem 4.5rem 3.5rem;gap:0.5rem;padding:0.4rem 1rem;background:#0f1117;border-bottom:1px solid #1e2a3a;">
                <div></div>
                <div></div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Pick</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Margin</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Total Pts</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Score</div>
              </div>
              ${top5Html}
              ${meHtml}
              ${noPicks}
              ` : isComplete ? `
              <div style="padding:0.75rem 1rem;font-size:0.8125rem;color:#4a5568;border-top:1px solid #1e2a3a;">No picks submitted for this game.</div>
              ` : ''}
            </div>`
        }).join('')

        return `<div>${cards}</div>`
      }

      // --- Team model leaderboard ---
      async function loadTeam() {
        // Always fetch ALL completed games — needed for the full-season sidebar panel
        const { data: allCompletedGames } = await supabase
          .from('games')
          .select('game_id, round_number, home_team, away_team, home_score, away_score, kickoff_time')
          .eq('is_complete', true)
          .not('home_score', 'is', null)
          .order('kickoff_time', { ascending: true })

        if (!allCompletedGames?.length) {
          seasonPanel.innerHTML = emptyState('No completed games yet.')
          weekPanel.innerHTML   = emptyState('No completed games yet.')
          matchesEl.innerHTML   = ''
          return
        }

        const allGameIds = allCompletedGames.map(g => g.game_id)

        const [{ data: allPicks }, { data: profiles }, ...distResults] = await Promise.all([
          supabase.from('picks')
            .select('user_id, game_id, home_score_pick, away_score_pick')
            .in('game_id', allGameIds),
          supabase.from('profiles').select('id, favourite_team'),
          ...allCompletedGames.map(g =>
            fetch(`${BACKEND}/match_score_distributions/${g.game_id}`)
              .then(r => r.ok ? r.json() : null).catch(() => null)
          ),
        ])

        const machineDistByGame = {}
        allCompletedGames.forEach((g, i) => {
          if (distResults[i]) machineDistByGame[g.game_id] = distResults[i]
        })

        const profileTeamMap = {}
        profiles?.forEach(p => { profileTeamMap[p.id] = p.favourite_team || null })

        const picksByGame = {}
        allPicks?.forEach(p => {
          if (p.home_score_pick == null || p.away_score_pick == null) return
          if (!picksByGame[p.game_id]) picksByGame[p.game_id] = []
          picksByGame[p.game_id].push(p)
        })

        // Normal distribution helpers
        function lbMean(arr) {
          return arr.reduce((s, v) => s + v, 0) / arr.length
        }
        function lbStddev(arr) {
          if (arr.length < 2) return 6
          const mu = lbMean(arr)
          return Math.max(Math.sqrt(arr.reduce((s, v) => s + (v - mu) ** 2, 0) / arr.length), 1)
        }
        function lbNormCdf(x) {
          const t = 1 / (1 + 0.2316419 * Math.abs(x))
          const poly = t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))))
          const p = 1 - (Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI)) * poly
          return x >= 0 ? p : 1 - p
        }

        // Score a machine distribution (discrete {x, prob} array) against the actual result
        function computeMachineScore(distribution, actual) {
          let pGte = 0, pLte = 0
          for (const { x, prob } of distribution) {
            if (x >= actual) pGte += prob
            if (x <= actual) pLte += prob
          }
          const score = Math.min(pGte, pLte)
          const label = pGte <= pLte
            ? `P(>${(actual - 0.5).toFixed(1)})`
            : `P(<${(actual + 0.5).toFixed(1)})`
          return { score, label }
        }

        // Score a user normal distribution ({mu, sigma}) against the actual result
        function computeScore(dist, actual) {
          const pGte  = 1 - lbNormCdf((actual - dist.mu) / dist.sigma)
          const pLte  = lbNormCdf((actual - dist.mu) / dist.sigma)
          const score = Math.min(pGte, pLte)
          const label = pGte <= pLte
            ? `P(>${(actual - 0.5).toFixed(1)})`
            : `P(<${(actual + 0.5).toFixed(1)})`
          return { score, label }
        }

        // Fit normal distributions to margin and total picks
        function picksToDistributions(picks) {
          const margins = picks.map(p => p.home_score_pick - p.away_score_pick)
          const totals  = picks.map(p => p.home_score_pick + p.away_score_pick)
          return {
            margins: { mu: lbMean(margins), sigma: lbStddev(margins) },
            totals:  { mu: lbMean(totals),  sigma: lbStddev(totals)  },
          }
        }

        const pickerIds = new Set(allPicks?.map(p => p.user_id) || [])
        const fanTeams  = new Set()
        pickerIds.forEach(uid => fanTeams.add(profileTeamMap[uid] || '__no_team__'))

        // Score a set of games — returns { teamAcc, perGameData }
        function scoreGames(games) {
          const teamAcc = {}, perGameData = {}

          function addEntry(gameId, key, mResult, tResult) {
            if (!teamAcc[key]) teamAcc[key] = { marginScore: 0, totalScore: 0, games: 0 }
            teamAcc[key].marginScore += mResult.score
            teamAcc[key].totalScore  += tResult.score
            teamAcc[key].games++
            if (!perGameData[gameId]) perGameData[gameId] = {}
            perGameData[gameId][key] = {
              marginScore: mResult.score, marginLabel: mResult.label,
              totalScore:  tResult.score, totalLabel:  tResult.label,
            }
          }

          for (const game of games) {
            const actualMargin = game.home_score - game.away_score
            const actualTotal  = game.home_score + game.away_score
            const gamePicks    = picksByGame[game.game_id] || []
            if (!gamePicks.length) continue

            const machineDist = machineDistByGame[game.game_id]
            if (machineDist?.margins?.length) {
              addEntry(game.game_id, '__machine__',
                computeMachineScore(machineDist.margins, actualMargin),
                computeMachineScore(machineDist.totals,  actualTotal))
            }

            const allDist = picksToDistributions(gamePicks)
            addEntry(game.game_id, '__all__',
              computeScore(allDist.margins, actualMargin),
              computeScore(allDist.totals,  actualTotal))

            for (const teamKey of fanTeams) {
              const sub = gamePicks.filter(p =>
                teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
              )
              if (!sub.length) continue
              const dist = picksToDistributions(sub)
              addEntry(game.game_id, teamKey,
                computeScore(dist.margins, actualMargin),
                computeScore(dist.totals,  actualTotal))
            }
          }
          return { teamAcc, perGameData }
        }

        function buildTeamRows(teamAcc) {
          return Object.entries(teamAcc).map(([key, acc]) => ({
            key,
            label:     key === '__machine__' ? 'BS Machine' : key === '__all__' ? 'All Users' : key === '__no_team__' ? 'I Love My Footy' : key,
            team:      key === '__machine__' || key === '__all__' || key === '__no_team__' ? null : key,
            isMachine: key === '__machine__',
            ...acc,
            total: acc.marginScore + acc.totalScore,
          })).sort((a, b) => b.total - a.total)
        }

        function buildCompactTeamHtml(rows) {
          if (!rows.length) return emptyState('No data yet.')
          const ranks = []
          rows.forEach((r, i) => {
            if (i === 0) { ranks.push(1); return }
            ranks.push(rows[i - 1].total === r.total ? ranks[i - 1] : i + 1)
          })
          const rankCounts = {}
          ranks.forEach(rk => { rankCounts[rk] = (rankCounts[rk] || 0) + 1 })
          const header = `
            <div style="display:grid;grid-template-columns:2rem 1fr 2.75rem 2.75rem 3rem;gap:0.4rem;padding:0.35rem 0.875rem;background:#0f1117;border-bottom:1px solid #1e2a3a;">
              <div></div><div></div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Mgn</div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Tot</div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Score</div>
            </div>`
          const bodyRows = rows.map((r, i) => {
            const rank      = ranks[i]
            const isTied    = rankCounts[rank] > 1
            const rankLabel = isTied ? `=${rank}` : `${rank}`
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            return `
              <div style="display:grid;grid-template-columns:2rem 1fr 2.75rem 2.75rem 3rem;gap:0.4rem;align-items:center;padding:0.55rem 0.875rem;border-bottom:1px solid #1e2a3a;${r.isMachine ? 'border-top:2px solid #2e3a4e;' : ''}">
                <div class="rank-badge ${rankClass}">${rankLabel}</div>
                <div class="flex items-center gap-1.5 min-w-0">
                  ${r.team ? `<img src="../logos/${teamSlug(r.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                  <span class="text-sm truncate" style="font-weight:600;${r.isMachine ? 'color:#f59e0b;' : ''}">${escapeHtml(r.label)}</span>
                </div>
                <div style="text-align:right;font-size:0.7rem;color:#8892a4;">${r.marginScore.toFixed(2)}</div>
                <div style="text-align:right;font-size:0.7rem;color:#8892a4;">${r.totalScore.toFixed(2)}</div>
                <div style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.9rem;font-weight:700;color:${rank === 1 ? '#86efac' : '#e2e8f0'};">${r.total.toFixed(3)}</div>
              </div>`
          }).join('')
          return header + bodyRows
        }

        // Season leaderboard (all games) → sidebar
        const { teamAcc: seasonTeamAcc } = scoreGames(allCompletedGames)
        const seasonRows = buildTeamRows(seasonTeamAcc)
        seasonPanel.innerHTML = `
          <div class="text-xs px-3 py-2 border-b" style="border-color:#1e2a3a;color:#4a5568;">
            Score = min(P(margin ≥ actual), P(margin ≤ actual)) + min(P(total ≥ actual), P(total ≤ actual))
          </div>
          ${buildCompactTeamHtml(seasonRows)}`

        // Determine active round for weekly panel + match tiles
        const activeRound = roundFilter !== 'season' ? Number(roundFilter) : (rounds[0]?.round_number ?? null)
        const roundGames  = activeRound
          ? allCompletedGames.filter(g => g.round_number === activeRound)
          : allCompletedGames.filter(g => g.round_number === allCompletedGames[allCompletedGames.length - 1]?.round_number)

        if (!roundGames.length) {
          weekPanel.innerHTML = emptyState('No games scored for this round.')
          matchesEl.innerHTML = ''
          return
        }

        weekLabel.textContent = `Round ${activeRound || roundGames[0].round_number}`
        const { teamAcc: roundTeamAcc, perGameData } = scoreGames(roundGames)
        const roundRows = buildTeamRows(roundTeamAcc)
        weekPanel.innerHTML = buildCompactTeamHtml(roundRows)

        // Key metadata for tiles
        const keyMeta = {}
        seasonRows.forEach(r => { keyMeta[r.key] = { label: r.label, team: r.team, isMachine: r.isMachine } })

        // Build match tiles for the active round
        const tilesHtml = roundGames.map(game => {
          const gameEntries = perGameData[game.game_id]
          if (!gameEntries) return ''

          const tileRows = Object.entries(gameEntries)
            .map(([key, scores]) => ({
              key,
              meta:        keyMeta[key] || { label: key, team: null, isMachine: false },
              marginScore: scores.marginScore,
              marginLabel: scores.marginLabel,
              totalScore:  scores.totalScore,
              totalLabel:  scores.totalLabel,
              total:       scores.marginScore + scores.totalScore,
            }))
            .sort((a, b) => b.total - a.total)

          const tileRanks = []
          tileRows.forEach((r, i) => {
            if (i === 0) { tileRanks.push(1); return }
            tileRanks.push(tileRows[i - 1].total === r.total ? tileRanks[i - 1] : i + 1)
          })
          const tileRankCounts = {}
          tileRanks.forEach(rk => { tileRankCounts[rk] = (tileRankCounts[rk] || 0) + 1 })

          const tileRowsHtml = tileRows.map((r, i) => {
            const rank      = tileRanks[i]
            const isTied    = tileRankCounts[rank] > 1
            const rankLabel = isTied ? `=${rank}` : `${rank}`
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            return `
              <div style="display:grid;grid-template-columns:2rem 1fr 5.5rem 5.5rem 4rem;gap:0.5rem;align-items:center;padding:0.4rem 1rem;border-top:1px solid #1e2a3a;">
                <div class="rank-badge ${rankClass}">${rankLabel}</div>
                <div class="flex items-center gap-2 min-w-0">
                  ${r.meta.team ? `<img src="../logos/${teamSlug(r.meta.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                  <span style="font-size:0.8125rem;font-weight:600;${r.meta.isMachine ? 'color:#f59e0b;' : 'color:#e2e8f0;'}">${escapeHtml(r.meta.label)}</span>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:0.6rem;color:#4a5568;font-family:monospace;">${r.marginLabel}</div>
                  <div style="font-size:0.75rem;color:#8892a4;">${r.marginScore.toFixed(3)}</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:0.6rem;color:#4a5568;font-family:monospace;">${r.totalLabel}</div>
                  <div style="font-size:0.75rem;color:#8892a4;">${r.totalScore.toFixed(3)}</div>
                </div>
                <div style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:${rank === 1 ? '#86efac' : '#e2e8f0'};">${r.total.toFixed(3)}</div>
              </div>`
          }).join('')

          return `
            <div style="background:#161b24;border:1px solid #2e3a4e;border-radius:12px;overflow:hidden;margin-bottom:1rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1rem;background:#0f1117;gap:0.5rem;">
                <div class="flex items-center gap-2 min-w-0" style="flex:1;justify-content:flex-end;">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;text-align:right;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:6rem;">
                  <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.5rem;font-weight:700;color:#e2e8f0;letter-spacing:0.04em;">${game.home_score} – ${game.away_score}</span>
                </div>
                <div class="flex items-center gap-2 min-w-0" style="flex:1;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:2rem 1fr 5.5rem 5.5rem 4rem;gap:0.5rem;padding:0.4rem 1rem;background:#0f1117;border-top:1px solid #1a2233;border-bottom:1px solid #1e2a3a;">
                <div></div><div></div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Margin</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Total Pts</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Score</div>
              </div>
              ${tileRowsHtml}
              <div style="border-top:1px solid #1e2a3a;padding:0.5rem 1rem;">
                <button class="dist-toggle" data-game-id="${game.game_id}"
                  style="background:none;border:none;color:#4a5568;font-size:0.75rem;font-family:'Barlow',system-ui,sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.4rem;padding:0;letter-spacing:0.04em;text-transform:uppercase;">
                  <span class="dist-toggle-label">Show Distributions</span>
                  <span class="dist-toggle-arrow" style="font-size:0.6rem;">▼</span>
                </button>
              </div>
              <div id="dist-container-${game.game_id}" style="display:none;padding:1rem 1rem 0.5rem;border-top:1px solid #1e2a3a;background:#0f1117;">
                <div style="display:flex;align-items:center;gap:1.25rem;justify-content:center;font-size:0.7rem;color:#4a5568;margin-bottom:1rem;">
                  <span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:18px;height:2px;background:#f59e0b;display:inline-block;border-radius:1px;"></span>BS Machine
                  </span>
                  <span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:12px;height:12px;background:rgba(96,165,250,0.4);display:inline-block;border-radius:2px;border:1px solid rgba(96,165,250,0.7);"></span>All Users
                  </span>
                  <span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:18px;height:2px;background:#f87171;display:inline-block;border-radius:1px;border-top:2px dashed #f87171;"></span>Result
                  </span>
                </div>
                <div style="margin-bottom:1.25rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Margin (home – away)</div>
                  <canvas id="dist-m-${game.game_id}" height="140"></canvas>
                </div>
                <div style="margin-bottom:0.5rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Total Points</div>
                  <canvas id="dist-t-${game.game_id}" height="140"></canvas>
                </div>
              </div>
            </div>`
        }).filter(Boolean)

        matchesEl.innerHTML = tilesHtml.length
          ? `<div>${tilesHtml.join('')}</div>`
          : emptyState('No game data for this round.')

        // Distribution chart handlers
        const distCharts = {}

        function adaptiveBinSize(n) {
          if (n < 5)   return 1
          if (n < 15)  return 2
          if (n < 40)  return 4
          if (n < 100) return 6
          return 8
        }

        function binPickValues(values, binSize) {
          if (!values.length) return []
          const lo = Math.floor(Math.min(...values) / binSize) * binSize
          const hi = Math.floor(Math.max(...values) / binSize) * binSize
          const counts = {}
          for (let b = lo; b <= hi; b += binSize) counts[b] = 0
          values.forEach(v => { const b = Math.floor(v / binSize) * binSize; counts[b] = (counts[b] || 0) + 1 })
          const entries = Object.entries(counts).map(([x, c]) => ({ x: Number(x), y: c })).sort((a, b) => a.x - b.x)
          const total = entries.reduce((s, e) => s + e.y, 0)
          return entries.map(e => ({ x: e.x, y: total > 0 ? e.y / total : 0 }))
        }

        function normaliseMachineBins(rawBins, binSize) {
          const grouped = {}
          rawBins.forEach(({ x, prob }) => { const b = Math.floor(x / binSize) * binSize; grouped[b] = (grouped[b] || 0) + prob })
          return Object.entries(grouped).map(([x, p]) => ({ x: Number(x), y: p })).sort((a, b) => a.x - b.x)
        }

        function renderDistChart(canvasId, machineBins, userBins, actualVal, xTitle) {
          const ctx = document.getElementById(canvasId)?.getContext('2d')
          if (!ctx) return null

          const binSize     = adaptiveBinSize(userBins.length)
          const machineData = machineBins ? normaliseMachineBins(machineBins, Math.max(binSize, 2)) : []
          const userData    = binPickValues(userBins, binSize)

          const allY = [...machineData.map(d => d.y), ...userData.map(d => d.y)]
          const maxY = allY.length ? Math.max(...allY) * 1.15 : 0.3

          const datasets = [
            ...(machineData.length ? [{
              type: 'line',
              data: machineData.map(d => ({ x: d.x, y: d.y })),
              borderColor: '#f59e0b',
              backgroundColor: 'rgba(245,158,11,0.07)',
              borderWidth: 2,
              pointRadius: 0,
              fill: true,
              tension: 0.35,
              order: 3,
            }] : []),
            ...(userData.length ? [{
              type: 'bar',
              data: userData.map(d => ({ x: d.x, y: d.y })),
              backgroundColor: 'rgba(96,165,250,0.4)',
              borderColor: 'rgba(96,165,250,0.7)',
              borderWidth: 1,
              barPercentage: 0.85,
              categoryPercentage: 1,
              order: 2,
            }] : []),
            {
              type: 'line',
              data: [{ x: actualVal, y: 0 }, { x: actualVal, y: maxY }],
              borderColor: '#f87171',
              borderWidth: 2,
              borderDash: [5, 3],
              pointRadius: 0,
              fill: false,
              tension: 0,
              order: 1,
            },
          ]

          return new Chart(ctx, {
            data: { datasets },
            options: {
              responsive: true,
              animation: false,
              plugins: { legend: { display: false }, tooltip: { enabled: false } },
              scales: {
                x: {
                  type: 'linear', offset: false,
                  title: { display: true, text: xTitle, color: '#4a5568', font: { size: 10, weight: '600' }, padding: { top: 4 } },
                  ticks: { maxTicksLimit: 12, color: '#4a5568', font: { size: 10 } },
                  grid: { color: 'rgba(255,255,255,0.04)' },
                  border: { color: 'rgba(255,255,255,0.08)' },
                },
                y: {
                  min: 0, max: maxY,
                  title: { display: true, text: 'Relative frequency', color: '#4a5568', font: { size: 10, weight: '600' }, padding: { bottom: 4 } },
                  ticks: { color: '#4a5568', font: { size: 9 }, callback: v => `${Math.round(v * 100)}%` },
                  grid: { color: 'rgba(255,255,255,0.04)' },
                  border: { color: 'rgba(255,255,255,0.08)' },
                },
              },
            },
          })
        }

        matchesEl.querySelectorAll('.dist-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const gameId    = btn.dataset.gameId
            const container = document.getElementById(`dist-container-${gameId}`)
            if (!container) return
            const isOpen = container.style.display !== 'none'

            if (isOpen) {
              container.style.display = 'none'
              btn.querySelector('.dist-toggle-label').textContent = 'Show Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▼'
              distCharts[`m-${gameId}`]?.destroy(); delete distCharts[`m-${gameId}`]
              distCharts[`t-${gameId}`]?.destroy(); delete distCharts[`t-${gameId}`]
            } else {
              container.style.display = 'block'
              btn.querySelector('.dist-toggle-label').textContent = 'Hide Distributions'
              btn.querySelector('.dist-toggle-arrow').textContent = '▲'

              const game        = roundGames.find(g => String(g.game_id) === String(gameId))
              const machineDist = machineDistByGame[gameId]
              const gamePicks   = picksByGame[gameId] || []

              const userMargins = gamePicks.map(p => p.home_score_pick - p.away_score_pick)
              const userTotals  = gamePicks.map(p => p.home_score_pick + p.away_score_pick)

              const actualMargin = game.home_score - game.away_score
              const actualTotal  = game.home_score + game.away_score

              distCharts[`m-${gameId}`] = renderDistChart(
                `dist-m-${gameId}`,
                machineDist?.margins,
                userMargins,
                actualMargin,
                'Margin (home – away, pts)'
              )
              distCharts[`t-${gameId}`] = renderDistChart(
                `dist-t-${gameId}`,
                machineDist?.totals,
                userTotals,
                actualTotal,
                'Total points'
              )
            }
          })
        })
      }

      function emptyState(msg) {
        return `<div class="p-10 text-center text-sm" style="color:#4a5568;">${msg}</div>`
      }

      function escapeHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function teamSlug(name) {
        const n = (name || '').toLowerCase()
        if (n.includes('broncos'))    return 'broncos'
        if (n.includes('bulldogs'))   return 'bulldogs'
        if (n.includes('cowboys'))    return 'cowboys'
        if (n.includes('dolphins'))   return 'dolphins'
        if (n.includes('dragons'))    return 'dragons'
        if (n.includes('eels'))       return 'eels'
        if (n.includes('knights'))    return 'knights'
        if (n.includes('sea eagles') || n.includes('manly')) return 'manly'
        if (n.includes('panthers'))   return 'panthers'
        if (n.includes('rabbitohs'))  return 'rabbitohs'
        if (n.includes('raiders'))    return 'raiders'
        if (n.includes('roosters'))   return 'roosters'
        if (n.includes('sharks'))     return 'sharks'
        if (n.includes('storm'))      return 'storm'
        if (n.includes('tigers'))     return 'tigers'
        if (n.includes('titans'))     return 'titans'
        if (n.includes('warriors'))   return 'warriors'
        return name?.toLowerCase().replace(/\s+/g, '_') || ''
      }

      // Load header
      fetch('../components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          updateAuthNav()
          document.getElementById('bmc-button').innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height:40px;width:145px;">
            </a>`
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })

      loadLeaderboard()
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
