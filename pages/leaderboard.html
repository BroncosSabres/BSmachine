<html lang="en">
  <head>

    <style>
      .lb-tab {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-family: 'Barlow', system-ui, sans-serif;
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s ease;
        color: #8892a4;
        background: transparent;
      }
      .lb-tab.active {
        background: rgba(245,158,11,0.12);
        border-color: rgba(245,158,11,0.3);
        color: #fbbf24;
      }
      .lb-tab:not(.active):hover {
        background: rgba(255,255,255,0.04);
        color: #e2e8f0;
      }
      .lb-row {
        display: grid;
        align-items: center;
        padding: 0.625rem 0.875rem;
        border-bottom: 1px solid #1e2a3a;
        transition: background 0.1s ease;
      }
      .lb-row:last-child { border-bottom: none; }
      .lb-row:hover { background: rgba(245,158,11,0.03); }
      .rank-badge {
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 700;
        width: 2rem;
        text-align: center;
        color: #4a5568;
      }
      .rank-badge.top1 { color: #fbbf24; }
      .rank-badge.top2 { color: #94a3b8; }
      .rank-badge.top3 { color: #c2906a; }
      .pts-display {
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: #e2e8f0;
      }
      .round-filter {
        background: #0f1117;
        border: 1px solid #2e3a4e;
        border-radius: 8px;
        padding: 0.4rem 0.75rem;
        color: #e2e8f0;
        font-size: 0.8125rem;
        font-family: 'Barlow', system-ui, sans-serif;
        outline: none;
        cursor: pointer;
      }
      .me-row { background: rgba(245,158,11,0.05) !important; }
      .me-row .rank-badge, .me-row .username { color: #fbbf24 !important; }
      .lb-sidebar-panel {
        background: #161b24;
        border: 1px solid #2e3a4e;
        border-radius: 12px;
        overflow: hidden;
        max-height: 420px;
        overflow-y: auto;
      }
      /* Individual match rows - responsive */
      .lb-ind-row {
        display: grid;
        grid-template-columns: 2rem 1fr 4rem 4.5rem 4.5rem 3.5rem;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem 1rem;
      }
      .lb-ind-details { display: none; }
      @media (max-width: 639px) {
        .lb-ind-row {
          grid-template-columns: 2rem 1fr 3.25rem;
          grid-template-rows: auto auto;
          gap: 0.15rem 0.5rem;
          padding: 0.7rem 0.75rem;
        }
        .lb-ind-rank { grid-column: 1; grid-row: 1 / 3; align-self: center; }
        .lb-ind-name { grid-column: 2; grid-row: 1; }
        .lb-ind-pts  { grid-column: 3; grid-row: 1; }
        .lb-ind-pick, .lb-ind-margin, .lb-ind-total { display: none; }
        .lb-ind-details { display: flex; grid-column: 2 / 4; grid-row: 2; gap: 0.35rem; font-size: 0.7rem; color: #8892a4; flex-wrap: wrap; align-items: center; }
        .lb-ind-header { grid-template-columns: 2rem 1fr 3.25rem !important; }
        .lb-ind-header .lb-th-pick,
        .lb-ind-header .lb-th-margin,
        .lb-ind-header .lb-th-total { display: none; }
      }
      /* User tips modal */
      #user-tips-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(3px);
      }
      #user-tips-modal.open { display: flex; }
      .user-tip-link, .team-tip-link {
        cursor: pointer;
        text-decoration: none;
      }
      .user-tip-link:hover, .team-tip-link:hover {
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      /* Team tile rows - responsive */
      .lb-team-tile-row {
        display: grid;
        grid-template-columns: 2rem 1fr 5.5rem 5.5rem 4rem;
        gap: 0.5rem;
        align-items: center;
        padding: 0.4rem 1rem;
        border-top: 1px solid #1e2a3a;
      }
      .lb-team-tile-details { display: none; }
      @media (max-width: 639px) {
        .lb-team-tile-row {
          grid-template-columns: 2rem 1fr 4rem;
          grid-template-rows: auto auto;
          gap: 0.15rem 0.5rem;
          padding: 0.7rem 0.75rem;
        }
        .lb-team-tile-rank { grid-column: 1; grid-row: 1 / 3; align-self: center; }
        .lb-team-tile-name { grid-column: 2; grid-row: 1; }
        .lb-team-tile-score { grid-column: 3; grid-row: 1; }
        .lb-team-tile-margin, .lb-team-tile-total { display: none; }
        .lb-team-tile-details { display: flex; grid-column: 2 / 4; grid-row: 2; gap: 0.35rem; font-size: 0.7rem; color: #8892a4; flex-wrap: wrap; align-items: center; }
        .lb-team-tile-header { grid-template-columns: 2rem 1fr 4rem !important; }
        .lb-team-tile-header .lb-th-margin,
        .lb-team-tile-header .lb-th-total { display: none; }
      }
    </style>
  </head>
  <body style="background-color:#0f1117; color:#e2e8f0; min-height:100vh;">
    <div id="site-header"></div>

    <main class="max-w-screen-xl mx-auto px-4 py-8">
      <div class="flex items-baseline gap-4 mb-2">
        <h1 style="font-family:'Barlow Condensed',system-ui,sans-serif; font-size:2.25rem; font-weight:700;">Leaderboard</h1>
      </div>
      <p class="mb-6 text-sm" style="color:#8892a4;">Who's outpicking the model?</p>

      <!-- Controls -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-1 p-1 rounded-xl" style="background:#161b24; border:1px solid #2e3a4e;">
          <button class="lb-tab active" data-tab="individual">Individual</button>
          <button class="lb-tab" data-tab="team">Team</button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs uppercase tracking-wider" style="color:#4a5568;">Round</span>
          <select id="round-filter" class="round-filter">
            <option value="season">Full Season</option>
          </select>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="flex flex-col lg:flex-row gap-6 items-start">

        <!-- Match tiles — main area (left on desktop, below leaderboards on mobile) -->
        <div class="flex-1 min-w-0 w-full">
          <div id="lb-matches">
            <div class="p-8 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
          </div>
          <div class="mt-4 flex flex-wrap items-center gap-4 text-xs" style="color:#4a5568;">
            <span id="lb-legend-text">Pts = margin score + total score (max 10/game)</span>
            <span>·</span>
            <span>Bell curve σ=6 (one converted try)</span>
          </div>
        </div>

        <!-- Leaderboard sidebar — top on mobile (order-first), right on desktop -->
        <div class="w-full lg:w-72 xl:w-80 shrink-0 flex flex-col gap-5 order-first lg:order-last">

          <!-- Season leaderboard -->
          <div>
            <div class="text-xs font-semibold uppercase tracking-widest mb-2 px-1" style="color:#4a5568;">Season</div>
            <div id="lb-season-panel" class="lb-sidebar-panel">
              <div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
            </div>
          </div>

          <!-- Weekly leaderboard -->
          <div>
            <div class="text-xs font-semibold uppercase tracking-widest mb-2 px-1" id="lb-week-label" style="color:#4a5568;">This Round</div>
            <div id="lb-week-panel" class="lb-sidebar-panel">
              <div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>
            </div>
          </div>

        </div>
      </div>
    </main>

    <!-- User tips modal -->
    <div id="user-tips-modal" role="dialog" aria-modal="true">
      <div style="background:#161b24;border:1px solid #2e3a4e;border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 48px rgba(0,0,0,0.6);">
        <div id="user-tips-header" style="padding:1rem 1.25rem 0.875rem;border-bottom:1px solid #1e2a3a;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;flex-shrink:0;">
          <!-- Populated by JS -->
        </div>
        <div id="user-tips-body" style="overflow-y:auto;flex:1;min-height:0;">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase, getSession, getProfile, updateAuthNav } from '../js/supabase-client.js'

      const BACKEND = 'https://bsmachine-backend.onrender.com/api'

      let activeTab          = 'individual'
      let roundFilter        = 'season'
      let myUserId           = null
      let rounds             = []
      let liveRoundData      = null   // { round_number, games: [...] }
      let liveRoundNumber    = null   // current active round number
      let liveGameMap        = {}     // { [game_id]: game enriched with live scores }
      let currentDisplayRound = null  // round currently shown in the match tiles

      const seasonPanel = document.getElementById('lb-season-panel')
      const weekPanel   = document.getElementById('lb-week-panel')
      const matchesEl   = document.getElementById('lb-matches')
      const weekLabel   = document.getElementById('lb-week-label')

      // --- Init ---
      const session = await getSession()
      if (session) myUserId = session.user.id

      const { data: completedRoundRows } = await supabase
        .from('games')
        .select('round_number')
        .eq('is_complete', true)
        .order('round_number', { ascending: false })

      if (completedRoundRows?.length) {
        const seen = new Set()
        rounds = completedRoundRows.filter(r => {
          if (seen.has(r.round_number)) return false
          seen.add(r.round_number)
          return true
        })
        const sel = document.getElementById('round-filter')
        rounds.forEach(r => {
          const opt = document.createElement('option')
          opt.value = r.round_number
          opt.textContent = `Round ${r.round_number}`
          sel.appendChild(opt)
        })
        roundFilter = String(rounds[0].round_number)
        sel.value = roundFilter
      }

      // Fetch live round data using the same endpoints as the matchups page
      const BACKEND_ROOT = 'https://bsmachine-backend.onrender.com'
      try {
        const [crResp, lrResp] = await Promise.all([
          fetch(`${BACKEND}/current_round_matches/nrl`),
          fetch(`${BACKEND_ROOT}/latest-results`),
        ])
        const currentRoundMatches = crResp.ok ? await crResp.json() : []
        const liveResults         = lrResp.ok  ? await lrResp.json()  : []

        function isWithin3Hours(kickoffTime) {
          if (!kickoffTime) return true
          const cutoff = new Date(new Date(kickoffTime).getTime() + 3 * 60 * 60 * 1000)
          return new Date() < cutoff
        }

        liveRoundNumber = currentRoundMatches?.[0]?.round_number ?? null

        if (liveRoundNumber) {
          const { data: sbRoundGames } = await supabase
            .from('games')
            .select('game_id, home_team, away_team, home_score, away_score, is_complete, kickoff_time, round_number')
            .eq('round_number', liveRoundNumber)

          sbRoundGames?.forEach(g => {
            const lr = liveResults.find(l =>
              teamSlug(g.home_team) === teamSlug(l.home) &&
              teamSlug(g.away_team) === teamSlug(l.away)
            )
            liveGameMap[g.game_id] = {
              ...g,
              home_score: lr?.home_score ?? g.home_score,
              away_score: lr?.away_score ?? g.away_score,
              is_live: lr != null && !g.is_complete && isWithin3Hours(g.kickoff_time),
            }
          })

          liveRoundData = { round_number: liveRoundNumber, games: Object.values(liveGameMap) }

          // Add current round to dropdown if it isn't there yet (new live round)
          const sel2 = document.getElementById('round-filter')
          if (!rounds.some(r => r.round_number === liveRoundNumber)) {
            const opt = document.createElement('option')
            opt.value       = liveRoundNumber
            opt.textContent = `Round ${liveRoundNumber}`
            if (sel2.options.length > 1) sel2.insertBefore(opt, sel2.options[1])
            else                         sel2.appendChild(opt)
            rounds.unshift({ round_number: liveRoundNumber })
          }
          // Default to live round
          roundFilter   = String(liveRoundNumber)
          sel2.value    = roundFilter
        }
      } catch (e) {
        console.warn('[leaderboard] live round fetch failed:', e)
      }

      document.getElementById('round-filter').addEventListener('change', function () {
        roundFilter = this.value
        loadLeaderboard()
      })

      document.querySelectorAll('.lb-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'))
          btn.classList.add('active')
          activeTab = btn.dataset.tab
          loadLeaderboard()
        })
      })

      async function loadLeaderboard() {
        const loading = `<div class="p-6 text-center animate-pulse" style="color:#4a5568;">Loading…</div>`
        seasonPanel.innerHTML = loading
        weekPanel.innerHTML   = loading
        matchesEl.innerHTML   = loading
        if (activeTab === 'individual') await loadIndividual()
        else await loadTeam()
      }

      async function getScores() {
        let query = supabase
          .from('scores')
          .select('user_id, game_id, points, margin_score, total_score, round_number')
        if (roundFilter !== 'season') {
          query = query.eq('round_number', Number(roundFilter))
        }
        const { data, error } = await query
        if (error) return []
        return data
      }

      // --- Individual scoring helpers (mirrors backend bell_score: 5×exp(−err²/72), σ=6) ---
      function bellScore(error) {
        return 5.0 * Math.exp(-(error * error) / 72.0)
      }

      function computeLiveIndividualScores(games, picks) {
        const gameMap = {}
        games.forEach(g => { if (g.home_score != null && g.away_score != null) gameMap[g.game_id] = g })
        return picks
          .filter(p => p.home_score_pick != null && p.away_score_pick != null && gameMap[p.game_id])
          .map(p => {
            const g  = gameMap[p.game_id]
            const ms = bellScore((g.home_score - g.away_score) - (p.home_score_pick - p.away_score_pick))
            const ts = bellScore((g.home_score + g.away_score) - (p.home_score_pick + p.away_score_pick))
            return { user_id: p.user_id, game_id: p.game_id, round_number: g.round_number,
                     margin_score: ms, total_score: ts, points: ms + ts }
          })
      }

      // --- Individual leaderboard ---
      async function loadIndividual() {
        const [{ data: allSeasonScores }, { data: profiles }] = await Promise.all([
          supabase.from('scores').select('user_id, game_id, points, margin_score, total_score, round_number'),
          supabase.from('profiles').select('id, username, favourite_team'),
        ])

        // Compute live scores for current-round games not yet in the scores table
        let liveComputedScores = []
        const liveGamesWithScores = Object.values(liveGameMap)
          .filter(g => g.home_score != null && g.away_score != null)
        if (liveGamesWithScores.length) {
          const scoredIds       = new Set((allSeasonScores || []).map(s => s.game_id))
          const unscoredLiveIds = liveGamesWithScores
            .filter(g => !scoredIds.has(g.game_id))
            .map(g => g.game_id)
          if (unscoredLiveIds.length) {
            const { data: livePicks } = await supabase
              .from('picks')
              .select('user_id, game_id, home_score_pick, away_score_pick')
              .in('game_id', unscoredLiveIds)
            liveComputedScores = computeLiveIndividualScores(
              liveGamesWithScores.filter(g => unscoredLiveIds.includes(g.game_id)),
              livePicks || []
            )
          }
        }

        // Merge: scores table for already-scored games + computed scores for live games
        const liveComputedIds = new Set(liveComputedScores.map(s => s.game_id))
        const allMergedScores = [
          ...(allSeasonScores || []).filter(s => !liveComputedIds.has(s.game_id)),
          ...liveComputedScores,
        ]

        // Season sidebar panel — full season aggregate (includes live partial scores)
        seasonPanel.innerHTML = buildIndividualCompact(allMergedScores, profiles || [])

        // Determine active round for week panel + match cards
        const activeRound = roundFilter !== 'season'
          ? Number(roundFilter)
          : (liveRoundNumber ?? rounds[0]?.round_number ?? null)
        currentDisplayRound = activeRound

        if (activeRound) {
          const isLive = liveRoundNumber != null && activeRound === liveRoundNumber
          weekLabel.textContent = `Round ${activeRound}${isLive ? ' — Live' : ''}`
          const roundScores = allMergedScores.filter(s => s.round_number === activeRound)
          weekPanel.innerHTML = buildIndividualCompact(roundScores, profiles || [])
          matchesEl.innerHTML = await buildMatchCardsHtml(activeRound, profiles || [])
        } else {
          weekPanel.innerHTML = emptyState('No rounds completed yet.')
          matchesEl.innerHTML = emptyState('No matches to display.')
        }
      }

      // Compact individual leaderboard for sidebar panels
      function buildIndividualCompact(scores, profiles) {
        const userMap = {}
        scores.forEach(s => {
          if (!userMap[s.user_id]) userMap[s.user_id] = { pts: 0, games: 0 }
          userMap[s.user_id].pts   += s.points
          userMap[s.user_id].games += 1
        })

        const profileMap = {}
        profiles.forEach(p => { profileMap[p.id] = p })

        const rows = Object.entries(userMap)
          .map(([uid, stats]) => ({
            uid,
            username: profileMap[uid]?.username || 'Unknown',
            team:     profileMap[uid]?.favourite_team || null,
            pts:      stats.pts,
            avg:      stats.games > 0 ? (stats.pts / stats.games).toFixed(2) : '0.00',
          }))
          .sort((a, b) => b.pts - a.pts || b.avg - a.avg)

        if (!rows.length) return emptyState('No scores yet.')

        const ranks = []
        rows.forEach((r, i) => {
          if (i === 0) { ranks.push(1); return }
          ranks.push(rows[i - 1].pts === r.pts && rows[i - 1].avg === r.avg ? ranks[i - 1] : i + 1)
        })
        const rankCounts = {}
        ranks.forEach(rk => { rankCounts[rk] = (rankCounts[rk] || 0) + 1 })

        const rowsHtml = rows.map((r, i) => {
          const rank      = ranks[i]
          const isTied    = rankCounts[rank] > 1
          const rankLabel = isTied ? `=${rank}` : `${rank}`
          const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
          const isMe      = r.uid === myUserId
          return `
            <div class="lb-row ${isMe ? 'me-row' : ''}" style="grid-template-columns:2rem 1fr auto auto; gap:0.5rem;">
              <div class="rank-badge ${rankClass}">${rankLabel}</div>
              <div class="flex items-center gap-1.5 min-w-0">
                ${r.team ? `<img src="../logos/${teamSlug(r.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                <span class="user-tip-link username text-sm font-semibold truncate ${isMe ? 'text-amber-400' : ''}" data-uid="${r.uid}" data-username="${escapeHtml(r.username)}">${escapeHtml(r.username)}${isMe ? ' (you)' : ''}</span>
              </div>
              <div class="text-right text-xs" style="color:#4a5568; white-space:nowrap;">${r.avg}</div>
              <div class="pts-display text-right">${r.pts.toFixed(1)}</div>
            </div>`
        }).join('')

        // Sticky "you" footer — always visible at the bottom of the panel
        if (myUserId) {
          const meIdx = rows.findIndex(r => r.uid === myUserId)
          if (meIdx >= 0) {
            const r         = rows[meIdx]
            const meRank    = ranks[meIdx]
            const isTied    = rankCounts[meRank] > 1
            const rankLabel = isTied ? `=${meRank}` : `${meRank}`
            const rankClass = meRank === 1 ? 'top1' : meRank === 2 ? 'top2' : meRank === 3 ? 'top3' : ''
            const meFooter  = `
              <div class="lb-row" style="grid-template-columns:2rem 1fr auto auto; gap:0.5rem; position:sticky; bottom:0; border-top:1px solid rgba(245,158,11,0.25); background:#161b24;">
                <div class="rank-badge ${rankClass}" style="color:#fbbf24;">${rankLabel}</div>
                <div class="flex items-center gap-1.5 min-w-0">
                  ${r.team ? `<img src="../logos/${teamSlug(r.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                  <span class="user-tip-link username text-sm font-semibold truncate" data-uid="${r.uid}" data-username="${escapeHtml(r.username)}" style="color:#fbbf24;">${escapeHtml(r.username)} (you)</span>
                </div>
                <div class="text-right text-xs" style="color:#4a5568; white-space:nowrap;">${r.avg}</div>
                <div class="pts-display text-right" style="color:#fbbf24;">${r.pts.toFixed(1)}</div>
              </div>`
            return rowsHtml + meFooter
          }
        }
        return rowsHtml
      }

      // --- Match cards (per-game breakdown for a specific round) ---
      async function buildMatchCardsHtml(roundNumber, profiles) {
        const [{ data: games }, { data: allScores }] = await Promise.all([
          supabase.from('games')
            .select('game_id, home_team, away_team, home_score, away_score, is_complete')
            .eq('round_number', roundNumber)
            .order('game_id', { ascending: true }),
          supabase.from('scores')
            .select('user_id, game_id, points, margin_score, total_score')
            .eq('round_number', roundNumber),
        ])

        const gameIds = games?.map(g => g.game_id) || []
        const { data: allPicks } = gameIds.length
          ? await supabase.from('picks')
              .select('user_id, game_id, home_score_pick, away_score_pick')
              .in('game_id', gameIds)
          : { data: [] }

        const pickMap = {}
        allPicks?.forEach(p => { pickMap[`${p.user_id}|${p.game_id}`] = p })

        if (!games?.length) return emptyState('No games found for this round.')

        const profileMap = {}
        profiles?.forEach(p => { profileMap[p.id] = p })

        const scoresByGame = {}
        allScores?.forEach(s => {
          if (!scoresByGame[s.game_id]) scoresByGame[s.game_id] = []
          scoresByGame[s.game_id].push(s)
        })

        // For live games in this round that have scores but aren't in the scores table yet,
        // compute bell-curve scores on-the-fly from picks
        if (liveRoundNumber === roundNumber) {
          for (const game of (games || [])) {
            if (scoresByGame[game.game_id]?.length) continue  // already scored
            const lg = liveGameMap[game.game_id]
            if (!lg || lg.home_score == null) continue
            const gamePicks = (allPicks || []).filter(p => p.game_id === game.game_id)
            const computed  = computeLiveIndividualScores([lg], gamePicks)
            if (computed.length) scoresByGame[game.game_id] = computed
          }
        }

        const cards = games.map(game => {
          const gameScores = (scoresByGame[game.game_id] || [])
            .sort((a, b) => b.points - a.points)

          const totalPts  = gameScores.reduce((sum, s) => sum + s.points, 0)
          const pickers   = gameScores.length
          const top5      = gameScores.slice(0, 5)

          // Compute tied ranks for all scorers in this game
          const gameRanks = []
          gameScores.forEach((s, i) => {
            if (i === 0) { gameRanks.push(1); return }
            gameRanks.push(gameScores[i - 1].points === s.points ? gameRanks[i - 1] : i + 1)
          })
          const gameRankCounts = {}
          gameRanks.forEach(rk => { gameRankCounts[rk] = (gameRankCounts[rk] || 0) + 1 })
          const gameRankLabels = gameRanks.map(rk => gameRankCounts[rk] > 1 ? `=${rk}` : `${rk}`)

          const myEntry   = myUserId ? gameScores.find(s => s.user_id === myUserId) : null
          const myIdx     = myEntry  ? gameScores.indexOf(myEntry) : -1
          const myInTop5  = myIdx >= 0 && myIdx < 5

          const isComplete  = game.is_complete
          const lg          = liveRoundNumber === roundNumber ? liveGameMap[game.game_id] : null
          const liveHome    = lg?.home_score ?? game.home_score
          const liveAway    = lg?.away_score ?? game.away_score
          const hasScore    = liveHome != null && liveAway != null
          const isGameLive  = lg?.is_live === true

          const scoreDisplay = hasScore
            ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.5rem;font-weight:700;color:#e2e8f0;letter-spacing:0.04em;">${liveHome} – ${liveAway}</span>${isGameLive ? '<br><span style="font-size:0.6rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}`
            : `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.875rem;font-weight:600;color:#4a5568;letter-spacing:0.06em;text-transform:uppercase;">Upcoming</span>`

          const renderRow = (s, rank, rankLabel, isMe) => {
            const p    = profileMap[s.user_id]
            const name = escapeHtml(p?.username || 'Unknown')
            const team = p?.favourite_team || null
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            const pick = pickMap[`${s.user_id}|${s.game_id}`]
            const pickMargin = pick ? pick.home_score_pick - pick.away_score_pick : null
            const pickTotal  = pick ? pick.home_score_pick + pick.away_score_pick : null
            const predictedScore = pick
              ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.875rem;font-weight:600;color:#8892a4;white-space:nowrap;">${pick.home_score_pick}–${pick.away_score_pick}</span>`
              : `<span style="color:#4a5568;">—</span>`
            const marginPick = pickMargin !== null
              ? `<span style="color:#4a5568;font-size:0.65rem;">(${pickMargin > 0 ? '+' : ''}${pickMargin})</span>`
              : ''
            const totalPick  = pickTotal !== null
              ? `<span style="color:#4a5568;font-size:0.65rem;">(${pickTotal})</span>`
              : ''
            const mobileDetails = [
              pick ? `${pick.home_score_pick}–${pick.away_score_pick}` : null,
              s.margin_score != null ? `M:${s.margin_score.toFixed(1)}` : null,
              s.total_score  != null ? `T:${s.total_score.toFixed(1)}`  : null,
            ].filter(Boolean).join('<span style="color:#2e3a4e;margin:0 3px;">·</span>')
            return `
              <div class="lb-ind-row" style="${isMe ? 'background:rgba(245,158,11,0.06);border-top:1px solid rgba(245,158,11,0.15);' : 'border-top:1px solid #1e2a3a;'}">
                <div class="rank-badge lb-ind-rank ${rankClass}" style="${isMe ? 'color:#fbbf24;' : ''}">${rankLabel}</div>
                <div class="lb-ind-name flex items-center gap-2 min-w-0">
                  ${team ? `<img src="../logos/${teamSlug(team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-60" onerror="this.style.display='none'">` : ''}
                  <span class="user-tip-link" data-uid="${s.user_id}" data-username="${name}" style="font-size:0.8125rem;font-weight:600;${isMe ? 'color:#fbbf24;' : 'color:#e2e8f0;'}cursor:pointer;">${name}${isMe ? ' (you)' : ''}</span>
                </div>
                <div class="lb-ind-pick" style="text-align:right;">${predictedScore}</div>
                <div class="lb-ind-margin" style="text-align:right;font-size:0.75rem;color:#8892a4;">${s.margin_score?.toFixed(1) ?? '—'} ${marginPick}</div>
                <div class="lb-ind-total" style="text-align:right;font-size:0.75rem;color:#8892a4;">${s.total_score?.toFixed(1)  ?? '—'} ${totalPick}</div>
                <div class="lb-ind-pts" style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${s.points?.toFixed(1) ?? '—'}</div>
                <div class="lb-ind-details">${mobileDetails}</div>
              </div>`
          }

          const top5Html = top5.length
            ? top5.map((s, i) => renderRow(s, gameRanks[i], gameRankLabels[i], s.user_id === myUserId)).join('')
            : `<div style="padding:0.75rem 1rem;font-size:0.8125rem;color:#4a5568;border-top:1px solid #1e2a3a;">No picks scored yet.</div>`

          const extraScores = gameScores.slice(5)
          const showMoreHtml = extraScores.length ? `
            <div id="lb-more-rows-${game.game_id}" style="display:none;">${extraScores.map((s, i) => renderRow(s, gameRanks[i + 5], gameRankLabels[i + 5], s.user_id === myUserId)).join('')}</div>
            <div style="text-align:center;padding:0.375rem 1rem;border-top:1px solid #1e2a3a;">
              <button class="lb-ind-show-more-btn" data-game-id="${game.game_id}" data-total="${gameScores.length}"
                style="background:none;border:none;color:#4a5568;font-size:0.7rem;cursor:pointer;font-family:'Barlow',system-ui,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:0.15rem 0;">
                Show all ${gameScores.length} players ▼
              </button>
            </div>` : ''

          const meHtml = (!myInTop5 && myEntry)
            ? `<div id="lb-me-row-${game.game_id}">${renderRow(myEntry, gameRanks[myIdx], gameRankLabels[myIdx], true)}</div>`
            : ''

          const noPicks = !(isComplete || hasScore)
            ? ''
            : (!myInTop5 && !myEntry && myUserId)
              ? `<div style="padding:0.5rem 1rem;font-size:0.75rem;color:#4a5568;border-top:1px solid rgba(245,158,11,0.15);background:rgba(245,158,11,0.03);">You didn't submit a pick for this game.</div>`
              : ''

          return `
            <div style="background:#161b24;border:1px solid #2e3a4e;border-radius:12px;overflow:hidden;margin-bottom:1rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1rem;background:#0f1117;gap:0.5rem;">
                <div class="flex items-center gap-2 min-w-0" style="flex:1;justify-content:flex-end;">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;text-align:right;overflow-wrap:break-word;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:6rem;">
                  ${scoreDisplay}
                </div>
                <div class="flex items-center gap-2 min-w-0" style="flex:1;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;overflow-wrap:break-word;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              ${(isComplete || hasScore) && pickers > 0 ? `
              <div style="padding:0.375rem 1rem;font-size:0.7rem;color:#4a5568;background:#0f1117;border-top:1px solid #1a2233;border-bottom:1px solid #1e2a3a;">
                ${pickers} picker${pickers !== 1 ? 's' : ''} · ${totalPts.toFixed(1)} pts distributed${isGameLive ? ' · <span style="color:#f87171;">live</span>' : ''}
              </div>
              <div class="lb-ind-header" style="display:grid;grid-template-columns:2rem 1fr 4rem 4.5rem 4.5rem 3.5rem;gap:0.5rem;padding:0.4rem 1rem;background:#0f1117;border-bottom:1px solid #1e2a3a;">
                <div></div>
                <div></div>
                <div class="lb-th-pick" style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Pick</div>
                <div class="lb-th-margin" style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Margin</div>
                <div class="lb-th-total" style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Total Pts</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Score</div>
              </div>
              ${top5Html}
              ${showMoreHtml}
              ${meHtml}
              ${noPicks}
              ` : (isComplete || hasScore) ? `
              <div style="padding:0.75rem 1rem;font-size:0.8125rem;color:#4a5568;border-top:1px solid #1e2a3a;">No picks submitted for this game.</div>
              ` : ''}
            </div>`
        }).join('')

        return `<div>${cards}</div>`
      }

      // --- Team model leaderboard ---
      async function loadTeam() {
        // Always fetch ALL completed games — needed for the full-season sidebar panel
        const { data: rawCompletedGames } = await supabase
          .from('games')
          .select('game_id, round_number, home_team, away_team, home_score, away_score, kickoff_time')
          .eq('is_complete', true)
          .not('home_score', 'is', null)
          .order('kickoff_time', { ascending: true })

        // Inject live games that have scores but aren't marked complete yet
        let allCompletedGames = rawCompletedGames || []
        if (liveRoundData?.games?.length) {
          const completedIds = new Set(allCompletedGames.map(g => g.game_id))
          const liveToAdd = liveRoundData.games.filter(
            g => !completedIds.has(g.game_id) && g.home_score != null && g.away_score != null
          )
          if (liveToAdd.length) {
            allCompletedGames = [...allCompletedGames, ...liveToAdd]
              .sort((a, b) => (a.kickoff_time || '') < (b.kickoff_time || '') ? -1 : 1)
          }
        }

        if (!allCompletedGames.length) {
          seasonPanel.innerHTML = emptyState('No completed games yet.')
          weekPanel.innerHTML   = emptyState('No completed games yet.')
          matchesEl.innerHTML   = ''
          return
        }

        const allGameIds = allCompletedGames.map(g => g.game_id)

        const [{ data: allPicks }, { data: profiles }, ...distResults] = await Promise.all([
          supabase.from('picks')
            .select('user_id, game_id, home_score_pick, away_score_pick')
            .in('game_id', allGameIds),
          supabase.from('profiles').select('id, username, favourite_team'),
          ...allCompletedGames.map(g =>
            fetch(`${BACKEND}/match_score_distributions/${g.game_id}`)
              .then(r => r.ok ? r.json() : null).catch(() => null)
          ),
        ])

        const machineDistByGame = {}
        allCompletedGames.forEach((g, i) => {
          if (distResults[i]) machineDistByGame[g.game_id] = distResults[i]
        })

        const profileTeamMap = {}
        profiles?.forEach(p => { profileTeamMap[p.id] = p.favourite_team || null })

        const picksByGame = {}
        allPicks?.forEach(p => {
          if (p.home_score_pick == null || p.away_score_pick == null) return
          if (!picksByGame[p.game_id]) picksByGame[p.game_id] = []
          picksByGame[p.game_id].push(p)
        })

        // --- Calibrated KDE helpers (mirrors predictions.js) ---

        function lbMean(arr) {
          return arr.reduce((s, v) => s + v, 0) / arr.length
        }
        function lbStddev(arr) {
          if (arr.length < 2) return 6
          const mu = lbMean(arr)
          return Math.max(Math.sqrt(arr.reduce((s, v) => s + (v - mu) ** 2, 0) / arr.length), 1)
        }
        function lbNormPdf(x, mu, sigma) {
          return Math.exp(-0.5 * ((x - mu) / sigma) ** 2) / (sigma * Math.sqrt(2 * Math.PI))
        }

        // Weighted sigma from normalised {x, y} bins
        function lbMachineSigma(normBins) {
          if (!normBins?.length) return null
          const total = normBins.reduce((s, b) => s + b.y, 0)
          if (!total) return null
          const mu = normBins.reduce((s, b) => s + b.x * b.y, 0) / total
          return Math.sqrt(normBins.reduce((s, b) => s + b.y * (b.x - mu) ** 2, 0) / total)
        }

        // Group machine bins at binSize, clamped to [xMin, xMax], renormalised to sum=1
        function lbNormaliseMachineBins(rawBins, binSize, xMin = -Infinity, xMax = Infinity) {
          const grouped = {}
          rawBins.forEach(({ x, prob }) => {
            if (x < xMin || x > xMax) return
            const b = Math.floor(x / binSize) * binSize
            grouped[b] = (grouped[b] || 0) + prob
          })
          const entries = Object.entries(grouped).map(([x, p]) => ({ x: Number(x), y: p })).sort((a, b) => a.x - b.x)
          const total = entries.reduce((s, e) => s + e.y, 0)
          return total > 0 ? entries.map(e => ({ x: e.x, y: e.y / total })) : entries
        }

        // h = sqrt(max(0, modelSigma² − σ_picks²)), floored at 1; Silverman fallback
        function lbCalibratedBandwidth(values, modelSigma) {
          if (!modelSigma) {
            if (values.length < 2) return 6
            return Math.max(1.06 * lbStddev(values) * Math.pow(values.length, -0.2), 1)
          }
          return Math.max(1, Math.sqrt(Math.max(0, modelSigma ** 2 - lbStddev(values) ** 2)))
        }

        // KDE sampled at integer steps over [xMin, xMax], renormalised to sum=1
        function lbKdePoints(values, xMin, xMax, modelSigma = null, forceBandwidth = null) {
          if (!values.length) return []
          const h = forceBandwidth !== null ? forceBandwidth : lbCalibratedBandwidth(values, modelSigma)
          const pts = []
          for (let x = xMin; x <= xMax; x++) {
            pts.push({ x, y: values.reduce((s, v) => s + lbNormPdf(x, v, h), 0) / values.length })
          }
          const total = pts.reduce((s, p) => s + p.y, 0)
          return total > 0 ? pts.map(p => ({ x: p.x, y: p.y / total })) : pts
        }

        // Collapse mass from NRL-invalid score values into adjacent valid neighbours
        // Margins: valid = even ∪ {-1, +1} | Totals: valid = even
        function lbCollapseToNRLValid(bins, type) {
          const isValid = type === 'margin'
            ? x => x % 2 === 0 || x === 1 || x === -1
            : x => x % 2 === 0
          const map = new Map(bins.map(b => [b.x, b.y]))
          for (const { x, y } of bins) {
            if (!isValid(x) && y > 0) {
              map.set(x - 1, (map.get(x - 1) ?? 0) + y / 2)
              map.set(x + 1, (map.get(x + 1) ?? 0) + y / 2)
              map.set(x, 0)
            }
          }
          const entries = [...map.entries()].filter(([, y]) => y > 0).sort(([a], [b]) => a - b)
          const total = entries.reduce((s, [, y]) => s + y, 0)
          return total > 0 ? entries.map(([x, y]) => ({ x, y: y / total })) : entries.map(([x, y]) => ({ x, y }))
        }

        // Score a machine distribution (discrete {x, prob} array) against the actual result
        function computeMachineScore(distribution, actual) {
          let pGte = 0, pLte = 0
          for (const { x, prob } of distribution) {
            if (x >= actual) pGte += prob
            if (x <= actual) pLte += prob
          }
          const score = Math.min(pGte, pLte)
          const label = pGte <= pLte ? `P(≥${actual})` : `P(≤${actual})`
          return { score, label }
        }

        // Score calibrated KDE bins against the actual result
        function computeKDEScore(kdeBins, actual) {
          const pGte = Math.min(kdeBins.filter(b => b.x >= actual).reduce((s, b) => s + b.y, 0), 1)
          const pLte = Math.min(kdeBins.filter(b => b.x <= actual).reduce((s, b) => s + b.y, 0), 1)
          const score = Math.min(pGte, pLte)
          const label = pGte <= pLte ? `P(≥${actual})` : `P(≤${actual})`
          return { score, label }
        }

        // Pre-compute per-round sigma scales: R = mean(σ_machine) / mean(σ_user_picks)
        // Applied as σ_target = stddev(picks_match) * R — preserves inter-match variance
        // differences while aligning the round-average spread to the machine's.
        const roundSigmaScaleByRound = {}
        const allRoundNums = [...new Set(allCompletedGames.map(g => g.round_number))]
        for (const rn of allRoundNums) {
          const roundGames = allCompletedGames.filter(g => g.round_number === rn)
          const machMargSigmas = [], machTotSigmas = [], userMargSigmas = [], userTotSigmas = []
          for (const g of roundGames) {
            const picks = picksByGame[g.game_id] || []
            const margins = picks.map(p => p.home_score_pick - p.away_score_pick)
            const totals  = picks.map(p => p.home_score_pick + p.away_score_pick)
            if (margins.length < 2) continue
            const dist = machineDistByGame[g.game_id]
            if (!dist) continue
            const mBins = dist.margins ? lbNormaliseMachineBins(dist.margins, 1, -100, 100) : []
            const tBins = dist.totals  ? lbNormaliseMachineBins(dist.totals,  1,    0, 100) : []
            const σM = lbMachineSigma(mBins), σT = lbMachineSigma(tBins)
            const σUm = lbStddev(margins),    σUt = lbStddev(totals)
            if (σM && σUm > 0) { machMargSigmas.push(σM); userMargSigmas.push(σUm) }
            if (σT && σUt > 0) { machTotSigmas.push(σT);  userTotSigmas.push(σUt) }
          }
          const avg = arr => arr.reduce((s, v) => s + v, 0) / arr.length
          roundSigmaScaleByRound[rn] = {
            margin: machMargSigmas.length ? avg(machMargSigmas) / avg(userMargSigmas) : null,
            total:  machTotSigmas.length  ? avg(machTotSigmas)  / avg(userTotSigmas)  : null,
          }
        }

        const pickerIds = new Set(allPicks?.map(p => p.user_id) || [])
        const fanTeams  = new Set()
        pickerIds.forEach(uid => fanTeams.add(profileTeamMap[uid] || '__no_team__'))

        // Score a set of games — returns { teamAcc, perGameData }
        function scoreGames(games) {
          const teamAcc = {}, perGameData = {}

          function addEntry(gameId, key, mResult, tResult) {
            if (!teamAcc[key]) teamAcc[key] = { marginScore: 0, totalScore: 0, games: 0 }
            teamAcc[key].marginScore += mResult.score
            teamAcc[key].totalScore  += tResult.score
            teamAcc[key].games++
            if (!perGameData[gameId]) perGameData[gameId] = {}
            perGameData[gameId][key] = {
              marginScore: mResult.score, marginLabel: mResult.label,
              totalScore:  tResult.score, totalLabel:  tResult.label,
            }
          }

          for (const game of games) {
            const actualMargin = game.home_score - game.away_score
            const actualTotal  = game.home_score + game.away_score
            const gamePicks    = picksByGame[game.game_id] || []
            if (!gamePicks.length) continue

            const machineDist = machineDistByGame[game.game_id]
            if (machineDist?.margins?.length) {
              addEntry(game.game_id, '__machine__',
                computeMachineScore(machineDist.margins, actualMargin),
                computeMachineScore(machineDist.totals,  actualTotal))
            }

            // Normalised machine bins for per-match sigma fallback
            const mBins    = machineDist?.margins ? lbNormaliseMachineBins(machineDist.margins, 1, -100, 100) : []
            const tBins    = machineDist?.totals  ? lbNormaliseMachineBins(machineDist.totals,  1,    0, 100) : []
            const σMach_m  = lbMachineSigma(mBins)
            const σMach_t  = lbMachineSigma(tBins)
            const rScale   = roundSigmaScaleByRound[game.round_number] ?? { margin: null, total: null }

            // Shared bandwidth from all-game picks — mirrors the plot rendering so that
            // weighted-sum of team KDEs exactly reconstructs the All Users KDE.
            const allMargins = gamePicks.map(p => p.home_score_pick - p.away_score_pick)
            const allTotals  = gamePicks.map(p => p.home_score_pick + p.away_score_pick)
            const sharedSigmaM = (allMargins.length >= 2 && rScale.margin) ? lbStddev(allMargins) * rScale.margin : σMach_m
            const sharedSigmaT = (allTotals.length  >= 2 && rScale.total)  ? lbStddev(allTotals)  * rScale.total  : σMach_t
            const sharedH_m = lbCalibratedBandwidth(allMargins, sharedSigmaM)
            const sharedH_t = lbCalibratedBandwidth(allTotals,  sharedSigmaT)

            // Build calibrated KDE for a pick subset and score against the actual result
            const scorePickSet = picks => {
              if (!picks.length) return null
              const margins = picks.map(p => p.home_score_pick - p.away_score_pick)
              const totals  = picks.map(p => p.home_score_pick + p.away_score_pick)
              const marginKde = lbCollapseToNRLValid(lbKdePoints(margins, -100, 100, null, sharedH_m), 'margin')
              const totalKde  = lbCollapseToNRLValid(lbKdePoints(totals,    0, 100, null, sharedH_t),  'total')
              return {
                margin: computeKDEScore(marginKde, actualMargin),
                total:  computeKDEScore(totalKde,  actualTotal),
              }
            }

            const allResult = scorePickSet(gamePicks)
            if (allResult) addEntry(game.game_id, '__all__', allResult.margin, allResult.total)

            for (const teamKey of fanTeams) {
              const sub = gamePicks.filter(p =>
                teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
              )
              if (!sub.length) continue
              const result = scorePickSet(sub)
              if (result) addEntry(game.game_id, teamKey, result.margin, result.total)
            }
          }
          return { teamAcc, perGameData }
        }

        // Count distinct pickers per team key across a set of games
        function countTeamUsers(games) {
          const sets = {}
          for (const game of games) {
            const picks = picksByGame[game.game_id] || []
            for (const p of picks) {
              const team = profileTeamMap[p.user_id] || '__no_team__'
              if (!sets[team])    sets[team]    = new Set()
              if (!sets.__all__)  sets.__all__  = new Set()
              sets[team].add(p.user_id)
              sets.__all__.add(p.user_id)
            }
          }
          const result = { __machine__: null }
          for (const [k, v] of Object.entries(sets)) result[k] = v.size
          return result
        }

        function buildTeamRows(teamAcc, userCounts = {}) {
          return Object.entries(teamAcc).map(([key, acc]) => ({
            key,
            label:     key === '__machine__' ? 'BS Machine' : key === '__all__' ? 'All Users' : key === '__no_team__' ? 'I Love My Footy' : key,
            team:      key === '__machine__' || key === '__all__' || key === '__no_team__' ? null : key,
            isMachine: key === '__machine__',
            userCount: key === '__machine__' ? null : (userCounts[key] ?? null),
            ...acc,
            total: acc.marginScore + acc.totalScore,
          })).sort((a, b) => b.total - a.total)
        }

        function buildCompactTeamHtml(rows) {
          if (!rows.length) return emptyState('No data yet.')
          const ranks = []
          rows.forEach((r, i) => {
            if (i === 0) { ranks.push(1); return }
            ranks.push(rows[i - 1].total === r.total ? ranks[i - 1] : i + 1)
          })
          const rankCounts = {}
          ranks.forEach(rk => { rankCounts[rk] = (rankCounts[rk] || 0) + 1 })
          const header = `
            <div style="display:grid;grid-template-columns:2rem 1fr 2.75rem 2.75rem 3rem;gap:0.4rem;padding:0.35rem 0.875rem;background:#0f1117;border-bottom:1px solid #1e2a3a;">
              <div></div><div></div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Mgn</div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Tot</div>
              <div style="text-align:right;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;">Score</div>
            </div>`
          const bodyRows = rows.map((r, i) => {
            const rank      = ranks[i]
            const isTied    = rankCounts[rank] > 1
            const rankLabel = isTied ? `=${rank}` : `${rank}`
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            return `
              <div style="display:grid;grid-template-columns:2rem 1fr 2.75rem 2.75rem 3rem;gap:0.4rem;align-items:center;padding:0.55rem 0.875rem;border-bottom:1px solid #1e2a3a;${r.isMachine ? 'border-top:2px solid #2e3a4e;' : ''}">
                <div class="rank-badge ${rankClass}">${rankLabel}</div>
                <div class="flex items-center gap-1.5 min-w-0">
                  ${r.team ? `<img src="../logos/${teamSlug(r.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                  <div class="min-w-0">
                    <div class="text-sm truncate team-tip-link" data-teamkey="${escapeHtml(r.key)}" data-teamlabel="${escapeHtml(r.label)}" style="font-weight:600;${r.isMachine ? 'color:#f59e0b;' : ''}cursor:pointer;">${escapeHtml(r.label)}</div>
                    ${r.userCount != null ? `<div style="font-size:0.6rem;color:#4a5568;line-height:1.2;">${r.userCount} user${r.userCount !== 1 ? 's' : ''}</div>` : ''}
                  </div>
                </div>
                <div style="text-align:right;font-size:0.7rem;color:#8892a4;">${r.marginScore.toFixed(2)}</div>
                <div style="text-align:right;font-size:0.7rem;color:#8892a4;">${r.totalScore.toFixed(2)}</div>
                <div style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:0.9rem;font-weight:700;color:${rank === 1 ? '#86efac' : '#e2e8f0'};">${r.total.toFixed(3)}</div>
              </div>`
          }).join('')
          return header + bodyRows
        }

        // Season leaderboard (all games) → sidebar
        const { teamAcc: seasonTeamAcc } = scoreGames(allCompletedGames)
        const seasonUserCounts = countTeamUsers(allCompletedGames)
        const seasonRows = buildTeamRows(seasonTeamAcc, seasonUserCounts)
        seasonPanel.innerHTML = `
          <div class="text-xs px-3 py-2 border-b" style="border-color:#1e2a3a;color:#4a5568;">
            Score = min(P(margin ≥ actual), P(margin ≤ actual)) + min(P(total ≥ actual), P(total ≤ actual))
          </div>
          ${buildCompactTeamHtml(seasonRows)}`

        // Determine active round for weekly panel + match tiles
        const activeRound = roundFilter !== 'season' ? Number(roundFilter) : (rounds[0]?.round_number ?? null)
        const roundGames  = activeRound
          ? allCompletedGames.filter(g => g.round_number === activeRound)
          : allCompletedGames.filter(g => g.round_number === allCompletedGames[allCompletedGames.length - 1]?.round_number)

        if (!roundGames.length) {
          if (activeRound === liveRoundNumber) {
            // Live round hasn't kicked off yet — show upcoming game tiles so pickers can see fixtures
            weekPanel.innerHTML   = emptyState('Scoring begins at kickoff.')
            weekLabel.textContent = `Round ${activeRound} — Upcoming`
            matchesEl.innerHTML   = await buildMatchCardsHtml(activeRound, profiles || [])
          } else {
            weekPanel.innerHTML = emptyState('No games scored for this round.')
            matchesEl.innerHTML = ''
          }
          return
        }

        const isTeamRoundLive = liveRoundNumber != null && (activeRound === liveRoundNumber || roundGames[0]?.round_number === liveRoundNumber)
        weekLabel.textContent = `Round ${activeRound || roundGames[0].round_number}${isTeamRoundLive ? ' — Live' : ''}`
        const { teamAcc: roundTeamAcc, perGameData } = scoreGames(roundGames)
        const roundUserCounts = countTeamUsers(roundGames)
        const roundRows = buildTeamRows(roundTeamAcc, roundUserCounts)
        weekPanel.innerHTML = buildCompactTeamHtml(roundRows)

        // Key metadata for tiles
        const keyMeta = {}
        seasonRows.forEach(r => { keyMeta[r.key] = { label: r.label, team: r.team, isMachine: r.isMachine } })

        // Build match tiles for the active round
        const tilesHtml = roundGames.map(game => {
          const gameEntries = perGameData[game.game_id]
          if (!gameEntries) return ''

          // Count distinct users per team for this specific game
          const gamePickers = picksByGame[game.game_id] || []
          const gameUserCountSets = {}
          gamePickers.forEach(p => {
            const team = profileTeamMap[p.user_id] || '__no_team__'
            if (!gameUserCountSets[team])   gameUserCountSets[team]   = new Set()
            if (!gameUserCountSets.__all__) gameUserCountSets.__all__ = new Set()
            gameUserCountSets[team].add(p.user_id)
            gameUserCountSets.__all__.add(p.user_id)
          })
          const gameUserCounts = { __machine__: null }
          for (const [k, v] of Object.entries(gameUserCountSets)) gameUserCounts[k] = v.size

          const tileRows = Object.entries(gameEntries)
            .map(([key, scores]) => ({
              key,
              meta:        keyMeta[key] || { label: key, team: null, isMachine: false },
              marginScore: scores.marginScore,
              marginLabel: scores.marginLabel,
              totalScore:  scores.totalScore,
              totalLabel:  scores.totalLabel,
              total:       scores.marginScore + scores.totalScore,
              userCount:   key === '__machine__' ? null : (gameUserCounts[key] ?? null),
            }))
            .sort((a, b) => b.total - a.total)

          const tileRanks = []
          tileRows.forEach((r, i) => {
            if (i === 0) { tileRanks.push(1); return }
            tileRanks.push(tileRows[i - 1].total === r.total ? tileRanks[i - 1] : i + 1)
          })
          const tileRankCounts = {}
          tileRanks.forEach(rk => { tileRankCounts[rk] = (tileRankCounts[rk] || 0) + 1 })

          const tileRowsHtml = tileRows.map((r, i) => {
            const rank      = tileRanks[i]
            const isTied    = tileRankCounts[rank] > 1
            const rankLabel = isTied ? `=${rank}` : `${rank}`
            const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : ''
            return `
              <div class="lb-team-tile-row">
                <div class="rank-badge lb-team-tile-rank ${rankClass}">${rankLabel}</div>
                <div class="lb-team-tile-name flex items-center gap-2 min-w-0">
                  ${r.meta.team ? `<img src="../logos/${teamSlug(r.meta.team)}.svg" class="w-4 h-4 object-contain shrink-0 opacity-70" onerror="this.style.display='none'">` : ''}
                  <div class="min-w-0">
                    <div class="team-tip-link" data-teamkey="${escapeHtml(r.key)}" data-teamlabel="${escapeHtml(r.meta.label)}" style="font-size:0.8125rem;font-weight:600;${r.meta.isMachine ? 'color:#f59e0b;' : 'color:#e2e8f0;'}cursor:pointer;">${escapeHtml(r.meta.label)}</div>
                    ${r.userCount != null ? `<div style="font-size:0.6rem;color:#4a5568;line-height:1.2;">${r.userCount} user${r.userCount !== 1 ? 's' : ''}</div>` : ''}
                  </div>
                </div>
                <div class="lb-team-tile-margin" style="text-align:right;">
                  <div style="font-size:0.6rem;color:#4a5568;font-family:monospace;">${r.marginLabel}</div>
                  <div style="font-size:0.75rem;color:#8892a4;">${r.marginScore.toFixed(3)}</div>
                </div>
                <div class="lb-team-tile-total" style="text-align:right;">
                  <div style="font-size:0.6rem;color:#4a5568;font-family:monospace;">${r.totalLabel}</div>
                  <div style="font-size:0.75rem;color:#8892a4;">${r.totalScore.toFixed(3)}</div>
                </div>
                <div class="lb-team-tile-score" style="text-align:right;font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:${rank === 1 ? '#86efac' : '#e2e8f0'};">${r.total.toFixed(3)}</div>
                <div class="lb-team-tile-details">
                  <span>M:<span style="color:#e2e8f0;margin-left:2px;">${r.marginScore.toFixed(2)}</span></span>
                  <span style="color:#2e3a4e;margin:0 2px;">·</span>
                  <span>T:<span style="color:#e2e8f0;margin-left:2px;">${r.totalScore.toFixed(2)}</span></span>
                </div>
              </div>`
          }).join('')

          return `
            <div style="background:#161b24;border:1px solid #2e3a4e;border-radius:12px;overflow:hidden;margin-bottom:1rem;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1rem;background:#0f1117;gap:0.5rem;">
                <div class="flex items-center gap-2 min-w-0" style="flex:1;justify-content:flex-end;">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;text-align:right;overflow-wrap:break-word;">${escapeHtml(game.home_team)}</span>
                  <img src="../logos/${teamSlug(game.home_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center;flex-shrink:0;min-width:6rem;">
                  <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.5rem;font-weight:700;color:#e2e8f0;letter-spacing:0.04em;">${game.home_score} – ${game.away_score}</span>
                  ${liveGameMap[game.game_id]?.is_live ? '<br><span style="font-size:0.6rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}
                </div>
                <div class="flex items-center gap-2 min-w-0" style="flex:1;">
                  <img src="../logos/${teamSlug(game.away_team)}.svg" class="w-7 h-7 object-contain shrink-0" onerror="this.style.display='none'">
                  <span style="font-size:0.875rem;font-weight:600;color:#e2e8f0;overflow-wrap:break-word;">${escapeHtml(game.away_team)}</span>
                </div>
              </div>
              <div class="lb-team-tile-header" style="display:grid;grid-template-columns:2rem 1fr 5.5rem 5.5rem 4rem;gap:0.5rem;padding:0.4rem 1rem;background:#0f1117;border-top:1px solid #1a2233;border-bottom:1px solid #1e2a3a;">
                <div></div><div></div>
                <div class="lb-th-margin" style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Margin</div>
                <div class="lb-th-total" style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Total Pts</div>
                <div style="text-align:right;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#4a5568;">Score</div>
              </div>
              ${tileRowsHtml}
              <div style="border-top:1px solid #1e2a3a;padding:0.5rem 1rem;">
                <button class="dist-toggle" data-game-id="${game.game_id}"
                  style="background:none;border:none;color:#4a5568;font-size:0.75rem;font-family:'Barlow',system-ui,sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.4rem;padding:0;letter-spacing:0.04em;text-transform:uppercase;">
                  <span class="dist-toggle-label">Show Distributions</span>
                  <span class="dist-toggle-arrow" style="font-size:0.6rem;">▼</span>
                </button>
              </div>
              <div id="dist-container-${game.game_id}" style="display:none;padding:1rem 1rem 0.5rem;border-top:1px solid #1e2a3a;background:#0f1117;">
                <div id="dist-selector-${game.game_id}" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.75rem;"></div>
                <div id="dist-legend-${game.game_id}" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;font-size:0.7rem;color:#4a5568;margin-bottom:0.75rem;"></div>
                <div style="margin-bottom:1.25rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Margin (home – away)</div>
                  <canvas id="dist-m-${game.game_id}" height="140"></canvas>
                </div>
                <div style="margin-bottom:0.5rem;">
                  <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#4a5568;margin-bottom:0.5rem;">Total Points</div>
                  <canvas id="dist-t-${game.game_id}" height="140"></canvas>
                </div>
              </div>
            </div>`
        }).filter(Boolean)

        matchesEl.innerHTML = tilesHtml.length
          ? `<div>${tilesHtml.join('')}</div>`
          : emptyState('No game data for this round.')

        // --- Team tips modal ---
        function openTeamTipsModal(teamKey, teamLabel) {
          const modal  = document.getElementById('user-tips-modal')
          const header = document.getElementById('user-tips-header')
          const body   = document.getElementById('user-tips-body')

          const isMachine = teamKey === '__machine__'
          const teamName  = isMachine ? null : (teamKey === '__all__' || teamKey === '__no_team__' ? null : teamKey)
          const logoHtml  = teamName
            ? `<img src="../logos/${teamSlug(teamName)}.svg" style="width:2rem;height:2rem;object-fit:contain;flex-shrink:0;opacity:0.85;" onerror="this.style.display='none'">`
            : ''

          header.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem;flex:1;min-width:0;">
              ${logoHtml}
              <div style="min-width:0;">
                <div style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.125rem;font-weight:700;${isMachine ? 'color:#f59e0b;' : 'color:#e2e8f0;'}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(teamLabel)}</div>
                <div style="font-size:0.7rem;color:#4a5568;margin-top:1px;">Round ${activeRound || roundGames[0]?.round_number} scores</div>
              </div>
            </div>
            <button id="user-tips-close" aria-label="Close"
              style="background:none;border:1px solid #2e3a4e;border-radius:6px;color:#4a5568;font-size:0.875rem;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color 0.1s,color 0.1s;"
              onmouseover="this.style.borderColor='#4a5568';this.style.color='#e2e8f0';"
              onmouseout="this.style.borderColor='#2e3a4e';this.style.color='#4a5568';">✕</button>`
          modal.classList.add('open')
          document.getElementById('user-tips-close').addEventListener('click', () => modal.classList.remove('open'))

          let totalMargin = 0, totalTotal = 0, gamesScored = 0

          const rows = roundGames.map(game => {
            const gameData = perGameData[game.game_id]?.[teamKey]
            const lg       = liveRoundNumber === (activeRound || roundGames[0]?.round_number) ? liveGameMap[game.game_id] : null
            const homeScore = lg?.home_score ?? game.home_score
            const awayScore = lg?.away_score ?? game.away_score
            const hasScore  = homeScore != null && awayScore != null
            const isLive    = lg?.is_live === true

            // Count users from this team who picked this game
            const gamePicks_ = picksByGame[game.game_id] || []
            const teamPickCount = teamKey === '__machine__' ? null
              : teamKey === '__all__'
                ? gamePicks_.length
                : gamePicks_.filter(p =>
                    teamKey === '__no_team__' ? !profileTeamMap[p.user_id] : profileTeamMap[p.user_id] === teamKey
                  ).length

            if (gameData) {
              totalMargin += gameData.marginScore
              totalTotal  += gameData.totalScore
              gamesScored++
            }

            const actualDisplay = hasScore
              ? `<span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.25rem;font-weight:700;color:#e2e8f0;letter-spacing:0.03em;">${homeScore}–${awayScore}</span>${isLive ? '<br><span style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;color:#f87171;">● LIVE</span>' : ''}`
              : `<span style="font-size:0.7rem;font-weight:600;color:#2e3a4e;text-transform:uppercase;letter-spacing:0.05em;">Upcoming</span>`

            const userCountHtml = teamPickCount != null
              ? `<span style="font-size:0.65rem;color:#4a5568;">${teamPickCount} picker${teamPickCount !== 1 ? 's' : ''}</span>`
              : ''

            const scoresHtml = gameData
              ? `<div style="display:flex;align-items:center;gap:0.6rem;font-size:0.7rem;flex-wrap:wrap;">
                  <span style="color:#4a5568;font-family:monospace;font-size:0.65rem;">${gameData.marginLabel}</span>
                  <span style="color:#4a5568;">M: <span style="color:#8892a4;">${gameData.marginScore.toFixed(3)}</span></span>
                  <span style="color:#4a5568;font-family:monospace;font-size:0.65rem;">${gameData.totalLabel}</span>
                  <span style="color:#4a5568;">T: <span style="color:#8892a4;">${gameData.totalScore.toFixed(3)}</span></span>
                  <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;">${(gameData.marginScore + gameData.totalScore).toFixed(3)}</span>
                </div>`
              : `<span style="font-size:0.75rem;color:#2e3a4e;">No data</span>`

            return `
              <div style="border-bottom:1px solid #1e2a3a;padding:0.625rem 1.25rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.3rem;">
                  <div style="display:flex;align-items:center;gap:0.375rem;flex:1;justify-content:flex-end;min-width:0;">
                    <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.home_team)}</span>
                    <img src="../logos/${teamSlug(game.home_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                  </div>
                  <div style="text-align:center;flex-shrink:0;min-width:4.5rem;line-height:1.3;">${actualDisplay}</div>
                  <div style="display:flex;align-items:center;gap:0.375rem;flex:1;min-width:0;">
                    <img src="../logos/${teamSlug(game.away_team)}.svg" style="width:1.375rem;height:1.375rem;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
                    <span style="font-size:0.75rem;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(game.away_team)}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                  ${userCountHtml}
                  ${scoresHtml}
                </div>
              </div>`
          })

          body.innerHTML = rows.join('') + `
            <div style="padding:0.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;background:#0f1117;flex-shrink:0;">
              <span style="font-size:0.75rem;color:#4a5568;">${gamesScored} game${gamesScored !== 1 ? 's' : ''} scored</span>
              <span style="font-family:'Barlow Condensed',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:#e2e8f0;">${(totalMargin + totalTotal).toFixed(3)}</span>
            </div>`
        }

        // Delegated click handler for team name links in sidebar panels + match tiles
        ;[seasonPanel, weekPanel, matchesEl].forEach(panel => {
          panel.addEventListener('click', e => {
            const link = e.target.closest('.team-tip-link')
            if (!link) return
            e.stopPropagation()
            openTeamTipsModal(link.dataset.teamkey, link.dataset.teamlabel)
          })
        })

        // --- Distribution chart state & helpers ---
        const distCharts     = {}
        const gameSubsetState = {}  // { [gameId]: { available, selected, game, machineDist, actualMargin, actualTotal } }

        // Distinct colours for user subsets (red reserved for result line)
        const SUBSET_PALETTE = ['#3b82f6','#22c55e','#f472b6','#06b6d4','#8b5cf6','#fb923c','#14b8a6','#6366f1','#d946ef','#84cc16']

        function hexToRgb(hex) {
          const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
          return `${r},${g},${b}`
        }

        // Render both charts for a game given an array of { label, color, values } subsets
        function renderDistChart(canvasId, machineBins, subsets, actualVal, xTitle, gameId, type, allValues = []) {
          const ctx = document.getElementById(canvasId)?.getContext('2d')
          if (!ctx) return null

          const isMargin     = type === 'margin'
          const [xMin, xMax] = isMargin ? [-100, 100] : [0, 100]
          const machineData  = machineBins ? lbNormaliseMachineBins(machineBins, 1, xMin, xMax) : []

          const rn        = roundGames.find(g => String(g.game_id) === String(gameId))?.round_number
          const rScale    = rn ? (roundSigmaScaleByRound[rn] ?? { margin: null, total: null }) : { margin: null, total: null }
          const mBins     = machineDistByGame[gameId]?.margins ? lbNormaliseMachineBins(machineDistByGame[gameId].margins, 1, -100, 100) : []
          const tBins     = machineDistByGame[gameId]?.totals  ? lbNormaliseMachineBins(machineDistByGame[gameId].totals,  1,    0, 100) : []
          const σFallback = isMargin ? lbMachineSigma(mBins) : lbMachineSigma(tBins)
          const sigmaScale = isMargin ? rScale.margin : rScale.total

          // Compute shared bandwidth from All Users distribution so that
          // weighted-sum of team KDEs exactly reconstructs the All Users KDE.
          const bwValues = allValues.length >= 2 ? allValues : (subsets[0]?.values ?? [])
          const sharedSigmaTarget = (bwValues.length >= 2 && sigmaScale) ? lbStddev(bwValues) * sigmaScale : σFallback
          const sharedH = lbCalibratedBandwidth(bwValues, sharedSigmaTarget)

          const subsetDatasets = subsets.map(({ values, color, label }) => {
            const kdeBins = lbCollapseToNRLValid(lbKdePoints(values, xMin, xMax, null, sharedH), isMargin ? 'margin' : 'total')
            return { kdeBins, color, label: label ?? '' }
          })

          const allY = [...machineData.map(d => d.y), ...subsetDatasets.flatMap(s => s.kdeBins.map(b => b.y))]
          const maxY = allY.length ? Math.max(...allY) * 1.15 : 0.3

          const datasets = [
            ...(machineData.length ? [{
              type: 'line', data: machineData.map(d => ({ x: d.x, y: d.y })),
              borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.07)',
              borderWidth: 2, pointRadius: 0, fill: true, tension: 0.35, order: 10,
            }] : []),
            ...subsetDatasets.map(({ kdeBins, color }, i) => ({
              type: 'line', data: kdeBins.map(d => ({ x: d.x, y: d.y })),
              borderColor: color, backgroundColor: `rgba(${hexToRgb(color)},0.12)`,
              borderWidth: 2.5, pointRadius: 0, fill: true, tension: 0.35, order: 9 - i,
            })),
            {
              type: 'line', data: [{ x: actualVal, y: 0 }, { x: actualVal, y: maxY }],
              borderColor: '#f87171', borderWidth: 2, borderDash: [5, 3],
              pointRadius: 0, fill: false, tension: 0, order: 1,
            },
          ]

          // --- Tooltip & crosshair helpers ---
          function ensureLbTooltipEl() {
            let el = document.getElementById('lb-dist-tooltip')
            if (!el) {
              el = document.createElement('div')
              el.id = 'lb-dist-tooltip'
              el.style.cssText = 'position:fixed;pointer-events:none;display:none;background:#0f1117;border:1px solid #2e3a4e;border-radius:8px;padding:0.5rem 0.75rem;font-size:0.72rem;color:#e2e8f0;line-height:1.6;white-space:nowrap;z-index:99999;font-family:\'Barlow\',system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.5);'
              document.body.appendChild(el)
            }
            return el
          }

          function cdfBins(bins, x) {
            let gte = 0, lte = 0
            for (const b of (bins || [])) {
              if (b.x >= x) gte += b.y
              if (b.x <= x) lte += b.y
            }
            return { gte: Math.min(gte, 1), lte: Math.min(lte, 1) }
          }

          const crosshairPlugin = {
            id: 'lbCrosshair',
            afterDraw(chart) {
              if (chart._crosshairX == null) return
              const { ctx, chartArea: { top, bottom } } = chart
              ctx.save()
              ctx.beginPath()
              ctx.moveTo(chart._crosshairX, top)
              ctx.lineTo(chart._crosshairX, bottom)
              ctx.strokeStyle = 'rgba(255,255,255,0.15)'
              ctx.lineWidth = 1
              ctx.setLineDash([4, 3])
              ctx.stroke()
              ctx.restore()
            },
          }

          const chart = new Chart(ctx, {
            data: { datasets },
            plugins: [crosshairPlugin],
            options: {
              responsive: true, animation: false,
              plugins: { legend: { display: false }, tooltip: { enabled: false } },
              onHover: (event, _elements, chart) => {
                const tooltipEl = ensureLbTooltipEl()
                if (!event.native) {
                  chart._crosshairX = null; chart.draw(); tooltipEl.style.display = 'none'; return
                }
                chart._crosshairX = event.x
                chart.draw()

                const xScale = chart.scales.x
                if (!xScale) { tooltipEl.style.display = 'none'; return }
                const xVal = xScale.getValueForPixel(event.x)
                if (xVal == null) { tooltipEl.style.display = 'none'; return }

                // Snap to nearest integer bin present in either dataset
                const allXs = [...machineData.map(b => b.x), ...subsetDatasets.flatMap(s => s.kdeBins.map(b => b.x))]
                if (!allXs.length) { tooltipEl.style.display = 'none'; return }
                const nearest = Math.round(Math.max(xMin, Math.min(xMax, xVal)))

                const pct  = v => `${(v * 100).toFixed(1)}%`
                const odds = p => p >= 0.00005 ? `$${(1 / p).toFixed(2)}` : '—'
                const sign = x => x > 0 ? `+${x}` : `${x}`
                const xLabel = isMargin ? sign(nearest) : `${nearest}`
                const row = (lbl, p) => `<div style="display:flex;justify-content:space-between;gap:1.5rem;"><span style="color:#8892a4;">${lbl}</span><span style="font-variant-numeric:tabular-nums;">${pct(p)} <span style="color:#4a5568;">${odds(p)}</span></span></div>`

                let html = `<div style="font-weight:700;font-size:0.75rem;margin-bottom:0.35rem;color:#94a3b8;">${isMargin ? 'Margin' : 'Total'} ${xLabel}</div>`

                if (machineData.length) {
                  const mc = cdfBins(machineData, nearest)
                  html += `<div style="color:#f59e0b;font-weight:600;margin-bottom:0.1rem;">BS Machine</div>`
                  html += row(`P(≥${xLabel})`, mc.gte)
                  html += row(`P(≤${xLabel})`, mc.lte)
                }

                subsetDatasets.forEach(({ kdeBins, color, label }) => {
                  const uc = cdfBins(kdeBins, nearest)
                  html += `<div style="color:${color};font-weight:600;margin-top:0.4rem;margin-bottom:0.1rem;">${escapeHtml(label)}</div>`
                  html += row(`P(≥${xLabel})`, uc.gte)
                  html += row(`P(≤${xLabel})`, uc.lte)
                })

                tooltipEl.innerHTML = html
                tooltipEl.style.display = 'block'

                const cr = event.native.target.getBoundingClientRect()
                let left = cr.left + event.x + 12
                let top  = cr.top  + event.y - 10
                tooltipEl.style.left = `${left}px`
                tooltipEl.style.top  = `${top}px`
                const tr = tooltipEl.getBoundingClientRect()
                if (tr.right  > window.innerWidth  - 8) left = cr.left + event.x - tr.width  - 12
                if (tr.bottom > window.innerHeight - 8)  top  = cr.top  + event.y - tr.height - 10
                tooltipEl.style.left = `${left}px`
                tooltipEl.style.top  = `${top}px`
              },
              scales: {
                x: {
                  type: 'linear', offset: false,
                  title: { display: true, text: xTitle, color: '#4a5568', font: { size: 10, weight: '600' }, padding: { top: 4 } },
                  ticks: { maxTicksLimit: 12, color: '#4a5568', font: { size: 10 } },
                  grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' },
                },
                y: {
                  min: 0, max: maxY,
                  title: { display: true, text: 'Relative frequency', color: '#4a5568', font: { size: 10, weight: '600' }, padding: { bottom: 4 } },
                  ticks: { color: '#4a5568', font: { size: 9 }, callback: v => `${Math.round(v * 100)}%` },
                  grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' },
                },
              },
            },
          })

          function hideLbTooltip() {
            const el = document.getElementById('lb-dist-tooltip')
            if (el) el.style.display = 'none'
            chart._crosshairX = null
            chart.draw()
          }

          ctx.canvas.addEventListener('mouseleave', hideLbTooltip)
          ctx.canvas.addEventListener('pointerleave', hideLbTooltip)
          ctx.canvas.style.touchAction = 'pan-y'
          ctx.canvas.style.userSelect = 'none'

          return chart
        }

        function buildSubsetSelector(gameId) {
          const el = document.getElementById(`dist-selector-${gameId}`)
          if (!el) return
          const { available, selected } = gameSubsetState[gameId]
          el.innerHTML = available.map(s => {
            const active = selected.has(s.key)
            const rgb    = hexToRgb(s.color)
            const logo   = (s.key !== '__all__' && s.key !== '__no_team__')
