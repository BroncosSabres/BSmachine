<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — The BS Machine</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .auth-input {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2e3a4e;
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        color: #e2e8f0;
        font-size: 0.9375rem;
        font-family: 'Barlow', system-ui, sans-serif;
        transition: border-color 0.15s ease;
        outline: none;
      }
      .auth-input:focus { border-color: #f59e0b; }
      .auth-input::placeholder { color: #4a5568; }
      .auth-btn-primary {
        width: 100%;
        padding: 0.7rem 1rem;
        border-radius: 8px;
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: #f59e0b;
        color: #0a0d14;
        border: none;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .auth-btn-primary:hover { background: #fbbf24; }
      .auth-btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
      .auth-error {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.3);
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        color: #fca5a5;
        font-size: 0.875rem;
      }
      .auth-success {
        background: rgba(74,222,128,0.1);
        border: 1px solid rgba(74,222,128,0.3);
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        color: #86efac;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body style="background-color:#0f1117; color:#e2e8f0; min-height:100vh;">
    <div id="site-header"></div>

    <main class="flex items-center justify-center px-4 py-16 min-h-[calc(100vh-4rem)]">
      <div style="width:100%; max-width:420px;">

        <div class="text-center mb-8">
          <div style="font-family:'Barlow Condensed',system-ui,sans-serif; font-size:1.5rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#e2e8f0;">
            THE <span style="color:#fbbf24;">BS</span> MACHINE
          </div>
          <div style="color:#8892a4; font-size:0.875rem; margin-top:0.25rem;">Reset Password</div>
        </div>

        <div style="background:#161b24; border:1px solid #2e3a4e; border-radius:16px; padding:2rem; box-shadow:0 8px 40px rgba(0,0,0,0.4);">
          <div id="auth-message" class="mb-4 hidden"></div>

          <form id="reset-form" class="flex flex-col gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:#8892a4;">New Password</label>
              <input id="new-password" type="password" class="auth-input" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8" />
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:#8892a4;">Confirm Password</label>
              <input id="confirm-password" type="password" class="auth-input" placeholder="Re-enter your password" autocomplete="new-password" required minlength="8" />
              <div id="pw-match-msg" class="text-xs mt-1 hidden"></div>
            </div>
            <button type="submit" class="auth-btn-primary mt-1">Set New Password</button>
          </form>
        </div>
      </div>
    </main>

    <script type="module">
      import { supabase, updateAuthNav } from '../js/supabase-client.js'

      function showError(msg) {
        const el = document.getElementById('auth-message')
        el.className = 'mb-4 auth-error'
        el.textContent = msg
      }
      function showSuccess(msg) {
        const el = document.getElementById('auth-message')
        el.className = 'mb-4 auth-success'
        el.textContent = msg
      }

      // Password match feedback
      const pwInput   = document.getElementById('new-password')
      const pwConfirm = document.getElementById('confirm-password')
      const pwMatchMsg = document.getElementById('pw-match-msg')

      function checkMatch() {
        const val = pwConfirm.value
        if (!val) { pwMatchMsg.className = 'text-xs mt-1 hidden'; pwConfirm.style.borderColor = ''; return }
        if (val === pwInput.value) {
          pwMatchMsg.className = 'text-xs mt-1'
          pwMatchMsg.style.color = '#86efac'
          pwMatchMsg.textContent = 'Passwords match'
          pwConfirm.style.borderColor = '#4ade80'
        } else {
          pwMatchMsg.className = 'text-xs mt-1'
          pwMatchMsg.style.color = '#fca5a5'
          pwMatchMsg.textContent = 'Passwords do not match'
          pwConfirm.style.borderColor = '#ef4444'
        }
      }
      pwConfirm.addEventListener('input', checkMatch)
      pwInput.addEventListener('input', () => { if (pwConfirm.value) checkMatch() })

      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const btn = e.target.querySelector('button[type=submit]')
        const password = pwInput.value
        const confirm  = pwConfirm.value

        if (password !== confirm) { showError('Passwords do not match.'); return }

        btn.disabled = true
        btn.textContent = 'Saving…'

        const { error } = await supabase.auth.updateUser({ password })

        if (error) {
          showError(error.message)
          btn.disabled = false
          btn.textContent = 'Set New Password'
        } else {
          showSuccess('Password updated! Redirecting…')
          setTimeout(() => { window.location.href = '/pages/tipping.html' }, 1500)
        }
      })

      fetch('../components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          updateAuthNav()
          document.getElementById('bmc-button').innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" style="height:40px;width:145px;">
            </a>`
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
