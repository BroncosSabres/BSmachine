<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T09VHK1QDP');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Your Email — The BS Machine</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .auth-btn-secondary {
        padding: 0.6rem 1.25rem;
        border-radius: 8px;
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: transparent;
        color: #fbbf24;
        border: 1px solid rgba(245,158,11,0.4);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .auth-btn-secondary:hover { background: rgba(245,158,11,0.08); border-color: #f59e0b; }
      .auth-btn-secondary:disabled { color: #4a5568; border-color: #2e3a4e; cursor: not-allowed; }
      .auth-success {
        background: rgba(74,222,128,0.1);
        border: 1px solid rgba(74,222,128,0.3);
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        color: #86efac;
        font-size: 0.875rem;
      }
      .auth-error {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.3);
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        color: #fca5a5;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body style="background-color:#0f1117; color:#e2e8f0; min-height:100vh;">
    <div id="site-header"></div>

    <main class="flex items-center justify-center px-4 py-16 min-h-[calc(100vh-4rem)]">
      <div style="width:100%; max-width:420px;">

        <div class="text-center mb-8">
          <div style="font-family:'Barlow Condensed',system-ui,sans-serif; font-size:1.5rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;">
            THE <span style="color:#fbbf24;">BS</span> MACHINE
          </div>
        </div>

        <div style="background:#161b24; border:1px solid #2e3a4e; border-radius:16px; padding:2rem; box-shadow:0 8px 40px rgba(0,0,0,0.4);">

          <!-- Envelope icon -->
          <div class="text-center mb-5">
            <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:50%; background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.25); margin-bottom:1rem;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </div>
            <div style="font-family:'Barlow Condensed',system-ui,sans-serif; font-size:1.25rem; font-weight:700; margin-bottom:0.375rem;">Check your inbox</div>
            <div style="color:#8892a4; font-size:0.875rem; line-height:1.5;">
              We've sent a confirmation link to<br>
              <span id="email-display" style="color:#e2e8f0; font-weight:600;"></span>
            </div>
          </div>

          <div style="background:#0f1117; border:1px solid #2e3a4e; border-radius:10px; padding:1rem; margin-bottom:1.5rem;">
            <div style="font-size:0.8125rem; color:#8892a4; line-height:1.6;">
              Click the link in the email to verify your account and start tipping.
              Check your spam folder if it doesn't arrive within a minute or two.
            </div>
          </div>

          <div id="resend-message" class="mb-4 hidden"></div>

          <div class="flex flex-col gap-3">
            <button id="resend-btn" class="auth-btn-secondary">Resend confirmation email</button>
            <a href="/pages/login.html"
               style="display:block; text-align:center; font-size:0.8125rem; color:#4a5568; padding-top:0.25rem;">
              Back to sign in
            </a>
          </div>

        </div>
      </div>
    </main>

    <script type="module">
      import { supabase } from '../js/supabase-client.js'

      // Show the email address from the URL param
      const params = new URLSearchParams(window.location.search)
      const email  = params.get('email')
      if (email) {
        document.getElementById('email-display').textContent = decodeURIComponent(email)
      }

      // Resend button
      const resendBtn = document.getElementById('resend-btn')
      const msgEl     = document.getElementById('resend-message')

      resendBtn.addEventListener('click', async () => {
        if (!email) {
          msgEl.className = 'mb-4 auth-error'
          msgEl.textContent = 'No email address found. Please go back and sign up again.'
          return
        }

        resendBtn.disabled = true
        resendBtn.textContent = 'Sending…'
        msgEl.className = 'mb-4 hidden'

        const { error } = await supabase.auth.resend({
          type: 'signup',
          email: decodeURIComponent(email),
        })

        if (error) {
          msgEl.className = 'mb-4 auth-error'
          msgEl.textContent = error.message
          resendBtn.disabled = false
          resendBtn.textContent = 'Resend confirmation email'
        } else {
          msgEl.className = 'mb-4 auth-success'
          msgEl.textContent = 'Confirmation email resent. Check your inbox.'
          // Re-enable after 30s
          setTimeout(() => {
            resendBtn.disabled = false
            resendBtn.textContent = 'Resend confirmation email'
          }, 30000)
        }
      })

      // Load header
      fetch('../components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('site-header').innerHTML = html
          const toggle = document.getElementById('menu-toggle')
          const menu   = document.getElementById('mobile-menu')
          if (toggle && menu) toggle.addEventListener('click', () => menu.classList.toggle('hidden'))
        })
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
