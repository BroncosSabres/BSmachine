<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T09VHK1QDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T09VHK1QDP');
    </script>
    <!-- Performance hints: preconnect + early backend wakeup -->
    <link rel="preconnect" href="https://bsmachine-backend.onrender.com" crossorigin>
    <link rel="dns-prefetch" href="https://bsmachine-backend.onrender.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <script>!function(){var K='bsm_backend_pinged',T=6e5,l=+sessionStorage.getItem(K)||0;if(Date.now()-l>=T){sessionStorage.setItem(K,String(Date.now()));fetch('https://bsmachine-backend.onrender.com/health',{cache:'no-store'}).catch(function(){});}}();</script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NRL Impact Simulator</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white">
    <div id="site-header"></div>

    <main class="max-w-7xl mx-auto px-4 py-8 min-h-screen overflow-auto">
      <h1 class="text-4xl font-bold mb-8">Result Simulator</h1>

      <div class="flex flex-col lg:flex-row gap-6 items-start">

        <!-- Match Selection Area -->
        <div class="card w-full lg:w-72 shrink-0">
          <h2 class="text-lg font-semibold mb-3 text-gray-100">Select Match Outcomes</h2>
          <div id="selection-chance" class="mb-4 text-sm text-gray-400 font-medium"></div>
          <form id="simulation-form" class="space-y-2 text-sm">
            <!-- Match selection radio buttons will be injected here -->
          </form>
        </div>

        <!-- Ladder Table Area -->
        <div class="card flex-1 min-w-0 overflow-x-auto">
          <h2 class="text-lg font-semibold mb-4 text-gray-100">Simulated Ladder Probabilities</h2>
          <div id="sim-table-container">
            <div class="text-gray-400 text-sm py-8 text-center">Loading simulator...</div>
          </div>
        </div>

      </div>
    </main>

    <script type="module" src="../js/impact-simulator.js"></script>
    <script type="module">
      import { updateAuthNav } from '../js/supabase-client.js'
      updateAuthNav()
    </script>
    <script>
      fetch('../components/header.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById("site-header").innerHTML = html;

          document.getElementById("bmc-button").innerHTML = `
            <a href="https://www.buymeacoffee.com/BroncosSabres" target="_blank" rel="noopener">
              <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png"
                   alt="Buy Me a Coffee"
                   style="height: 40px; width: 145px;">
            </a>
          `;

          const menuToggle = document.getElementById("menu-toggle");
          const mobileMenu = document.getElementById("mobile-menu");
          if (menuToggle && mobileMenu) {
            menuToggle.addEventListener("click", () => {
              mobileMenu.classList.toggle("hidden");
            });
          }
        });
    </script>
    <div id="site-footer"></div>
    <script src="/js/load-footer.js"></script>
  </body>
</html>
